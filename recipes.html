  // ---------- Import sheet ----------
  function ImportSheet({ onClose, onImported, onPreviewSave, showToast, recipes, onOpenExisting, initialUrl = '', existingJobId = null, language = '' }) {
    // When existingJobId is set we're attaching to a job started elsewhere
    // (e.g. the iOS Shortcut share flow). Skip the URL-paste step and jump
    // straight to the polling/progress UI; the polling useEffect below
    // handles the rest.
    const [stage, setStage] = useState(existingJobId ? 'detecting' : 'paste');
    const [url, setUrl] = useState(initialUrl);
    const [analysis, setAnalysis] = useState('auto');
    const [busy, setBusy] = useState(!!existingJobId);
    const [err, setErr] = useState(null);
    const [preview, setPreview] = useState(null);
    const [duplicate, setDuplicate] = useState(null);
    const [progress, setProgress] = useState(existingJobId ? 'Picking up your queued recipe…' : '');
    const [jobId, setJobId] = useState(existingJobId || null);
    const inputRef = useRef(null);
    const pollRef = useRef(null);

    // Only auto-focus the URL input when starting from the paste step.
    useEffect(() => {
      if (stage === 'paste') setTimeout(() => inputRef.current?.focus(), 280);
    }, []);

    const trimmedUrl = url.trim();
    const platform = trimmedUrl ? detectPlatform(trimmedUrl) : null;
    const showAnalysis = isVideoUrl(trimmedUrl);

    // Polling for video extraction
    useEffect(() => {
      if (!jobId) return;
      let cancelled = false;
      const tick = async () => {
        try {
          const job = await api.jobStatus(jobId);
          if (cancelled) return;
          setProgress(job.progress || job.status);
          if (job.status === 'done' && job.recipeId) {
            cancelled = true;
            try {
              const saved = await api.get(job.recipeId);
              onImported(saved);
            } catch (e) {
              setErr(e.message || 'Could not load extracted recipe.');
              setStage('error');
            }
          } else if (job.status === 'error') {
            cancelled = true;
            setErr(job.error || 'Extraction failed.');
            setStage('error');
          } else {
            pollRef.current = setTimeout(tick, 2000);
          }
        } catch {
          if (cancelled) return;
          pollRef.current = setTimeout(tick, 2500);
        }
      };
      pollRef.current = setTimeout(tick, 1500);
      return () => { cancelled = true; if (pollRef.current) clearTimeout(pollRef.current); };
    }, [jobId, onImported]);

    const startDetect = async () => {
      if (!trimmedUrl) return;
      setBusy(true); setErr(null);

      // If they pasted a share URL (one of OUR /#share=... links), redirect
      // them straight into the share-receive flow.
      const shareMatch = trimmedUrl.match(/[#&]share=([^&]+)/);
      if (shareMatch) {
        // Hand off to the receive flow by setting the URL hash. The
        // top-level boot effect will pick it up and surface the receive screen.
        window.location.hash = 'share=' + shareMatch[1];
        window.location.reload();
        return;
      }

      // Duplicate detection: if a recipe with this same source URL already
      // exists in the user's library, surface it instead of re-importing.
      const normalized = normalizeUrl(trimmedUrl);
      const existing = (recipes || []).find(r => r.sourceUrl && normalizeUrl(r.sourceUrl) === normalized);
      if (existing) {
        setDuplicate(existing);
        setStage('duplicate');
        setBusy(false);
        return;
      }

      try {
        if (isVideoUrl(trimmedUrl)) {
          const { jobId: id } = await api.extractVideo(trimmedUrl, analysis, language);
          setJobId(id);
          setProgress('Queued');
          setStage('detecting');
        } else {
          setStage('detecting');
          const parsed = await api.extract(trimmedUrl, language);
          setPreview({
            id: newId(),
            ...parsed,
            tags: [],
            notes: '',
            rating: 0,
            favorite: false,
          });
          setStage('preview');
        }
      } catch (e) {
        setErr(e.message || 'Extraction failed.');
        setStage('error');
      } finally {
        setBusy(false);
      }
    };

    const doSave = async () => {
      if (!preview) return;
      setBusy(true); setErr(null);
      try {
        const saved = await onPreviewSave(preview);
        // onPreviewSave should close the sheet
      } catch (e) {
        setErr(e.message || 'Save failed.');
      } finally {
        setBusy(false);
      }
    };

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <SheetGrab onClose={onClose} />

          {stage === 'paste' && (
            <>
              <h2 className="sheet-title">Import a recipe</h2>
              <p className="sheet-sub">Paste a link from a recipe site, Instagram reel, TikTok, or YouTube video.</p>

              <div className="url-input">
                <Icon.Link />
                <input
                  ref={inputRef}
                  type="url"
                  inputMode="url"
                  placeholder="https://… or instagram.com/reel/… or youtube.com/watch…"
                  value={url}
                  onChange={e => setUrl(e.target.value)}
                />
                {url && <button className="search-clear" onClick={() => setUrl('')}>×</button>}
              </div>

              <div className="source-detect-row">
                <span className={'detect-pill ' + (platform === 'web' ? 'on' : '')}>
                  <Icon.Globe /> Recipe sites
                </span>
                <span className={'detect-pill ' + (platform === 'instagram' ? 'on' : '')}>
                  <Icon.InstagramIcon /> Instagram
                </span>
                <span className={'detect-pill ' + (platform === 'tiktok' ? 'on' : '')}>
                  <Icon.TikTokIcon /> TikTok
                </span>
                <span className={'detect-pill ' + (platform === 'youtube' ? 'on' : '')}>
                  <Icon.YouTubeIcon /> YouTube
                </span>
              </div>

              {showAnalysis && (
                <div className="analysis-row">
                  <p className="analysis-label">How should we extract it?</p>
                  <div className="analysis-options">
                    {[
                      { v: 'auto',   label: 'Smart' },
                      { v: 'audio',  label: 'Audio only' },
                      { v: 'gemini', label: 'Full video' },
                    ].map(opt => (
                      <button
                        key={opt.v}
                        className={'chip ' + (analysis === opt.v ? 'on' : '')}
                        onClick={() => setAnalysis(opt.v)}
                      >
                        {opt.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {!url && (
                <div className="sample-block">
                  <p className="sample-label">Try a sample</p>
                  <div className="sample-row">
                    <button
                      className="sample-chip"
                      onClick={() => setUrl('https://www.bonappetit.com/recipe/bas-best-chocolate-chip-cookies')}
                    >
                      bonappetit.com
                    </button>
                    <button
                      className="sample-chip"
                      onClick={() => setUrl('https://cooking.nytimes.com/recipes/1024220-spicy-miso-pasta')}
                    >
                      cooking.nytimes.com
                    </button>
                    <button
                      className="sample-chip"
                      onClick={() => setUrl('https://www.seriouseats.com/perfect-chocolate-chip-cookie-recipe')}
                    >
                      seriouseats.com
                    </button>
                  </div>
                </div>
              )}

              {err && <div className="error-box">{err}</div>}

              <button className="primary-btn" disabled={!trimmedUrl || busy} onClick={startDetect}>
                {busy ? <><span className="spinner on-accent" /> Starting…</> : 'Detect & import'}
              </button>
            </>
          )}

          {stage === 'detecting' && (
            <div className="detecting">
              <div className="detect-orbit">
                <div className="orbit-ring" />
                <div className="orbit-ring r2" />
                <div className="orbit-emoji">🍳</div>
              </div>
              <h2 className="sheet-title">Reading the recipe…</h2>
              <p className="sheet-sub">{progress || (isVideoUrl(trimmedUrl) ? (platform === 'youtube' ? 'YouTube videos can take 30–90 seconds depending on length.' : 'Reels usually take 15–30 seconds.') : 'Almost there.')}</p>
              <ul className="detect-steps">
                <li className="d-step done">Source detected: <b>{platform === 'instagram' ? 'Instagram' : platform === 'tiktok' ? 'TikTok' : platform === 'youtube' ? 'YouTube' : urlHost(trimmedUrl)}</b></li>
                {isVideoUrl(trimmedUrl) ? (
                  <>
                    <li className={'d-step ' + (progress && /resolving|downloading|fetching/i.test(progress) ? 'done' : '')}>Fetching video</li>
                    <li className={'d-step ' + (progress && /transcrib|whisper|gemini/i.test(progress) ? 'done' : '')}>Transcribing audio</li>
                    <li className={'d-step ' + (progress && /consolidat|saved/i.test(progress) ? 'done' : '')}>Extracting recipe</li>
                  </>
                ) : (
                  <>
                    <li className="d-step done">Fetching page</li>
                    <li className="d-step done">Parsing structured data</li>
                  </>
                )}
              </ul>
            </div>
          )}

          {stage === 'preview' && preview && (
            <>
              <h2 className="sheet-title">Looks good?</h2>
              <p className="sheet-sub">We pulled this. You can edit anytime after saving.</p>
              <div className="preview-card">
                <div className="preview-media">
                  <RecipeMedia recipe={preview} />
                </div>
                <div className="preview-body">
                  <h3>{preview.title}</h3>
                  <div style={{marginBottom: 8}}>
                    <SourceBadge url={preview.sourceUrl} />
                  </div>
                  <div className="preview-stats">
                    <span><b>{preview.ingredients.length}</b> ingredients</span>
                    <span><b>{preview.instructions.length}</b> steps</span>
                    {timeLabel(preview) && <span><b>{timeLabel(preview)}</b></span>}
                  </div>
                </div>
              </div>
              {err && <div className="error-box">{err}</div>}
              <div className="sheet-actions">
                <button className="ghost-btn" onClick={() => setStage('paste')}>Back</button>
                <button className="primary-btn" onClick={doSave} disabled={busy} style={{flex: 1}}>
                  {busy ? <><span className="spinner on-accent" /> Saving…</> : 'Save to library'}
                </button>
              </div>
            </>
          )}

          {stage === 'duplicate' && duplicate && (
            <>
              <h2 className="sheet-title">Already in your library</h2>
              <p className="sheet-sub">You've already imported this recipe. Open it instead?</p>
              <div className="preview-card">
                <div className="preview-media">
                  <RecipeMedia recipe={duplicate} />
                </div>
                <div className="preview-body">
                  <h3>{duplicate.title || 'Untitled'}</h3>
                  <div style={{marginBottom: 8}}>
                    <SourceBadge url={duplicate.sourceUrl} />
                  </div>
                  <div className="preview-stats">
                    <span><b>{(duplicate.ingredients || []).length}</b> ingredients</span>
                    <span><b>{(duplicate.instructions || []).length}</b> steps</span>
                    {timeLabel(duplicate) && <span><b>{timeLabel(duplicate)}</b></span>}
                  </div>
                </div>
              </div>
              <div className="sheet-actions">
                <button className="ghost-btn" onClick={onClose}>Cancel</button>
                <button className="primary-btn" onClick={() => onOpenExisting(duplicate)} style={{flex: 1}}>Open recipe</button>
              </div>
            </>
          )}

          {stage === 'error' && (
            <>
              <h2 className="sheet-title">Couldn't import</h2>
              <p className="sheet-sub">{err}</p>
              <div className="sheet-actions">
                <button className="ghost-btn" onClick={onClose}>Close</button>
                <button className="primary-btn" onClick={() => { setErr(null); setStage('paste'); }} style={{flex: 1}}>Try again</button>
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // ---------- Helpers for the share flow ----------
  // Compress JSON → base64 in URL hash. Modern browsers all have CompressionStream.
  async function packShareHash(payload) {
    const json = JSON.stringify(payload);
    if (typeof CompressionStream === 'undefined') {
      // Fallback: just base64 (works, just longer URLs)
      return btoa(unescape(encodeURIComponent(json)));
    }
    const stream = new Blob([json]).stream().pipeThrough(new CompressionStream('gzip'));
    const buf = await new Response(stream).arrayBuffer();
    let bin = '';
    const bytes = new Uint8Array(buf);
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return 'g:' + btoa(bin);
  }
  async function unpackShareHash(hash) {
    if (!hash) return null;
    const isGzip = hash.startsWith('g:');
    const b64 = isGzip ? hash.slice(2) : hash;
    if (!isGzip) {
      try { return JSON.parse(decodeURIComponent(escape(atob(b64)))); }
      catch { return null; }
    }
    if (typeof DecompressionStream === 'undefined') return null;
    try {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const text = await new Response(stream).text();
      return JSON.parse(text);
    } catch { return null; }
  }

            </div>

            </button>

        </div>

  // ---------- App shell ----------
  function App() {
    const [token, setToken] = useState(() => getDbxToken());
    const unlocked = !!token;
    const [account, setAccount] = useState(() => {
      try { return JSON.parse(localStorage.getItem(DBX_ACCOUNT_KEY) || 'null'); } catch { return null; }
    });
    const [sharePayload, setSharePayload] = useState(null);
    const [shareLoading, setShareLoading] = useState(true);
    const [recipes, setRecipes] = useState(() => loadCache() || []);
    const [search, setSearch] = useState('');
    const [filters, setFilters] = useState(emptyFilters());
    const [openId, setOpenId] = useState(null);
    const [showImport, setShowImport] = useState(false);
    // When the OS share sheet hands us a URL via the Web Share Target manifest
    // entry (?share=1&url=… or text=…), we open ImportSheet pre-filled.
    const [importInitialUrl, setImportInitialUrl] = useState('');
    // When a job was queued from outside the PWA — e.g. the iOS Shortcut
    // posted a URL to /api/share-from-shortcut while the app was closed —
    // we attach the import sheet to that existing jobId and surface the
    // polling/progress UI immediately on app open.
    const [importExistingJobId, setImportExistingJobId] = useState(null);
    // Clear pre-filled URL / attached jobId whenever ImportSheet closes
    // (any path) so the next manual "+ Import" tap doesn't reuse them.
    useEffect(() => {
      if (!showImport) {
        if (importInitialUrl) setImportInitialUrl('');
        if (importExistingJobId) setImportExistingJobId(null);
      }
    }, [showImport, importInitialUrl, importExistingJobId]);
    const [showFilter, setShowFilter] = useState(false);
    const [showStats, setShowStats] = useState(false);
    const [tab, setTab] = useState('recipes'); // 'recipes' | 'shopping' | 'settings'
    const [shopping, setShopping] = useState({ items: [] });
    const [showAddShop, setShowAddShop] = useState(false);
    const [altsTarget, setAltsTarget] = useState(null);  // {item, recipe} for AlternativesSheet
    const [darkMode, setDarkModeState] = useState(() => localStorage.getItem('recipes-dark') === 'true');
    const setDarkMode = useCallback((v) => {
      setDarkModeState(v);
      try { localStorage.setItem('recipes-dark', v ? 'true' : 'false'); } catch {}
    }, []);
    // Theme attribute is now applied directly on each screen-level container
    // via JSX (data-theme={dataTheme}) so it always survives screen swaps —
    // welcome → loading → main, share-receive flow, etc. Don't rely on a
    // useEffect + querySelector here: the first .app-root is unmounted as
    // soon as we transition past it, and the effect doesn't re-fire.
    const dataTheme = darkMode ? 'dark' : 'light';
    const [editingId, setEditingId] = useState(null);
    const [longPressed, setLongPressed] = useState(null);
    const [units, setUnitsState] = useState(() => defaultUnits());
    const setUnits = useCallback((u) => { setUnitsState(u); saveUnits(u); }, []);
    const [language, setLanguageState] = useState(() => defaultLanguage());
    const setLanguage = useCallback((code) => { setLanguageState(code); saveLanguage(code); }, []);
    const [location, setLocationState] = useState(() => loadLocation());
    const setLocation = useCallback((loc) => { setLocationState(loc); saveLocation(loc); }, []);
    const [devMode, setDevModeState] = useState(() => loadDevMode());
    const setDevMode = useCallback((b) => { setDevModeState(b); saveDevMode(b); }, []);
    const [showToast, toastNode] = useToast();

    const refresh = useCallback(async () => {
      try {
        const { recipes: fresh } = await api.list();
        setRecipes(fresh);
        saveCache(fresh);
      } catch (e) {
        if (e.message !== 'unauthorized') showToast('Could not load recipes: ' + e.message, 'error');
      }
    }, [showToast]);

    const toggleFavorite = async (id) => {
      const r = recipes.find(x => x.id === id);
      if (!r) return;
      const updated = { ...r, favorite: !r.favorite };
      setRecipes(rs => rs.map(x => x.id === id ? updated : x));
      try {
        const saved = await api.save(id, updated);
        setRecipes(rs => {
          const next = rs.map(x => x.id === id ? saved : x);
          saveCache(next);
          return next;
        });
      } catch (e) {
        showToast('Could not update favorite', 'error');
        setRecipes(rs => rs.map(x => x.id === id ? r : x));
      }
    };

    useEffect(() => { if (unlocked) refresh(); }, [unlocked, refresh]);

    // Load shopping list once connected.
    useEffect(() => {
      if (!unlocked) return;
      api.shoppingList()
        .then(list => setShopping({ items: list.items || [] }))
        .catch(e => { if (e.message !== 'unauthorized') console.warn('shopping load:', e.message); });
    }, [unlocked]);

    const toggleShopItem = async (id) => {
      const next = shopping.items.map(it => it.id === id ? { ...it, checked: !it.checked } : it);
      setShopping({ items: next });
      try { await api.shoppingSave(next); }
      catch (e) { showToast('Could not save: ' + e.message, 'error'); }
    };
    const clearCheckedShop = async () => {
      const next = shopping.items.filter(it => !it.checked);
      setShopping({ items: next });
      try { await api.shoppingSave(next); showToast('Cleared'); }
      catch (e) { showToast('Could not save: ' + e.message, 'error'); }
    };
    const clearAllShop = async () => {
      if (!confirm('Clear the entire shopping list?')) return;
      setShopping({ items: [] });
      try { await api.shoppingClear(); showToast('Shopping list cleared'); }
      catch (e) { showToast('Could not clear: ' + e.message, 'error'); }
    };
    const addShopTyped = async (items) => {
      const result = await api.shoppingAdd({ items });
      setShopping({ items: result.items });
      showToast('Added to shopping list');
    };
    const addShopPhoto = async (dataUrl) => {
      const result = await api.shoppingAdd({ image: dataUrl });
      setShopping({ items: result.items });
      showToast('Added from photo');
    };
    const addShopFromRecipes = async (recipeIds) => {
      // Combine the ingredients from all selected recipes into one batch,
      // tagging the source on the resulting items.
      let lastResult = null;
      for (const id of recipeIds) {
        const r = recipes.find(x => x.id === id);
        if (!r) continue;
        const items = (r.ingredients || []).filter(s => !/^—.*—$/.test(s));
        if (items.length === 0) continue;
        lastResult = await api.shoppingAdd({ items, fromRecipe: id });
      }
      if (lastResult) setShopping({ items: lastResult.items });
      showToast(`Added from ${recipeIds.length} ${recipeIds.length === 1 ? 'recipe' : 'recipes'}`);
    };
    const removeShopItem = async (itemOrId) => {
      const id = typeof itemOrId === 'string' ? itemOrId : itemOrId.id;
      const next = shopping.items.filter(it => it.id !== id);
      setShopping({ items: next });
      try { await api.shoppingSave(next); }
      catch (e) { showToast('Could not remove: ' + e.message, 'error'); }
    };
    const openAltsForItem = (item) => {
      const fromRecipeId = item.fromRecipes && item.fromRecipes[0];
      const recipe = fromRecipeId ? recipes.find(r => r.id === fromRecipeId) : null;
      setAltsTarget({ item, recipe });
    };
    const swapShopItem = async (item, newName) => {
      const next = shopping.items.map(it =>
        it.id === item.id
          ? { ...it, name: String(newName).toLowerCase().trim() }
          : it
      );
      setShopping({ items: next });
      setAltsTarget(null);
      try { await api.shoppingSave(next); showToast(`Swapped to ${newName}`); }
      catch (e) { showToast('Could not save: ' + e.message, 'error'); }
    };
    const addShopFromOneRecipe = async (recipe) => {
      const items = (recipe.ingredients || []).filter(s => !/^—.*—$/.test(s));
      if (items.length === 0) return showToast('No ingredients to add', 'error');
      const result = await api.shoppingAdd({ items, fromRecipe: recipe.id });
      setShopping({ items: result.items });
      showToast(`Added ${recipe.title} ingredients`);
    };

    // Fetch the connected account info on first load (after OAuth callback
    // we got a snapshot from the callback page, but refresh it on every boot).
    useEffect(() => {
      if (!unlocked) return;
      (async () => {
        try {
          const me = await api.whoami();
          setAccount(me);
          try { localStorage.setItem(DBX_ACCOUNT_KEY, JSON.stringify(me)); } catch {}
        } catch {}
      })();
    }, [unlocked]);

    // On boot, check if the URL has a #share=... payload. If so, decode it
    // and surface the share-receive screen (works whether or not the user
    // is connected — they'll need to connect to actually save).
    useEffect(() => {
      const hash = window.location.hash || '';
      const m = hash.match(/^#share=([\s\S]+)/);
      if (!m) { setShareLoading(false); return; }
      (async () => {
        const payload = await unpackShareHash(m[1]);
        if (payload) setSharePayload(payload);
        setShareLoading(false);
      })();
    }, []);

    // ---- Web Share Target: launched from the OS share sheet ----
    // The manifest declares `share_target.action = "/?share=1"` with GET params
    // {title, text, url}. iOS/Android push the shared URL into either `url`
    // (Android, modern iOS) or `text` (older iOS, some apps that share as
    // plain text). We extract whichever has a usable http(s) URL, open the
    // ImportSheet pre-filled, and clean the query so a refresh won't replay.
    useEffect(() => {
      const params = new URLSearchParams(window.location.search || '');
      if (!params.has('share')) return;
      const candidates = [params.get('url'), params.get('text'), params.get('title')];
      let shared = '';
      for (const c of candidates) {
        if (!c) continue;
        // The full string itself, OR the first http(s) URL inside it.
        const direct = c.trim();
        if (/^https?:\/\//i.test(direct)) { shared = direct; break; }
        const m = direct.match(/https?:\/\/\S+/i);
        if (m) { shared = m[0]; break; }
      }
      // Clean the address bar regardless — leaving ?share=1 in the URL would
      // re-trigger this on the next manual refresh.
      try {
        const url = new URL(window.location.href);
        url.search = '';
        window.history.replaceState({}, '', url.toString());
      } catch {}
      if (shared) {
        setImportInitialUrl(shared);
        setShowImport(true);
      }
    }, []);

    // ---- Pending-jobs check: surface in-flight imports queued elsewhere ----
    // When the iOS Shortcut posts a URL to /api/share-from-shortcut while the
    // app is closed, the worker chugs away in the background. On next app
    // open we want the user to see "yes, your recipe is being read" rather
    // than discovering it silently 30 seconds later. We check after unlock
    // (need a Dropbox token to query) and skip if a share target effect has
    // already opened the import sheet.
    useEffect(() => {
      if (!unlocked) return;
      if (showImport) return;  // share target took precedence
      let cancelled = false;
      (async () => {
        try {
          const { jobs } = await api.jobsPending();
          if (cancelled) return;
          if (Array.isArray(jobs) && jobs.length > 0) {
            const j = jobs[0];  // newest first
            setImportInitialUrl(j.url || '');
            setImportExistingJobId(j.id);
            setShowImport(true);
          }
        } catch {
          // Best-effort — don't bother the user if this fails.
        }
      })();
      return () => { cancelled = true; };
    }, [unlocked]);

    const openRecipe = (r) => setOpenId(r.id);
    const closeRecipe = () => setOpenId(null);

    const saveRecipe = async (recipe) => {
      const saved = await api.save(recipe.id, recipe);
      setRecipes(rs => {
        const exists = rs.some(r => r.id === saved.id);
        const next = exists ? rs.map(r => r.id === saved.id ? saved : r) : [saved, ...rs];
        saveCache(next);
        return next;
      });
      return saved;
    };

    const deleteRecipe = async (id) => {
      if (!confirm('Delete this recipe? It will also be removed from Dropbox.')) return;
      try {
        await api.remove(id);
        setRecipes(rs => {
          const next = rs.filter(r => r.id !== id);
          saveCache(next);
          return next;
        });
        showToast('Recipe deleted');
        closeRecipe();
      } catch (e) {
        showToast('Delete failed: ' + e.message, 'error');
      }
    };

    if (shareLoading) return null;

    // If a share payload came in via the URL hash, show the share-receive
    // screen ON TOP of whatever else. If user isn't connected yet, they
    // can still see the recipe preview but need to connect to save.
    if (sharePayload && !unlocked) {
      return (
        <div className="app-root" data-theme={dataTheme}>
          <ShareReceiveScreen
            payload={sharePayload}
            onCancel={() => { window.location.hash = ''; setSharePayload(null); }}
            onSaved={() => {}}
          />
          <div style={{position: 'fixed', bottom: 24, left: 24, right: 24, maxWidth: 600, margin: '0 auto'}}>
            <button className="primary-btn" onClick={() => { window.location.href = '/api/oauth/start'; }} style={{width: '100%'}}>
              Connect Dropbox to save it
            </button>
          </div>
        </div>
      );
    }

    if (!unlocked) return <WelcomeScreen dataTheme={dataTheme} />;

    if (sharePayload) {
      return (
        <div className="app-root" data-theme={dataTheme}>
          <ShareReceiveScreen
            payload={sharePayload}
            onCancel={() => { window.location.hash = ''; setSharePayload(null); }}
            onSaved={(saved) => {
              setRecipes(rs => { const next = [saved, ...rs.filter(x => x.id !== saved.id)]; saveCache(next); return next; });
              window.location.hash = '';
              setSharePayload(null);
              setOpenId(saved.id);
              showToast('Saved to your library');
            }}
          />
        </div>
      );
    }

    const openRecipeObj = recipes.find(r => r.id === openId);
    const editingRecipe = recipes.find(r => r.id === editingId);

    return (
      <div className="app-root" data-theme={dataTheme} style={{paddingBottom: '60px'}}>
        {tab === 'recipes' && (
          <LibraryScreen
            recipes={recipes}
            search={search} setSearch={setSearch}
            filters={filters} setFilters={setFilters}
            onOpen={openRecipe}
            onOpenImport={() => setShowImport(true)}
            onOpenFilter={() => setShowFilter(true)}
            onLongPress={(r) => setLongPressed(r)}
            onSwipeAction={(r, action) => {
              if (action === 'favorite') toggleFavorite(r.id);
              else if (action === 'delete') deleteRecipe(r.id);
            }}
            onRefresh={refresh}
          />
        )}
        {tab === 'shopping' && (
          <ShoppingScreen
            items={shopping.items}
            recipes={recipes}
            onToggle={toggleShopItem}
            onRemove={removeShopItem}
            onAlternatives={openAltsForItem}
            onClearChecked={clearCheckedShop}
            onClearAll={clearAllShop}
            onOpenAdd={() => setShowAddShop(true)}
          />
        )}
        {tab === 'settings' && (
          <SettingsSheet
            asTab
            darkMode={darkMode}
            setDarkMode={setDarkMode}
            onOpenStats={() => setShowStats(true)}
            recipesCount={recipes.length}
            account={account}
            units={units}
            setUnits={setUnits}
            language={language}
            setLanguage={setLanguage}
            location={location}
            setLocation={setLocation}
            devMode={devMode}
            setDevMode={setDevMode}
            showToast={showToast}
            onSignOut={async () => {
              if (!confirm('Disconnect Dropbox? Your recipes stay safe — you can reconnect anytime.')) return;
              try { await api.disconnect(); } catch {}
              localStorage.removeItem(DBX_TOKEN_KEY);
              localStorage.removeItem(DBX_ACCOUNT_KEY);
              localStorage.removeItem(RECIPES_CACHE_KEY);
              window.location.reload();
            }}
          />
        )}

        {/* Bottom tab bar — Recipes / Shopping / Settings. */}
        <div className="tabs-bottom" role="tablist">
          <button
            className={'tab-bottom ' + (tab === 'recipes' ? 'active' : '')}
            onClick={() => setTab('recipes')}
            aria-label="Recipes"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            Recipes
          </button>
          <button
            className={'tab-bottom ' + (tab === 'shopping' ? 'active' : '')}
            onClick={() => setTab('shopping')}
            aria-label="Shopping"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="9" cy="21" r="1.5" />
              <circle cx="18" cy="21" r="1.5" />
              <path d="M2.5 3h2.6l2.4 12.5a2 2 0 0 0 2 1.5h8.6a2 2 0 0 0 2-1.6l1.4-7.4H6" />
            </svg>
            Shopping
            {shopping.items.filter(it => !it.checked).length > 0 && (
              <span style={{position: 'absolute', top: 4, right: '30%', background: 'var(--accent)', color: 'oklch(0.99 0 0)', fontSize: 9, fontWeight: 700, minWidth: 16, height: 16, padding: '0 4px', borderRadius: 999, display: 'grid', placeItems: 'center'}}>
                {shopping.items.filter(it => !it.checked).length}
              </span>
            )}
          </button>
          <button
            className={'tab-bottom ' + (tab === 'settings' ? 'active' : '')}
            onClick={() => setTab('settings')}
            aria-label="Settings"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
            Settings
          </button>
        </div>


        {showFilter && (
          <FilterSheet
            recipes={recipes}
            filters={filters}
            setFilters={setFilters}
            onClose={() => setShowFilter(false)}
          />
        )}

        {showStats && (
          <StatsSheet
            recipes={recipes}
            devMode={devMode}
            onClose={() => setShowStats(false)}
          />
        )}

        {showAddShop && (
          <AddShoppingSheet
            recipes={recipes}
            onClose={() => setShowAddShop(false)}
            onAddTyped={addShopTyped}
            onAddPhoto={addShopPhoto}
            onAddFromRecipes={addShopFromRecipes}
          />
        )}

        {altsTarget && (
          <AlternativesSheet
            item={altsTarget.item}
            recipe={altsTarget.recipe}
            location={location}
            onClose={() => setAltsTarget(null)}
            onSwap={swapShopItem}
            onRemove={(it) => { removeShopItem(it); setAltsTarget(null); }}
          />
        )}

        {/* When on shopping tab, the FAB opens the add-shopping sheet instead. */}
        {tab === 'shopping' && (
          <button className="fab" onClick={() => setShowAddShop(true)} aria-label="Add to shopping list">
            <Icon.Plus />
          </button>
        )}

        {longPressed && (
          <QuickActions
            recipe={longPressed}
            onClose={() => setLongPressed(null)}
            onOpen={() => openRecipe(longPressed)}
            onToggleFav={() => toggleFavorite(longPressed.id)}
            onDelete={() => deleteRecipe(longPressed.id)}
          />
        )}

        {openRecipeObj && !editingRecipe && (
          <DetailScreen
            recipe={openRecipeObj}
            onClose={closeRecipe}
            onSave={saveRecipe}
            onDelete={() => deleteRecipe(openRecipeObj.id)}
            onEdit={() => setEditingId(openRecipeObj.id)}
            onAddToShopping={async () => {
              try { await addShopFromOneRecipe(openRecipeObj); }
              catch (e) { showToast('Could not add: ' + e.message, 'error'); }
            }}
            onShare={async () => {
              try {
                let videoUrl = null;
                if (openRecipeObj.videoPath) {
                  try {
                    const r = await api.shareLink(openRecipeObj.id);
                    videoUrl = r.videoUrl || null;
                  } catch (e) {
                    console.warn('shared video link failed', e);
                  }
                }
                // Strip large/personal fields before sharing.
                const sharable = {
                  title:        openRecipeObj.title,
                  description:  openRecipeObj.description,
                  ingredients:  openRecipeObj.ingredients || [],
                  instructions: openRecipeObj.instructions || [],
                  prepTime:     openRecipeObj.prepTime,
                  cookTime:     openRecipeObj.cookTime,
                  totalTime:    openRecipeObj.totalTime,
                  servings:     openRecipeObj.servings,
                  image:        openRecipeObj.image,
                  author:       openRecipeObj.author,
                  sourceUrl:    openRecipeObj.sourceUrl,
                  extractedBy:  openRecipeObj.extractedBy,
                };
                const hash = await packShareHash({ recipe: sharable, videoUrl });
                const shareUrl = window.location.origin + '/#share=' + hash;
                if (navigator.share) {
                  try {
                    await navigator.share({ title: openRecipeObj.title || 'Recipe', url: shareUrl });
                  } catch {}
                } else if (navigator.clipboard) {
                  await navigator.clipboard.writeText(shareUrl);
                  showToast('Share link copied');
                } else {
                  prompt('Copy this share link:', shareUrl);
                }
              } catch (e) {
                showToast('Share failed: ' + e.message, 'error');
              }
            }}
            units={units}
            setUnits={setUnits}
          />
        )}

        {editingRecipe && (
          <EditForm
            recipe={editingRecipe}
            onCancel={() => setEditingId(null)}
            onSave={async (next) => {
              const saved = await saveRecipe(next);
              setEditingId(null);
              showToast('Updated');
              return saved;
            }}
          />
        )}

        {showImport && (
          <ImportSheet
            initialUrl={importInitialUrl}
            existingJobId={importExistingJobId}
            language={language}
            onClose={() => { setShowImport(false); setImportInitialUrl(''); setImportExistingJobId(null); }}
            showToast={showToast}
            recipes={recipes}
            onOpenExisting={(existing) => {
              setShowImport(false);
              setOpenId(existing.id);
              showToast('Already in your library');
            }}
            onPreviewSave={async (recipe) => {
              const saved = await saveRecipe(recipe);
              setShowImport(false);
              setOpenId(saved.id);
              showToast('Saved to your library');
              return saved;
            }}
            onImported={(saved) => {
              setRecipes(rs => {
                const next = [saved, ...rs.filter(x => x.id !== saved.id)];
                saveCache(next);
                return next;
              });
              setShowImport(false);
              setOpenId(saved.id);
              showToast('Recipe imported');
            }}
          />
        )}

        {toastNode}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
