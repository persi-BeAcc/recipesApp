<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#e8eedc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="My Kitchen" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>My Kitchen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ---------- THEME (Thyme — soft herb green · linen) ---------- */
    :root {
      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-ui:      'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

      --header-bg:    oklch(0.74 0.040 125);
      --header-ink:   oklch(0.22 0.025 125);
      --header-ink-2: oklch(0.36 0.022 125);
      --header-line:  oklch(0.62 0.045 125);

      --accent:       oklch(0.42 0.058 125);
      --accent-soft:  oklch(0.93 0.022 125);
      --accent-ink:   oklch(0.34 0.058 125);

      --bg:        oklch(0.975 0.010 90);
      --bg-elev:   oklch(0.995 0.005 90);
      --bg-sunk:   oklch(0.95  0.012 90);
      --ink:       oklch(0.22 0.014 85);
      --ink-2:     oklch(0.44 0.012 85);
      --ink-3:     oklch(0.62 0.010 85);
      --line:      oklch(0.90 0.010 85);
      --line-strong: oklch(0.83 0.012 85);

      --shadow-card:  0 1px 2px oklch(0.20 0.02 70 / 0.04), 0 1px 3px oklch(0.20 0.02 70 / 0.06);
      --shadow-fab:   0 6px 18px oklch(0 0 0 / 0.18), 0 2px 4px oklch(0 0 0 / 0.10);
      --shadow-sheet: 0 -8px 40px oklch(0.20 0.02 70 / 0.16);

      --radius-card:       14px;
      --radius-card-tight: 12px;
      --radius-pill:       999px;

      --gap: 12px;
    }

    /* Dark mode — set [data-theme="dark"] on whichever screen-level container
       is currently mounted (.app-root in normal use, .gate on the welcome
       screen). Use a generic selector so all screens pick it up. */
    [data-theme="dark"] {
      --header-bg:    oklch(0.32 0.030 125);
      --header-ink:   oklch(0.95 0.008 90);
      --header-ink-2: oklch(0.80 0.010 90);
      --header-line:  oklch(0.22 0.020 125);

      --accent:       oklch(0.62 0.060 125);
      --accent-soft:  oklch(0.30 0.030 125);
      --accent-ink:   oklch(0.85 0.060 125);

      --bg:        oklch(0.16 0 0);
      --bg-elev:   oklch(0.22 0 0);
      --bg-sunk:   oklch(0.13 0 0);
      --ink:       oklch(0.95 0 0);
      --ink-2:     oklch(0.78 0 0);
      --ink-3:     oklch(0.58 0 0);
      --line:      oklch(0.28 0 0);
      --line-strong: oklch(0.40 0 0);

      /* Light, single-layer card shadow. The previous heavy two-layer dark
         shadow rendered with a faint pink/red fringe on iOS Safari due to
         sub-pixel chromatic aberration around the card's rounded corners.
         A subtle inner ring + small drop is plenty to read as elevated. */
      --shadow-card:  0 0 0 1px oklch(1 0 0 / 0.04), 0 2px 6px oklch(0 0 0 / 0.35);
      --shadow-fab:   0 6px 18px oklch(0 0 0 / 0.45), 0 2px 4px oklch(0 0 0 / 0.28);
      --shadow-sheet: 0 -8px 40px oklch(0 0 0 / 0.5);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior: none;
      touch-action: pan-y;
    }
    body {
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
    input, textarea { font-family: inherit; }

    /* ---------- APP SHELL ---------- */
    /* Natural body scrolling — same pattern as the invoices app. Header uses
       position: sticky on the body's scroll, FAB is position: fixed. No
       nested overflow:auto, which iOS Safari handles poorly in PWA mode. */
    .app-root {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      position: relative;
    }
    @media (min-width: 720px) {
      .app-root { box-shadow: 0 0 60px oklch(0 0 0 / 0.04); }
    }

    .screen { display: flex; flex-direction: column; }

    /* ---------- HEADER ---------- */
    .lib-header {
      padding: 14px 16px;
      background: var(--header-bg);
      z-index: 5;
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--header-line);
    }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .brand {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--header-ink);
    }
    .brand .dot { color: var(--accent); }
    .header-count {
      font-size: 12px;
      color: var(--header-ink-2);
      font-weight: 500;
    }
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      height: 38px;
      transition: border-color 160ms, background 160ms;
      min-width: 0;
    }
    .search-input:focus-within {
      border-color: var(--accent);
      background: var(--bg-elev);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent);
    }
    .search-input svg { color: var(--ink-3); flex-shrink: 0; }
    .search-input input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: var(--ink);
      min-width: 0;
    }
    .search-input input::placeholder { color: var(--ink-3); }
    .search-clear {
      font-size: 16px;
      color: var(--ink-3);
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--line);
      flex-shrink: 0;
    }

    .filter-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      display: grid;
      place-items: center;
      position: relative;
      color: var(--ink);
      flex-shrink: 0;
      transition: transform 160ms, background 160ms, border-color 160ms;
    }
    .filter-btn:active { transform: scale(0.94); }
    .filter-btn:hover  { border-color: var(--ink-3); }
    .filter-btn.has-active {
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-color: var(--accent);
    }
    .filter-count {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--header-bg);
      color: var(--header-ink);
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 2px solid var(--bg-elev);
      line-height: 1;
    }
    .filter-btn.has-active .filter-count {
      background: oklch(0.99 0 0);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* ---------- BOTTOM TABS ---------- */
    .tabs-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      background: var(--bg-elev);
      border-top: 1px solid var(--line);
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 18;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: color-mix(in oklch, var(--bg-elev) 85%, transparent);
    }
    .tab-bottom {
      flex: 1;
      padding: 9px 0 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--ink-3);
      cursor: pointer;
      transition: color 140ms;
      letter-spacing: 0.02em;
      position: relative;
    }
    .tab-bottom svg { stroke: currentColor; }
    .tab-bottom.active { color: var(--accent); }
    .tab-bottom.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30%;
      right: 30%;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
    }

    /* ---------- SHOPPING SCREEN ---------- */
    .shop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .shop-category-heading {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-ink);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 18px 0 8px;
      border-bottom: 1px solid var(--line);
      margin: 0;
    }
    .shop-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 4px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }
    /* Dim only the content, not the row itself — the row's background must stay
       fully opaque so the swipe-action panels (red Remove / blue Alternatives)
       behind it don't bleed through on checked items. */
    .shop-row.checked .shop-content,
    .shop-row.checked .shop-check {
      opacity: 0.45;
      transition: opacity 200ms;
    }
    .shop-row.checked .shop-name { text-decoration: line-through; }
    .shop-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--line-strong);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-top: 1px;
      color: oklch(0.99 0 0);
      transition: background 160ms, border-color 160ms;
    }
    .shop-row.checked .shop-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .shop-content { flex: 1; min-width: 0; }
    .shop-name {
      font-size: 14.5px;
      line-height: 1.4;
      color: var(--ink);
      font-weight: 500;
    }
    .shop-meta {
      display: flex;
      gap: 6px;
      align-items: baseline;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .shop-qty {
      font-size: 12.5px;
      color: var(--accent-ink);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .shop-note {
      font-size: 12px;
      color: var(--ink-3);
      font-style: italic;
    }
    .shop-from-recipe {
      font-size: 11px;
      color: var(--ink-3);
    }
    /* Swipe action backgrounds — revealed when the row translates */
    .shop-row-wrap {
      position: relative;
      overflow: hidden;
    }
    .shop-swipe-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 8px;
      font-size: 12.5px;
      font-weight: 600;
      color: oklch(0.99 0 0);
      pointer-events: none;
    }
    .shop-swipe-remove {
      background: oklch(0.50 0.16 25);
      justify-content: flex-start;
    }
    .shop-swipe-alt {
      background: oklch(0.46 0.10 230);
      justify-content: flex-end;
    }
    .shop-actions-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .shop-count-pill {
      font-size: 12px;
      color: var(--ink-2);
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 12px;
      font-weight: 500;
    }

    /* Add-shopping sheet tabs */
    .add-shop-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      background: var(--bg-sunk);
      padding: 3px;
      border-radius: 10px;
    }
    .add-shop-tab {
      flex: 1;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-3);
      border-radius: 8px;
      cursor: pointer;
      transition: all 160ms;
      text-align: center;
    }
    .add-shop-tab.active {
      background: var(--bg-elev);
      color: var(--ink);
      box-shadow: 0 1px 3px oklch(0 0 0 / 0.06);
    }
    .add-shop-textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg-elev);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      resize: vertical;
      margin-bottom: 14px;
    }
    .add-shop-textarea:focus { border-color: var(--accent); }
    .photo-pick-card {
      border: 2px dashed var(--line-strong);
      border-radius: 12px;
      padding: 28px 18px;
      text-align: center;
      cursor: pointer;
      transition: border-color 160ms, background 160ms;
      margin-bottom: 14px;
    }
    .photo-pick-card:hover { border-color: var(--accent); background: var(--accent-soft); }
    .photo-pick-card .icon { font-size: 38px; margin-bottom: 6px; opacity: 0.7; }
    .photo-pick-card .title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
    .photo-pick-card .sub   { font-size: 12px; color: var(--ink-3); }
    .recipe-pick-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 4px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
    }
    .recipe-pick-row:last-child { border-bottom: none; }
    .recipe-pick-thumb {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-sunk);
      position: relative;
    }
    .recipe-pick-name { flex: 1; font-size: 13.5px; font-weight: 500; color: var(--ink); }
    .recipe-pick-check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 1.5px solid var(--line-strong);
      display: grid;
      place-items: center;
      color: oklch(0.99 0 0);
      flex-shrink: 0;
    }
    .recipe-pick-row.selected .recipe-pick-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Settings sheet */
    .settings-section { margin-bottom: 24px; }
    /* Tab variant of settings — same padding as .sheet so content layout
       stays identical, just embedded in the page instead of overlaying. */
    .settings-tab-screen {
      padding: 18px 22px calc(80px + env(safe-area-inset-bottom));
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 4px;
      gap: 14px;
      border-bottom: 1px solid var(--line);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-row-label { font-size: 14px; color: var(--ink); font-weight: 500; }
    .setting-row-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
    .setting-row-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 4px;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      background: transparent;
      text-align: left;
      cursor: pointer;
      transition: background 140ms;
    }
    .setting-row-btn:last-child { border-bottom: none; }
    .setting-row-btn:hover { background: var(--bg-sunk); }
    .setting-row-btn .setting-row-label { display: flex; align-items: center; gap: 10px; }
    .setting-row-btn .chev { color: var(--ink-3); font-size: 18px; }
    .setting-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--accent);
    }
    .setting-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .setting-status.warn { color: oklch(0.55 0.12 60); }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 26px;
      background: var(--line-strong);
      border-radius: 999px;
      cursor: pointer;
      transition: background 200ms;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 22px;
      height: 22px;
      background: oklch(1 0 0);
      border-radius: 50%;
      box-shadow: 0 1px 3px oklch(0 0 0 / 0.2);
      transition: transform 200ms cubic-bezier(.2,.7,.3,1.4);
    }
    .toggle.on::after { transform: translateX(18px); }

    /* Stats sheet */
    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }
    .stat-card {
      flex: 1;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-value {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      color: var(--accent-ink);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .stat-label {
      font-size: 10.5px;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
      font-weight: 600;
    }
    .path-bars { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }
    .path-bar-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--ink-2);
      margin-bottom: 6px;
      gap: 8px;
    }
    .path-bar-label .name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .path-bar-label .count { color: var(--ink); font-weight: 600; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .path-bar-label .pct   { color: var(--ink-3); font-size: 11.5px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
    .path-bar-fill {
      height: 6px;
      background: var(--bg-sunk);
      border-radius: 3px;
      overflow: hidden;
    }
    .path-bar-fill > div {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 500ms cubic-bezier(.2,.7,.3,1);
    }

    /* Filter sheet sections */
    .filter-section { margin-bottom: 18px; }
    .filter-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      font-weight: 600;
      margin: 0 0 10px;
    }
    .chip-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sheet-bottom-actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      padding: 16px 0 0;
      margin-top: 8px;
    }

    /* Active filter / tag chips below search */
    .active-chips {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .active-chips::-webkit-scrollbar { display: none; }

    /* ---------- CHIPS ---------- */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: var(--radius-pill);
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-2);
      white-space: nowrap;
      transition: background 140ms, color 140ms, transform 100ms, border-color 140ms;
      flex-shrink: 0;
      animation: chip-in 220ms cubic-bezier(.2,.7,.3,1) both;
      letter-spacing: -0.005em;
      cursor: pointer;
    }
    .chip:active { transform: scale(0.96); }
    .chip.on,
    .chip-active {
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-color: var(--accent);
    }
    .chip-x {
      font-size: 13px;
      line-height: 1;
      margin-left: 2px;
      opacity: 0.6;
    }
    .chip-clear {
      background: var(--bg-elev);
      border: 1px solid var(--accent);
      color: var(--accent-ink);
      font-weight: 600;
    }
    .chip-clear:hover { background: var(--accent-soft); }
    @keyframes chip-in {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- PULL-TO-REFRESH ---------- */
    /* Native iOS feel: the header stays put (it's already sticky), and the
       content area below it translates DOWN as the user pulls. The indicator
       sits absolute at top:-62px of the content wrapper, so it lives "above"
       the content's untranslated start. With z-index 1 (below the header's
       z-index:5), it's hidden behind the header at rest and slides out from
       underneath as the wrapper translates down. */
    .ptr-content {
      position: relative;
      transition: transform 220ms cubic-bezier(.2,.7,.3,1);
      will-change: transform;
    }
    .ptr-content.dragging {
      transition: none;  /* track the finger 1:1 while dragging */
    }
    .ptr-indicator {
      position: absolute;
      top: -62px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 1;
    }
    .ptr-circle {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      box-shadow: 0 2px 8px oklch(0 0 0 / 0.12);
      display: grid;
      place-items: center;
      color: var(--accent);
      margin: 12px 0;
    }
    .ptr-arrow {
      transition: transform 200ms cubic-bezier(.2,.7,.3,1);
    }
    .ptr-arrow.flipped {
      transform: rotate(180deg);
    }
    .ptr-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid color-mix(in oklch, var(--accent) 25%, transparent);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: ptr-spin 700ms linear infinite;
    }
    @keyframes ptr-spin { to { transform: rotate(360deg); } }

    /* ---------- GRID ---------- */
    /* No more nested scroll container — content flows naturally inside the
       page. Padding-bottom keeps the FAB clear of the last row. */
    .lib-scroll {
      padding: 24px 14px 120px;
      position: relative;
    }
    .grid {
      display: grid;
      gap: var(--gap);
      grid-template-columns: 1fr 1fr;
    }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    .grid-item {
      animation: card-in 320ms cubic-bezier(.2,.7,.3,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- RECIPE CARD ---------- */
    .card-wrap {
      position: relative;
      border-radius: var(--radius-card);
      overflow: hidden;
    }
    .swipe-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 12.5px;
      font-weight: 600;
      color: oklch(0.99 0 0);
      border-radius: var(--radius-card);
      z-index: 0;
      gap: 8px;
    }
    .swipe-bg-fav {
      background: oklch(0.62 0.13 18);
      justify-content: flex-start;
    }
    .swipe-bg-del {
      background: oklch(0.50 0.16 25);
      justify-content: flex-end;
    }
    .flash-favorite { animation: flash-fav 600ms ease; }
    .flash-delete { animation: flash-del 600ms ease forwards; }
    @keyframes flash-fav {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(1.04); }
    }
    @keyframes flash-del {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.85); opacity: 0; }
    }

    .recipe-card {
      position: relative;
      background: var(--bg-elev);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
      transition: transform 160ms, box-shadow 160ms;
      display: flex;
      flex-direction: column;
    }
    .recipe-card:active { transform: scale(0.985); }
    .recipe-card-media {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg-sunk);
      overflow: hidden;
    }
    .recipe-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .recipe-card-body {
      padding: 10px 12px 12px;
    }
    .recipe-card-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.25;
      margin: 0 0 4px;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-wrap: pretty;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.5em;
    }
    .recipe-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    .meta-sep {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--ink-3);
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* Photographic placeholder (always rendered behind any real image) */
    .recipe-img-placeholder {
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(45deg, oklch(0.90 0 0) 0 3px, oklch(0.82 0 0 / 0.55) 3px 6px),
        linear-gradient(to bottom, transparent, oklch(0.65 0 0 / 0.32));
    }
    /* Real image overlays the placeholder. When src fails (404 / expired CDN
       URL) the overlay is removed and the placeholder shows through. */
    .recipe-img-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .recipe-img-letter {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 600;
      color: oklch(0.45 0 0);
      letter-spacing: -0.02em;
    }
    .recipe-img-caption {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: oklch(0.20 0.02 70 / 0.45);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .fav-pill {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: oklch(0.99 0 0 / 0.95);
      color: var(--accent);
      display: grid;
      place-items: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .source-corner {
      position: absolute;
      top: 8px;
      left: 8px;
      background: oklch(0.99 0 0 / 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--ink-2);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* ---------- BADGES ---------- */
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-2);
    }
    .source-badge.source-lg {
      font-size: 12.5px;
      color: oklch(0.99 0 0);
    }
    .source-ig { color: oklch(0.55 0.18 5); }
    .source-tt { color: oklch(0.20 0.020 200); }
    .source-yt { color: oklch(0.50 0.20 25); }
    .source-web { color: oklch(0.50 0.10 240); }
    .source-host { color: var(--ink-2); font-weight: 500; }
    .source-lg .source-host { color: oklch(0.99 0 0); }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11.5px;
      color: var(--ink-2);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- FAB ---------- */
    .fab {
      position: fixed;
      right: max(18px, calc((100vw - 720px) / 2 + 18px));
      /* Sits above the bottom tab bar (~52px tall) with a gap. */
      bottom: calc(74px + env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: oklch(0.99 0 0);
      display: grid;
      place-items: center;
      box-shadow: 0 4px 14px color-mix(in oklch, var(--accent) 32%, transparent), 0 2px 4px oklch(0 0 0 / 0.10);
      z-index: 20;
      transition: transform 200ms cubic-bezier(.2,.9,.3,1.4);
    }
    .fab:active { transform: scale(0.92); }

    /* ---------- EMPTY ---------- */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--ink-3);
    }
    .empty-emoji { font-size: 36px; margin-bottom: 12px; opacity: 0.6; }

    /* Quick actions sheet */
    .quick-overlay { align-items: center; }
    .quick-sheet {
      width: calc(100% - 36px);
      max-width: 380px;
      background: var(--bg-elev);
      border-radius: 14px;
      overflow: hidden;
      animation: quick-in 240ms cubic-bezier(.2,.7,.3,1) both;
      box-shadow: 0 16px 40px oklch(0 0 0 / 0.20);
      border: 1px solid var(--line);
    }
    @keyframes quick-in {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .quick-recipe {
      display: flex;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }
    .quick-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-sunk);
    }
    .quick-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .quick-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quick-meta {
      font-size: 11.5px;
      color: var(--ink-3);
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .quick-actions {
      display: flex;
      flex-direction: column;
    }
    .quick-action {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      text-align: left;
      border-bottom: 1px solid var(--line);
      transition: background 160ms;
    }
    .quick-action:last-child { border-bottom: none; }
    .quick-action:active { background: var(--bg-sunk); }
    .quick-action.danger { color: oklch(0.50 0.16 25); }
    .qa-emoji { font-size: 15px; width: 22px; text-align: center; opacity: 0.85; }

    /* Pull-to-refresh */
    .pull-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      margin-top: -40px;
      color: var(--ink-2);
    }
    .pull-spinner.spin { animation: spin 800ms linear infinite; }
    .empty h3 {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 4px;
      letter-spacing: -0.01em;
    }
    .empty p { margin: 0 0 12px; font-size: 13px; }
    .btn-text { color: var(--accent); font-weight: 600; font-size: 13px; padding: 8px 12px; }

    /* ---------- DETAIL ---------- */
    /* Single scroll container — hero is in document flow so it scrolls
       with the content, revealing more text as the user scrolls down.
       Close/heart buttons + action bar are sticky to viewport. */
    .detail-screen {
      position: fixed;
      inset: 0;
      max-width: 720px;
      margin: 0 auto;
      background: var(--bg);
      z-index: 30;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      animation: detail-in 280ms cubic-bezier(.2,.7,.3,1);
    }
    .detail-screen::-webkit-scrollbar { display: none; }
    @keyframes detail-in {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .detail-hero {
      position: relative;
      width: 100%;
      overflow: hidden;
      aspect-ratio: 1.1;
      max-height: 60vh;
      background: var(--bg-sunk);
    }
    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-hero-fade {
      position: absolute;
      inset: auto 0 0 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, oklch(0.16 0.02 70 / 0.62));
      pointer-events: none;
    }
    .detail-close, .detail-fav, .detail-source-btn {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top));
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: oklch(0.99 0 0 / 0.92);
      border: 1px solid color-mix(in oklch, var(--accent) 22%, transparent);
      color: var(--accent);
      display: grid;
      place-items: center;
      backdrop-filter: blur(8px) saturate(160%);
      -webkit-backdrop-filter: blur(8px) saturate(160%);
      transition: transform 160ms, background 160ms, color 160ms, border-color 160ms;
      z-index: 35;
    }
    /* Use CSS calc to position relative to viewport center within max-width frame */
    .detail-close      { left:  max(16px, calc((100vw - 720px) / 2 + 16px)); }
    .detail-source-btn { left:  max(64px, calc((100vw - 720px) / 2 + 64px)); }
    .detail-fav        { right: max(16px, calc((100vw - 720px) / 2 + 16px)); }
    .detail-close:active, .detail-fav:active, .detail-source-btn:active { transform: scale(0.9); }
    .detail-fav.on {
      background: var(--accent);
      border-color: var(--accent);
      color: oklch(0.99 0 0);
    }

    .detail-source-row {
      position: absolute;
      bottom: 18px;
      left: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
      pointer-events: none;
    }
    .detail-author {
      color: oklch(0.99 0 0);
      font-size: 12.5px;
      font-weight: 500;
      text-shadow: 0 1px 6px oklch(0 0 0 / 0.5);
    }

    .detail-body {
      padding: 22px 22px 0;
      background: var(--bg);
      border-radius: 18px 18px 0 0;
      margin-top: -18px;
      position: relative;
      z-index: 2;
    }
    .detail-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.02em;
      margin: 4px 0 12px;
      text-wrap: pretty;
    }
    .detail-description {
      color: var(--ink-2);
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 16px;
    }
    .detail-meta-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
    }
    .meta-pill-icon { font-size: 12px; }
    .meta-pill-label { text-transform: capitalize; }

    .tag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .tag {
      font-size: 11px;
      color: var(--ink-2);
      background: var(--bg-sunk);
      padding: 4px 9px;
      border-radius: 6px;
      font-weight: 500;
      border: 1px solid var(--line);
    }
    .tag-accent {
      background: var(--accent-soft);
      color: var(--accent-ink);
      border-color: transparent;
    }

    .tabs {
      display: flex;
      gap: 22px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }
    .tab {
      padding: 12px 0;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--ink-3);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 160ms;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      letter-spacing: -0.005em;
    }
    .tab.on { color: var(--ink); border-bottom-color: var(--ink); }
    .tab-count {
      font-size: 10.5px;
      background: var(--bg-sunk);
      padding: 1px 6px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      color: var(--ink-3);
    }
    .tab.on .tab-count { background: var(--accent-soft); color: var(--accent-ink); }

    .ingredient-list {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
    }
    .ing-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: opacity 200ms;
    }
    .ing-row.checked { opacity: 0.4; }
    .ing-row.checked .ing-text { text-decoration: line-through; }
    .ing-check {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 1.5px solid var(--line-strong);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-top: 1px;
      color: oklch(0.99 0 0);
      transition: background 160ms, border-color 160ms;
    }
    .ing-row.checked .ing-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .ing-text { font-size: 14px; line-height: 1.5; color: var(--ink); }
    .ing-section {
      list-style: none;
      padding: 14px 0 6px;
      margin: 6px 0 0;
      border-bottom: 1px solid var(--line);
      font-family: var(--font-display);
      font-size: 12.5px;
      font-weight: 700;
      color: var(--accent-ink);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .ingredient-list .ing-section:first-child { padding-top: 0; }

    .steps-list {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
    }
    .step-row {
      display: flex;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 6px;
      background: var(--bg-sunk);
      transition: background 200ms;
      border: 1px solid var(--line);
    }
    .step-row.active {
      background: var(--accent-soft);
      border-color: transparent;
    }
    .step-row.section-heading {
      background: transparent;
      border: none;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 0 4px;
      cursor: default;
    }
    .step-row.section-heading .step-num { display: none; }
    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-elev);
      color: var(--ink-2);
      font-weight: 600;
      font-size: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border: 1px solid var(--line);
    }
    .step-row.active .step-num {
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-color: var(--accent);
    }
    .step-text { font-size: 14px; line-height: 1.55; color: var(--ink); }

    .notes-block {
      background: var(--accent-soft);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--accent-ink);
      margin-bottom: 18px;
      white-space: pre-wrap;
    }
    .notes-edit {
      width: 100%;
      min-height: 90px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      color: var(--ink);
      resize: vertical;
      outline: none;
      font-family: inherit;
    }
    .notes-edit:focus { border-color: var(--accent); }

    /* Segmented control for US ↔ Metric */
    .units-toggle-row {
      display: inline-flex;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 9px;
      padding: 2px;
      margin: 0 0 16px;
      gap: 2px;
    }
    .units-toggle {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-3);
      border-radius: 7px;
      transition: background 160ms, color 160ms, box-shadow 160ms;
      cursor: pointer;
      letter-spacing: -0.005em;
    }
    .units-toggle.on {
      background: var(--bg-elev);
      color: var(--ink);
      box-shadow: 0 1px 2px oklch(0 0 0 / 0.06);
    }

    .lang-select {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 10px;
      cursor: pointer;
      flex-shrink: 0;
      max-width: 140px;
    }
    .lang-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent);
    }

    /* Cooking-active banner */
    .cooking-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-soft);
      color: var(--accent-ink);
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin: 0 0 14px;
      border: 1px solid color-mix(in oklch, var(--accent) 22%, transparent);
    }
    .dot-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.45; transform: scale(0.7); }
    }

    /* "How we extracted this" line in the notes tab */
    .extract-attribution {
      margin-top: 18px;
      padding: 10px 12px;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 11.5px;
      color: var(--ink-3);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .extract-attribution .label {
      font-weight: 600;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 10px;
    }

    .stars-row {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .star {
      cursor: pointer;
      width: 28px; height: 28px;
      color: var(--line-strong);
      transition: color 120ms, transform 80ms;

    .detail-actions-bar {

    @keyframes cook-confirm {

    @keyframes pop {
      0%   { transform: scale(1); }

      100% { transform: scale(1); }

    .detail-actions-bar .ghost-btn {
      flex: 0 0 auto;
      padding: 0 16px;
    }
    .detail-actions-bar .danger-btn {
      flex: 0 0 auto;

    /* Source embed (Instagram / TikTok) */
    .social-embed {

    /* Lazy video poster + play overlay */
    .video-poster-btn {

      display: block;
      width: 100%;
      height: auto;

    .video-poster-btn:active { transform: scale(0.997); }

    .video-poster-empty {

    .video-play-overlay {
      position: absolute;

    .video-play-button {

    .video-error-banner {

    /* ---------- SHEETS ---------- */
    .sheet-overlay {
      position: fixed;

    /* Bigger touch target around the visible bar so the drag-to-dismiss

    /* ---------- IMPORT SHEET ---------- */
    .url-input {
      display: flex;

      border: none;

      display: flex;
      gap: 8px;

    .detect-pill {

    .analysis-row {

    .analysis-label {
      font-size: 11px;
      text-transform: uppercase;

    .analysis-options {

      gap: 6px;

    .primary-btn {
      width: 100%;
      height: 46px;
      background: var(--accent);
      color: oklch(0.99 0 0);

    .ghost-btn {
      height: 46px;
      background: var(--bg-elev);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      padding: 0 22px;
    }

    .detecting {
      text-align: center;
      padding: 24px 0;
    }
    .detect-orbit {
      position: relative;
      width: 84px;
      height: 84px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }
    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      border-right-color: transparent;
      border-top-color: transparent;
      animation: spin 1.4s linear infinite;
    }
    .orbit-ring.r2 {
      inset: 12px;
      border-color: var(--line-strong);
      border-bottom-color: transparent;
      animation-duration: 2s;
      animation-direction: reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .orbit-emoji { font-size: 26px; opacity: 0.7; }
    .detect-steps {
      list-style: none;
      padding: 0;
      margin: 0;
      text-align: left;
      display: inline-block;
    }
    .d-step {
      font-size: 12.5px;
      padding: 4px 0;
      color: var(--ink-3);
    }
    .d-step.done { color: var(--ink); }
    .d-step.done::before { content: '✓ '; color: var(--accent); }

    .preview-card {
      display: flex;
      gap: 14px;
      background: var(--bg-sunk);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
    }
    .preview-media {
      width: 84px;
      height: 84px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-elev);
    }
    .preview-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-body { flex: 1; min-width: 0; }
    .preview-body h3 {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }
    .preview-stats {
      display: flex;
      gap: 12px;
      font-size: 11.5px;
      color: var(--ink-3);
    }
    .preview-stats b { color: var(--ink); font-weight: 600; }

    .sheet-actions {
      display: flex;
      gap: 10px;
    }

    /* ---------- PASSCODE GATE ---------- */
    .gate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg);
      z-index: 100;
    }
    .gate-card {
      background: var(--bg-elev);
      border-radius: 18px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--line);
      text-align: center;
      box-shadow: var(--shadow-card);
    }
    .gate-card .brand {
      font-size: 28px;
      margin-bottom: 6px;
      color: var(--ink);
    }
    .gate-card p { color: var(--ink-3); margin: 0 0 20px; font-size: 14px; }
    .gate-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 0.1em;
      outline: none;
      background: var(--bg-sunk);
      color: var(--ink);
      margin-bottom: 12px;
    }
    .gate-card input:focus { border-color: var(--accent); }

    /* ---------- TOAST ---------- */
    .toast {
      position: fixed;
      bottom: calc(100px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px oklch(0 0 0 / 0.2);
      z-index: 100;
      max-width: 90vw;
      animation: toast-in 220ms ease both;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translate(-50%, 8px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast.error { background: oklch(0.50 0.16 25); color: oklch(0.99 0 0); }

    /* ---------- ERROR BOX ---------- */
    .error-box {
      background: oklch(0.96 0.04 25);
      border: 1px solid oklch(0.84 0.10 25);
      color: oklch(0.40 0.16 25);
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    /* ---------- VERSION CHIP ---------- */
    .version {
      position: fixed;
      bottom: max(8px, calc(env(safe-area-inset-bottom) + 2px));
      left: 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-3);
      letter-spacing: 0.04em;
      opacity: 0.55;
      pointer-events: none;
      z-index: 41;
    }

    /* ---------- SPINNER ---------- */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid color-mix(in oklch, var(--accent) 30%, transparent);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    .spinner.on-accent {
      border-color: oklch(1 0 0 / 0.4);
      border-top-color: oklch(0.99 0 0);
    }

    /* ---------- FIELD STYLES (edit form inside detail) ---------- */
    .field { margin-bottom: 14px; }
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field-input, .field-textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg-elev);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
    }
    .field-textarea { min-height: 88px; resize: vertical; }
    .field-input:focus, .field-textarea:focus { border-color: var(--accent); }

    .row-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(e => console.warn('sw register failed', e));
      });
    }
  </script>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useMemo, useCallback, useRef } = React;

  const APP_VERSION       = 'v2026.05.02.40';
  const DBX_TOKEN_KEY     = 'recipes-dropbox-token-v1';
  const DBX_ACCOUNT_KEY   = 'recipes-dropbox-account-v1';
  const RECIPES_CACHE_KEY = 'recipes-cache-v1';
  const CHECKED_KEY       = 'recipes-checked-v1';

  // ---------- API client ----------
  function getDbxToken() { return localStorage.getItem(DBX_TOKEN_KEY) || ''; }

  function apiRequest(path, opts = {}) {
    const token = getDbxToken();
    const headers = Object.assign({}, opts.headers || {}, {
      'x-dropbox-token': token,
    });
    if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
      opts = { ...opts, body: JSON.stringify(opts.body) };
    }
    return fetch(path, { ...opts, headers }).then(async r => {
      if (r.status === 401) {
        localStorage.removeItem(DBX_TOKEN_KEY);
        localStorage.removeItem(DBX_ACCOUNT_KEY);
        window.location.reload();
        throw new Error('unauthorized');
      }
      const text = await r.text();
      let data;
      try { data = text ? JSON.parse(text) : null; } catch { data = { error: text }; }
      if (!r.ok) throw new Error((data && data.error) || `HTTP ${r.status}`);
      // Endpoints can attach a __usage array (token counts per external API
      // call). We persist locally so the dev-mode StatsSheet can show
      // approximate cost. Always append, regardless of dev mode — toggling on
      // shouldn't hide history that was generated while it was off.
      if (data && Array.isArray(data.__usage) && data.__usage.length > 0) {
        try { appendUsage(data.__usage); } catch {}
      }
      return data;
    });
  }
  const api = {
    list:           ()              => apiRequest('/api/recipes'),
    get:            (id)            => apiRequest(`/api/recipes?id=${encodeURIComponent(id)}`),
    save:           (id, r)         => apiRequest(`/api/recipes?id=${encodeURIComponent(id)}`, { method: 'PUT', body: r }),
    remove:         (id)            => apiRequest(`/api/recipes?id=${encodeURIComponent(id)}`, { method: 'DELETE' }),
    extract:        (url, language) => apiRequest('/api/recipes?extract=1', { method: 'POST', body: { url, language } }),
    extractVideo:   (url, analysis, language) => apiRequest('/api/extract-video', { method: 'POST', body: { url, analysis, language } }),
    jobStatus:      (jobId)         => apiRequest(`/api/job-status?id=${encodeURIComponent(jobId)}`),
    jobsPending:    ()              => apiRequest('/api/job-status'),
    videoLink:      (id)            => apiRequest(`/api/video-link?id=${encodeURIComponent(id)}`),
    thumbLink:      (id)            => apiRequest(`/api/video-link?id=${encodeURIComponent(id)}&kind=thumb`),
    whoami:         ()              => apiRequest('/api/whoami'),
    disconnect:     ()              => apiRequest('/api/whoami?action=disconnect', { method: 'POST', body: {} }),
    shareLink:      (id)            => apiRequest(`/api/share?id=${encodeURIComponent(id)}`, { method: 'POST', body: {} }),
    saveShared:     (recipe, videoUrl) => apiRequest('/api/share', { method: 'POST', body: { recipe, videoUrl } }),
    shoppingList:   ()              => apiRequest('/api/shopping'),
    shoppingSave:   (items)         => apiRequest('/api/shopping', { method: 'PUT', body: { items } }),
    shoppingClear:  ()              => apiRequest('/api/shopping', { method: 'DELETE' }),
    shoppingAdd:    (body)          => apiRequest('/api/shopping/add', { method: 'POST', body }),
    shoppingAlternatives: (body)    => apiRequest('/api/shopping/alternatives', { method: 'POST', body }),
  };

  // ---------- URL classification ----------
  function detectPlatform(url) {
    try {
      const host = new URL(url).hostname.replace(/^www\./, '').toLowerCase();
      if (host === 'instagram.com' || host === 'instagr.am' || host.endsWith('.instagram.com')) return 'instagram';
      if (host === 'tiktok.com' || host === 'vm.tiktok.com' || host.endsWith('.tiktok.com')) return 'tiktok';
      if (host === 'youtube.com' || host === 'youtu.be' || host === 'm.youtube.com'
          || host === 'music.youtube.com' || host.endsWith('.youtube.com')) return 'youtube';
    } catch {}
    return 'web';
  }
  function isVideoUrl(url) {
    const p = detectPlatform(url);
    return p === 'instagram' || p === 'tiktok' || p === 'youtube';
  }
  // Pull the YouTube video ID from any of the URL shapes YT exposes:
  //   youtu.be/ID, /watch?v=ID, /shorts/ID, /embed/ID, /v/ID, /live/ID
  function youtubeId(url) {
    try {
      const u = new URL(url);
      if (u.hostname === 'youtu.be') {
        return u.pathname.split('/').filter(Boolean)[0] || '';
      }
      const v = u.searchParams.get('v');
      if (v) return v;
      const m = u.pathname.match(/^\/(shorts|embed|v|live)\/([^\/?#]+)/);
      if (m) return m[2];
    } catch {}
    return '';
  }
  function urlHost(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return ''; }
  }
  // Normalize URLs for duplicate-detection. Strips tracking params, trailing
  // slash, and the URL fragment, so an IG reel pasted with `?igsh=...` query
  // matches the same reel pasted clean.
  function normalizeUrl(u) {
    if (!u) return '';
    try {
      const p = new URL(u);
      p.hash = '';
      const drop = ['igsh', 'igshid', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'fbclid', '_t', '_r'];
      for (const k of drop) p.searchParams.delete(k);
      let s = p.toString();
      // Strip trailing slash on path (preserve query if present)
      s = s.replace(/\/(\?|$)/, '$1');
      return s.toLowerCase();
    } catch {
      return String(u).trim().toLowerCase();
    }
  }

  // ---------- Helpers ----------
  function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function loadCache()                    { try { return JSON.parse(localStorage.getItem(RECIPES_CACHE_KEY) || 'null'); } catch { return null; } }
  function saveCache(recipes)             { try { localStorage.setItem(RECIPES_CACHE_KEY, JSON.stringify(recipes)); } catch {} }
  function loadChecked(id)                { try { return JSON.parse(localStorage.getItem(CHECKED_KEY + ':' + id) || '[]'); } catch { return []; } }
  function saveChecked(id, arr)           { try { localStorage.setItem(CHECKED_KEY + ':' + id, JSON.stringify(arr)); } catch {} }
  function firstLetter(s) {
    if (!s) return '🥘';
    const c = s.trim().charAt(0).toUpperCase();
    return /[A-Z]/.test(c) ? c : '🥘';
  }
  function timeLabel(r) {
    return r.totalTime || r.cookTime || r.prepTime || '';
  }

  // Translate the technical extractedBy id into a human-friendly label so the
  // user can see at a glance how the recipe was pulled (and whether it was
  // free, cheap, or used the heavy AI paths).
  function extractedByLabel(id) {
    if (!id) return null;
    const map = {
      'json-ld':                'Recipe site (structured data)',
      'json-ld-partial':        'Recipe site (partial data — review)',
      'claude':                 'Recipe site (AI extraction)',
      'caption-only':           'Caption / description text',
      'caption-link (json-ld)': 'Link in caption (structured data)',
      'caption-link (claude)':  'Link in caption (AI extraction)',
      'whisper+claude':         'Audio transcript (Whisper) + AI',
      'whisper+claude+frames':  'Audio + visible text frames + AI',
      'gemini':                 'Full video (Gemini)',
      'gemini-fallback':        'Full video (silent reel auto-fallback)',
    };
    return map[id] || id;
  }

  // ---------- Unit conversion (metric ↔ US) ----------
  // Default to metric for non-US locales; fall back to US for en-US.
  const UNITS_KEY = 'recipes-units-v1';
  function defaultUnits() {
    const saved = localStorage.getItem(UNITS_KEY);
    if (saved === 'us' || saved === 'metric') return saved;
    const lang = (navigator.language || 'en-US').toLowerCase();
    return lang.startsWith('en-us') || lang === 'en' ? 'us' : 'metric';
  }
  function saveUnits(u) { try { localStorage.setItem(UNITS_KEY, u); } catch {} }

  // ---------- Preferred language (for server-side translation on import) ----------
  // Stored as an ISO-639-1 code. The backend pipeline reads `language` off the
  // import request and, if the source recipe isn't already in that language,
  // translates it before saving. Empty string means "don't translate".
  const LANGUAGE_KEY = 'recipes-language-v1';
  const SUPPORTED_LANGUAGES = [
    { code: 'en', label: 'English' },
    { code: 'es', label: 'Spanish' },
    { code: 'fr', label: 'French' },
    { code: 'de', label: 'German' },
    { code: 'pt', label: 'Portuguese' },
    { code: 'it', label: 'Italian' },
    { code: 'nl', label: 'Dutch' },
    { code: 'ja', label: 'Japanese' },
    { code: 'ko', label: 'Korean' },
    { code: 'zh', label: 'Chinese' },
  ];
  function defaultLanguage() {
    const saved = localStorage.getItem(LANGUAGE_KEY);
    if (saved && SUPPORTED_LANGUAGES.some(l => l.code === saved)) return saved;
    // Best-effort default from the browser locale, falling back to English.
    const lang = (navigator.language || 'en').toLowerCase().split('-')[0];
    return SUPPORTED_LANGUAGES.some(l => l.code === lang) ? lang : 'en';
  }
  function saveLanguage(code) { try { localStorage.setItem(LANGUAGE_KEY, code); } catch {} }

  // ---------- Location (opt-in, biases ingredient alternatives) ----------
  // Persisted shape: { lat, lon, label, country, ts } or null.
  // We never call navigator.geolocation automatically — only when the user
  // explicitly flips the toggle in Settings. Once granted, we reverse-geocode
  // to a coarse "City, Country" label (free no-auth endpoint) and pass that
  // along with /api/shopping/alternatives requests so Claude can prefer subs
  // commonly stocked in that region.
  const LOCATION_KEY = 'recipes-location-v1';
  function loadLocation() {
    try {
      const raw = localStorage.getItem(LOCATION_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object' && (parsed.label || parsed.country)) return parsed;
    } catch {}
    return null;
  }
  function saveLocation(loc) {
    try {
      if (loc) localStorage.setItem(LOCATION_KEY, JSON.stringify(loc));
      else localStorage.removeItem(LOCATION_KEY);
    } catch {}
  }
  // Reverse-geocode lat/lon → "City, Country". BigDataCloud's client endpoint
  // is free with no key. If it fails, we still store the coords as the label.
  async function reverseGeocode(lat, lon) {
    try {
      const url = `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${encodeURIComponent(lat)}&longitude=${encodeURIComponent(lon)}&localityLanguage=en`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('reverse geocode failed');
      const j = await r.json();
      const city = j.city || j.locality || j.principalitySubdivision || '';
      const country = j.countryName || '';
      const label = [city, country].filter(Boolean).join(', ');
      return { label: label || `${lat.toFixed(2)}, ${lon.toFixed(2)}`, country };
    } catch {
      return { label: `${lat.toFixed(2)}, ${lon.toFixed(2)}`, country: '' };
    }
  }
  function requestGeolocationOnce() {
    return new Promise((resolve, reject) => {
      if (!('geolocation' in navigator)) {
        reject(new Error('Geolocation is not available on this device.'));
        return;
      }
      // Wallclock guard — iOS can leave the promise pending forever if the
      // user dismisses the permission prompt without tapping Allow/Don't Allow
      // (e.g. backgrounds the app). Native `timeout` only times the fix
      // acquisition, not the prompt itself, so we add our own.
      let settled = false;
      const wallclock = setTimeout(() => {
        if (settled) return;
        settled = true;
        reject(new Error('Location request timed out — please tap again.'));
      }, 15000);
      const finish = (fn) => (...args) => {
        if (settled) return;
        settled = true;
        clearTimeout(wallclock);
        fn(...args);
      };
      navigator.geolocation.getCurrentPosition(
        finish((pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude })),
        finish((err) => {
          if (err && err.code === 1) reject(new Error('Location permission denied. You can enable it in your browser settings.'));
          else if (err && err.code === 3) reject(new Error('Location request timed out — please try again.'));
          else reject(new Error((err && err.message) || 'Could not get location.'));
        }),
        { enableHighAccuracy: false, timeout: 12000, maximumAge: 60 * 60 * 1000 }
      );
    });
  }

  // ---------- Dev mode + API usage tracking ----------
  // Server endpoints can attach a __usage array to their response. We append
  // those entries to localStorage so the dev-mode StatsSheet can show
  // approximate cost per provider/model. Estimates only — actual billing is
  // whatever the providers say it is.
  const DEV_MODE_KEY = 'recipes-dev-mode-v1';
  const USAGE_KEY = 'recipes-usage-v1';
  const USAGE_MAX_ENTRIES = 1000;  // ring-buffer cap so localStorage doesn't bloat

  function loadDevMode() {
    try { return localStorage.getItem(DEV_MODE_KEY) === 'true'; } catch { return false; }
  }
  function saveDevMode(on) {
    try { localStorage.setItem(DEV_MODE_KEY, on ? 'true' : 'false'); } catch {}
  }
  function loadUsage() {
    try {
      const raw = localStorage.getItem(USAGE_KEY);
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch { return []; }
  }
  function saveUsage(arr) {
    try { localStorage.setItem(USAGE_KEY, JSON.stringify(arr.slice(-USAGE_MAX_ENTRIES))); } catch {}
  }
  function appendUsage(entries) {
    if (!Array.isArray(entries) || entries.length === 0) return;
    const current = loadUsage();
    const stamped = entries
      .filter(e => e && typeof e === 'object')
      .map(e => ({ ts: Date.now(), ...e }));
    saveUsage(current.concat(stamped));
  }
  function clearUsage() { saveUsage([]); }

  // Approximate prices per provider/model.
  // Sources: Anthropic + Google + OpenAI public pricing pages, mid-2025.
  // Update if the pricing pages change. Tokens priced per million.
  const PRICING = {
    anthropic: {
      'claude-haiku-4-5-20251001': { in: 1.00,  out: 5.00,  unit: 'token' },
      'claude-haiku-4-5':          { in: 1.00,  out: 5.00,  unit: 'token' },
      'claude-sonnet-4-5':         { in: 3.00,  out: 15.00, unit: 'token' },
      _default:                    { in: 1.00,  out: 5.00,  unit: 'token' },
    },
    gemini: {
      'gemini-2.0-flash':          { in: 0.075, out: 0.30, unit: 'token' },
      'gemini-2.5-flash':          { in: 0.075, out: 0.30, unit: 'token' },
      _default:                    { in: 0.10,  out: 0.40, unit: 'token' },
    },
    openai: {
      'whisper-1':                 { perMinute: 0.006,    unit: 'minute' },
      _default:                    { perMinute: 0.006,    unit: 'minute' },
    },
    rapidapi: {
      _default:                    { perCall: 0.001,      unit: 'call' },
    },
  };

  // Estimate USD for a single usage entry.
  function priceUsage(entry) {
    const provider = (entry.provider || '').toLowerCase();
    const family = PRICING[provider];
    if (!family) return 0;
    const rate = family[entry.model] || family._default;
    if (!rate) return 0;
    if (rate.unit === 'token') {
      const input  = (entry.inputTokens  || 0) * (rate.in  / 1_000_000);
      const output = (entry.outputTokens || 0) * (rate.out / 1_000_000);
      return input + output;
    }
    if (rate.unit === 'minute') {
      const seconds = entry.audioSeconds || 0;
      return (seconds / 60) * rate.perMinute;
    }
    if (rate.unit === 'call') {
      return rate.perCall;
    }
    return 0;
  }

  function summarizeUsage(entries) {
    // Group by provider+model, sum counts/tokens/cost.
    const groups = {};
    let totalCost = 0;
    let totalCalls = 0;
    for (const e of entries) {
      const key = `${e.provider || '?'}::${e.model || 'unknown'}`;
      if (!groups[key]) {
        groups[key] = {
          provider: e.provider || '?',
          model: e.model || 'unknown',
          calls: 0,
          inputTokens: 0,
          outputTokens: 0,
          audioSeconds: 0,
          cost: 0,
        };
      }
      const g = groups[key];
      g.calls += 1;
      g.inputTokens  += e.inputTokens  || 0;
      g.outputTokens += e.outputTokens || 0;
      g.audioSeconds += e.audioSeconds || 0;
      const price = priceUsage(e);
      g.cost += price;
      totalCost += price;
      totalCalls += 1;
    }
    const list = Object.values(groups).sort((a, b) => b.cost - a.cost);
    return { groups: list, totalCost, totalCalls };
  }

  function parseQty(s) {
    s = String(s).trim();
    // mixed: "1 1/2"
    let m = s.match(/^(\d+)\s+(\d+)\s*\/\s*(\d+)$/);
    if (m) return parseFloat(m[1]) + parseInt(m[2]) / parseInt(m[3]);
    // pure fraction: "1/2"
    m = s.match(/^(\d+)\s*\/\s*(\d+)$/);
    if (m) return parseInt(m[1]) / parseInt(m[2]);
    // decimal/integer
    return parseFloat(s);
  }
  function fmt(n, unit) {
    if (n >= 100) return `${Math.round(n)} ${unit}`;
    if (n >= 10)  return `${Math.round(n)} ${unit}`;
    if (n >= 1)   return `${n.toFixed(1).replace(/\.0$/, '')} ${unit}`;
    return `${n.toFixed(2)} ${unit}`;
  }

  // Annotate measurements in arbitrary text with their converted equivalent in parens.
  // We always KEEP the original (so ratios/instructions stay verifiable), and add the
  // converted value alongside. When system='us' we leave the text unchanged.
  function convertText(text, system) {
    if (!text || system !== 'metric') return text || '';

    // Temperature: 350°F / 350 F / 350 degrees
    text = text.replace(/(\d{2,3})\s*°?\s*F\b/g, (_m, f) => {
      const c = Math.round((parseFloat(f) - 32) * 5 / 9);
      return `${f}°F (${c}°C)`;
    });

    // Volume — cups, tbsp, tsp, fl oz
    const volumeRe = /(\d+(?:\s+\d+\/\d+)?|\d+\/\d+|\d+(?:\.\d+)?)\s*(cups?\b|tbsps?\b|tablespoons?\b|tsps?\b|teaspoons?\b|fl\.?\s*ozs?\.?\b|fluid\s+ounces?\b)/gi;
    text = text.replace(volumeRe, (m, qty, unit) => {
      const q = parseQty(qty);
      if (!isFinite(q)) return m;
      const u = unit.toLowerCase().replace(/\./g, '').trim();
      let ml;
      if (/^cups?$/.test(u))                                      ml = q * 240;
      else if (/^tbsps?$|^tablespoons?$/.test(u))                  ml = q * 15;
      else if (/^tsps?$|^teaspoons?$/.test(u))                     ml = q * 5;
      else if (/^fl\s*ozs?$|^fluid\s+ounces?$/.test(u))            ml = q * 30;
      else return m;
      const out = ml >= 1000 ? fmt(ml / 1000, 'L') : `${Math.round(ml)} ml`;
      return `${m} (${out})`;
    });

    // Weight — oz, lb
    const weightRe = /(\d+(?:\s+\d+\/\d+)?|\d+\/\d+|\d+(?:\.\d+)?)\s*(oz\b|ozs\b|ounces?\b|lb\b|lbs\b|pounds?\b)/gi;
    text = text.replace(weightRe, (m, qty, unit) => {
      const q = parseQty(qty);
      if (!isFinite(q)) return m;
      const u = unit.toLowerCase();
      const isLb = /^lb|^pound/.test(u);
      const g = q * (isLb ? 453.6 : 28.35);
      const out = g >= 1000 ? fmt(g / 1000, 'kg') : `${Math.round(g)} g`;
      return `${m} (${out})`;
    });

    // Length — inches
    const lenRe = /(\d+(?:\s+\d+\/\d+)?|\d+\/\d+|\d+(?:\.\d+)?)\s*(inches?|in\b|")/gi;
    text = text.replace(lenRe, (m, qty) => {
      const q = parseQty(qty);
      if (!isFinite(q)) return m;
      const cm = q * 2.54;
      return `${m} (${cm.toFixed(1).replace(/\.0$/, '')} cm)`;
    });

    return text;
  }

  // ---------- Toast ----------
  let toastTimeout;
  function useToast() {
    const [toast, setToast] = useState(null);
    const show = useCallback((msg, type = 'info') => {
      setToast({ msg, type });
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => setToast(null), 3500);
    }, []);
    const node = toast ? <div className={'toast ' + (toast.type === 'error' ? 'error' : '')}>{toast.msg}</div> : null;
    return [show, node];
  }

  // ---------- Pull-to-refresh hook ----------
  // Touch-only gesture that fires `onRefresh` when the user pulls down past
  // PTR_THRESHOLD while already scrolled to the top of the page. Returns
  // {pullY, refreshing, dragging, containerRef}. Pull amount is dampened
  // to mimic native iOS rubber-banding.
  //
  // IMPORTANT: handlers read pull/refreshing state through refs, not closure
  // captures. An earlier version used useCallback handlers with state in
  // their deps — touch listeners ended up wired with stale `pullY` values
  // because attach() didn't clean up when its identity changed, and the
  // OLDEST listener (with pullY=0) fired first on touchend, setting
  // trackingRef=false before the latest one could trigger a refresh.
  const PTR_THRESHOLD = 70;        // pixels of pull required to trigger refresh
  const PTR_MAX_PULL = 120;        // visual cap so the indicator doesn't fly off
  function usePullToRefresh(onRefresh) {
    const [pullY, setPullYState] = useState(0);
    const [refreshing, setRefreshingState] = useState(false);
    const [dragging, setDraggingState] = useState(false);

    // Refs that mirror state, so event handlers can read the latest values
    // without needing to be re-bound when state changes.
    const pullYRef = useRef(0);
    const refreshingRef = useRef(false);
    const startYRef = useRef(0);
    const trackingRef = useRef(false);
    const onRefreshRef = useRef(onRefresh);
    useEffect(() => { onRefreshRef.current = onRefresh; }, [onRefresh]);

    const setPullY = useCallback((v) => { pullYRef.current = v; setPullYState(v); }, []);
    const setRefreshing = useCallback((v) => { refreshingRef.current = v; setRefreshingState(v); }, []);

    const containerRef = useRef(null);

    useEffect(() => {
      const el = containerRef.current;
      if (!el) return;

      const onTouchStart = (e) => {
        if (refreshingRef.current) return;
        // Only engage when the page is genuinely at the top — otherwise the
        // user is just scrolling normally and we shouldn't intercept.
        const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
        if (scrollTop > 0) { trackingRef.current = false; return; }
        trackingRef.current = true;
        startYRef.current = e.touches[0].clientY;
        setPullY(0);
      };

      const onTouchMove = (e) => {
        if (!trackingRef.current || refreshingRef.current) return;
        const dy = e.touches[0].clientY - startYRef.current;
        if (dy <= 0) {
          if (pullYRef.current !== 0) setPullY(0);
          setDraggingState(false);
          return;
        }
        const damped = Math.min(PTR_MAX_PULL, dy * 0.55);
        setPullY(damped);
        setDraggingState(true);
      };

      const onTouchEnd = async () => {
        if (!trackingRef.current) return;
        trackingRef.current = false;
        const triggered = pullYRef.current >= PTR_THRESHOLD;
        setDraggingState(false);
        if (triggered && !refreshingRef.current) {
          setRefreshing(true);
          setPullY(PTR_THRESHOLD);  // hold indicator at threshold during refresh
          try { await onRefreshRef.current?.(); } catch {}
          setRefreshing(false);
          setPullY(0);
        } else {
          setPullY(0);
        }
      };

      // Passive: we never call preventDefault, so scroll stays smooth.
      el.addEventListener('touchstart', onTouchStart, { passive: true });
      el.addEventListener('touchmove',  onTouchMove,  { passive: true });
      el.addEventListener('touchend',   onTouchEnd,   { passive: true });
      el.addEventListener('touchcancel', onTouchEnd,  { passive: true });
      return () => {
        el.removeEventListener('touchstart', onTouchStart);
        el.removeEventListener('touchmove',  onTouchMove);
        el.removeEventListener('touchend',   onTouchEnd);
        el.removeEventListener('touchcancel', onTouchEnd);
      };
    }, [setPullY, setRefreshing]);

    return { pullY, refreshing, dragging, containerRef };
  }

  // ---------- Icons ----------
  const Icon = {

  // ---------- Recipe placeholder image ----------
  // Always renders the textured placeholder as the background so the user
  // sees something instantly. The real image, if present, overlays on top
  // and silently slides into place when it loads. If the image 404s or its
  // CDN URL has expired (Instagram thumbnails do this), the overlay is
  // removed and the placeholder is visible underneath.
  //
  // For recipes with archived thumbnails (recipe.thumbPath), we lazily mint
  // a per-user Dropbox temporary link. The URL is cached at module scope so
  // a single grid render only triggers one API call per recipe.
  const _thumbUrlCache = new Map();
  function useThumbUrl(recipe) {
    const [url, setUrl] = useState(() => {
      if (recipe.thumbPath && _thumbUrlCache.has(recipe.id)) {
        const cached = _thumbUrlCache.get(recipe.id);
        return cached && typeof cached === 'string' ? cached : (recipe.image || '');
      }
      return recipe.image || '';
    });
    useEffect(() => {
      if (!recipe.thumbPath || !recipe.id) return;
      const cached = _thumbUrlCache.get(recipe.id);
      if (typeof cached === 'string') { setUrl(cached); return; }
      let cancelled = false;
      const p = cached || api.thumbLink(recipe.id).then(r => (r && r.url) || '').catch(() => '');
      _thumbUrlCache.set(recipe.id, p);
      p.then(u => {
        _thumbUrlCache.set(recipe.id, u);
        if (!cancelled && u) setUrl(u);
      });
      return () => { cancelled = true; };
    }, [recipe.id, recipe.thumbPath]);
    return url;
  }

  function RecipeMedia({ recipe }) {
    const [failed, setFailed] = useState(false);
    const imgUrl = useThumbUrl(recipe);
    return (
      <>
        <div className="recipe-img-placeholder">
          <span className="recipe-img-letter">{firstLetter(recipe.title)}</span>
          <span className="recipe-img-caption">{recipe.title ? recipe.title.split(' ').slice(0,3).join(' ') : 'recipe'}</span>
        </div>
        {imgUrl && !failed && (
          <img
            src={imgUrl}
            alt=""
            loading="lazy"
