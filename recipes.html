  // ---------- Time bucket helpers (filter sheet uses these) ----------
  const TIME_BUCKETS = [
    { id: 'fast',    label: 'Under 30 min', test: m => m > 0 && m <= 30 },
    { id: 'medium',  label: '30–60 min',    test: m => m > 30 && m <= 60 },
    { id: 'long',    label: 'Over 1 hr',    test: m => m > 60 },
  ];
  function recipeMinutes(r) {
    // Heuristic: parse "1h 30m" / "45m" / "2h" / numeric strings
    const candidate = r.totalTime || r.cookTime || r.prepTime || '';
    if (!candidate) return 0;
    const s = String(candidate).toLowerCase();
    const hMatch = s.match(/(\d+)\s*h/);
    const mMatch = s.match(/(\d+)\s*m(?!o)/); // m but not "month/min" word
    const numMatch = !hMatch && !mMatch ? s.match(/^(\d+)/) : null;
    return (hMatch ? parseInt(hMatch[1]) * 60 : 0)
         + (mMatch ? parseInt(mMatch[1]) : 0)
         + (numMatch ? parseInt(numMatch[1]) : 0);
  }
  const SOURCE_OPTIONS = [
    { id: 'web',       label: 'Recipe sites' },
    { id: 'instagram', label: 'Instagram' },
    { id: 'tiktok',    label: 'TikTok' },
    { id: 'youtube',   label: 'YouTube' },
  ];

  function emptyFilters() {
    return { tags: [], time: [], source: [], favorite: false };
  }
  function filterCount(f) {
    return f.tags.length + f.time.length + f.source.length + (f.favorite ? 1 : 0);
  }

  // ---------- Library ----------
  function LibraryScreen({ recipes, search, setSearch, filters, setFilters, onOpen, onOpenImport, onOpenFilter, onLongPress, onSwipeAction, onRefresh }) {

    // Pull-to-refresh — touchstart at scrollTop=0 + pull down past the
    // threshold triggers `onRefresh`. Catches in-flight imports queued
    // elsewhere (iOS Shortcut, share sheet) that may have completed since
    // page load.
    const { pullY, refreshing, dragging, containerRef } = usePullToRefresh(onRefresh);
    const ptrReady = pullY >= PTR_THRESHOLD;

    const allTags = useMemo(() => {
      const set = new Set();
      recipes.forEach(r => (r.tags || []).forEach(t => set.add(t)));
      return Array.from(set).sort();
    }, [recipes]);

    const visible = useMemo(() => {
      const q = (search || '').trim().toLowerCase();
      return recipes.filter(r => {
        if (filters.tags.length && !filters.tags.some(t => (r.tags || []).includes(t))) return false;
        if (filters.source.length) {
          const p = r.sourceUrl ? detectPlatform(r.sourceUrl) : 'web';
          if (!filters.source.includes(p)) return false;
        }
        if (filters.time.length) {
          const mins = recipeMinutes(r);
          const buckets = TIME_BUCKETS.filter(b => filters.time.includes(b.id));
          if (!buckets.some(b => b.test(mins))) return false;
        }
        if (filters.favorite && !r.favorite) return false;
        if (!q) return true;
        const hay = [
          r.title, r.description, r.author,
          (r.ingredients || []).join(' '),
          (r.tags || []).join(' '),
          r.notes || '',
        ].join(' ').toLowerCase();
        return hay.includes(q);
      }).sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
    }, [recipes, search, filters]);

    const fCount = filterCount(filters);

    const removeFilter = (group, val) => {
      setFilters(prev => {
        if (group === 'favorite') return { ...prev, favorite: false };
        return { ...prev, [group]: prev[group].filter(v => v !== val) };
      });
    };

    // Active chips below the search bar (only what's APPLIED, not all tags)
    const activeChips = [];
    filters.tags.forEach(t   => activeChips.push({ key: 'tag-' + t,    group: 'tags',   val: t, label: t }));
    filters.source.forEach(s => {
      const opt = SOURCE_OPTIONS.find(o => o.id === s);
      activeChips.push({ key: 'src-' + s, group: 'source', val: s, label: opt ? opt.label : s });
    });
    filters.time.forEach(t => {
      const opt = TIME_BUCKETS.find(o => o.id === t);
      activeChips.push({ key: 'time-' + t, group: 'time', val: t, label: opt ? opt.label : t });

    if (filters.favorite) activeChips.push({ key: 'fav', group: 'favorite', val: true, label: '♥ Favorites' });

    return (
      <div className="screen library-screen" ref={containerRef}>
        <div className="lib-header">
          <div className="brand-row">
            <div className="brand">My Kitchen<span className="dot">.</span></div>
            <div className="header-count">
              {recipes.length} {recipes.length === 1 ? 'recipe' : 'recipes'}
            </div>
          </div>
          <div className="search-row">
            <label className="search-input">
              <Icon.Search />
              <input
                type="text"

              {search && <button type="button" className="search-clear" onClick={() => setSearch('')} aria-label="Clear">×</button>}
            </label>
            <button
              className={'filter-btn ' + (fCount > 0 ? 'has-active' : '')}

            >
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                <path d="M4 6h16M7 12h10M10 18h4" />

              {fCount > 0 && <span className="filter-count">{fCount}</span>}
            </button>
          </div>
          {activeChips.length > 0 && (
            <div className="active-chips">
              {activeChips.map(c => (
                <button key={c.key} className="chip chip-active" onClick={() => removeFilter(c.group, c.val)}>
                  {c.label}

              ))}
              <button className="chip chip-clear" onClick={() => setFilters(emptyFilters())}>Clear all</button>
            </div>

        </div>

        <div
          className={'ptr-content' + (dragging ? ' dragging' : '')}
          style={{ transform: `translateY(${pullY}px)` }}
        >
          <div className="ptr-indicator" aria-hidden={pullY === 0 && !refreshing}>
            <div className="ptr-circle">
              {refreshing ? (
                <div className="ptr-spinner" aria-label="Refreshing" />
              ) : (
                <svg
                  className={'ptr-arrow' + (ptrReady ? ' flipped' : '')}
                  viewBox="0 0 24 24"
                  width="18"
                  height="18"
                  fill="none"

        <div className="lib-scroll">

          {recipes.length === 0 ? (
            <div className="empty">
              <div className="empty-emoji">🍳</div>
              <h3>Start your library</h3>

          ) : visible.length === 0 ? (

  function RecipeCard({ recipe, onOpen, onLongPress, onSwipeAction }) {
    const [pressed, setPressed] = useState(false);
    const [swipeX, setSwipeX] = useState(0);
    const [actionFlash, setActionFlash] = useState(null);
    const startRef = useRef(null);
    const longPressTimer = useRef(null);
    const longPressFired = useRef(false);

    const platform = recipe.sourceUrl ? detectPlatform(recipe.sourceUrl) : 'web';
    const sourceLabel = platform === 'instagram' ? 'IG' : platform === 'tiktok' ? 'TikTok' : platform === 'youtube' ? 'YouTube' : (urlHost(recipe.sourceUrl).replace(/\.com$/,'') || '');

    // CRITICAL: do NOT capture the pointer on down. Only capture once the
    // user has clearly committed to a horizontal swipe — otherwise the card
    // hijacks every touch and the user can't scroll the list vertically.
    const onPointerDown = (e) => {
      startRef.current = { x: e.clientX, y: e.clientY, t: Date.now(), captured: false, abandoned: false };
      longPressFired.current = false;
      setPressed(true);
      longPressTimer.current = setTimeout(() => {
        if (startRef.current && !startRef.current.abandoned) {
          longPressFired.current = true;
          if (navigator.vibrate) navigator.vibrate(10);
          onLongPress?.(recipe);
        }
      }, 480);
    };
    const onPointerMove = (e) => {
      if (!startRef.current || startRef.current.abandoned) return;
      const dx = e.clientX - startRef.current.x;
      const dy = e.clientY - startRef.current.y;

      // If movement is dominantly vertical, abandon — let the browser scroll.
      // We don't capture, so the parent container's overflow-y: auto wins.
      if (!startRef.current.captured && Math.abs(dy) > Math.abs(dx) + 4) {
        startRef.current.abandoned = true;
        clearTimeout(longPressTimer.current);
        setPressed(false);
        return;
      }

      // Cancel long-press once the user starts moving at all.
      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) clearTimeout(longPressTimer.current);

      // Horizontal swipe committed — NOW take pointer capture so the card
      // gesture doesn't drop frames if the touch leaves the card bounds.
      if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
        if (!startRef.current.captured) {
          try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
          startRef.current.captured = true;
        }
        setSwipeX(Math.max(-140, Math.min(140, dx)));
      }
    };
    const onPointerUp = (e) => {
      clearTimeout(longPressTimer.current);
      setPressed(false);
      if (!startRef.current) return;
      const { x, y, t, captured, abandoned } = startRef.current;
      const dx = e.clientX - x;
      const dy = e.clientY - y;
      const dt = Date.now() - t;
      startRef.current = null;

      // Vertical-scroll abandon: nothing else to do.
      if (abandoned) return;

      // Horizontal swipe committed past threshold.
      if (Math.abs(swipeX) > 70) {
        const action = swipeX > 0 ? 'favorite' : 'delete';
        setActionFlash(action);
        onSwipeAction?.(recipe, action);
        setTimeout(() => setActionFlash(null), 600);
        setSwipeX(0);
        return;
      }
      setSwipeX(0);

      // Tap (no significant movement, no captured swipe, fast).
      if (!longPressFired.current && !captured && Math.abs(dx) < 8 && Math.abs(dy) < 8 && dt < 500) {
        onOpen?.(recipe);
      }
    };
    const onPointerCancel = () => {
      clearTimeout(longPressTimer.current);
      setPressed(false);
      setSwipeX(0);
      startRef.current = null;
    };

    return (
      <div className={'card-wrap ' + (actionFlash ? 'flash-' + actionFlash : '')}>
        <div className="swipe-bg swipe-bg-fav" aria-hidden>
          <span style={{fontSize: 16}}>♥</span>
          <span>{recipe.favorite ? 'Unfavorite' : 'Favorite'}</span>
        </div>
        <div className="swipe-bg swipe-bg-del" aria-hidden>
          <span>Delete</span>
          <span style={{fontSize: 16}}>×</span>
        </div>
        <article
          className={'recipe-card ' + (pressed ? 'pressed' : '')}
          style={{
            transform: `translateX(${swipeX}px) rotate(${swipeX * 0.04}deg)`,
            transition: swipeX === 0 ? 'transform 280ms cubic-bezier(.2,.9,.3,1.2)' : 'none',
          }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerCancel}
        >
          <div className="recipe-card-media">
            <RecipeMedia recipe={recipe} />
            {sourceLabel && (
              <span className="source-corner">
                {platform === 'instagram' ? <Icon.InstagramIcon /> : platform === 'tiktok' ? <Icon.TikTokIcon /> : platform === 'youtube' ? <Icon.YouTubeIcon /> : <Icon.Globe />}
                {sourceLabel}
              </span>
            )}
            {recipe.favorite && (
              <span className="fav-pill" aria-label="Favorite">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                  <path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0112 6a5.5 5.5 0 019.5 6c-2.5 4.5-9.5 9-9.5 9z"/>
                </svg>
              </span>
            )}
          </div>
          <div className="recipe-card-body">
            <h3 className="recipe-card-title">{recipe.title || 'Untitled'}</h3>
            <div className="recipe-card-meta">
              {timeLabel(recipe) && (
                <span className="time-badge">
                  <Icon.Clock />
                  {timeLabel(recipe)}
                </span>
              )}
              {timeLabel(recipe) && recipe.servings && <span className="meta-sep" />}
              {recipe.servings && (
                <span className="time-badge" style={{textTransform:'lowercase'}}>
                  <span aria-hidden style={{fontSize: 11, lineHeight: 1}}>🍽</span>
                  {recipe.servings}
                </span>
              )}
            </div>
          </div>
        </article>
      </div>
    );
  }

  // ---------- Detail ----------
  function DetailScreen({ recipe, onClose, onSave, onDelete, onEdit, onShare, onAddToShopping, units, setUnits }) {
    const [tab, setTab] = useState('ingredients');
    const [checkedIng, setCheckedIng] = useState(() => new Set(loadChecked(recipe.id)));
    const [stepIdx, setStepIdx] = useState(0);
    const [notes, setNotes] = useState(recipe.notes || '');
    const [rating, setRating] = useState(recipe.rating || 0);
    const [favorite, setFavorite] = useState(!!recipe.favorite);
    const [cooked, setCooked] = useState(recipe.cooked || 0);
    const [dragX, setDragX] = useState(0);
    const [closing, setClosing] = useState(false);
    const [cooking, setCooking] = useState(false);          // cooking mode active (wake lock + steps tab)
    const [cookedFlash, setCookedFlash] = useState(false);
    const wakeLockRef = useRef(null);
    const swipeStart = useRef(null);
    const personalDirty = useRef(false);

    // ---- Wake lock: keep screen awake while cooking ----
    const acquireWakeLock = useCallback(async () => {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLockRef.current = await navigator.wakeLock.request('screen');
        // Auto-rerequest if the system releases it (e.g. tab backgrounded then refocused)
        wakeLockRef.current.addEventListener('release', () => { wakeLockRef.current = null; });
      } catch {
        wakeLockRef.current = null;
      }
    }, []);
    const releaseWakeLock = useCallback(() => {
      if (wakeLockRef.current) {
        try { wakeLockRef.current.release(); } catch {}
        wakeLockRef.current = null;
      }
    }, []);

    // Re-acquire when tab returns to foreground while still cooking.
    useEffect(() => {
      if (!cooking) return;
      const onVisible = () => {
        if (document.visibilityState === 'visible' && !wakeLockRef.current) {
          acquireWakeLock();
        }
      };
      document.addEventListener('visibilitychange', onVisible);
      return () => document.removeEventListener('visibilitychange', onVisible);
    }, [cooking, acquireWakeLock]);

    // Release on unmount or when cooking ends.
    useEffect(() => () => releaseWakeLock(), [releaseWakeLock]);

    const platform = recipe.sourceUrl ? detectPlatform(recipe.sourceUrl) : 'web';
    const isSocial = platform === 'instagram' || platform === 'tiktok' || platform === 'youtube';
    const hasLink  = !!recipe.sourceUrl;

    // ---- iOS-style swipe-back from left edge ----
    const onPointerDownSwipe = (e) => {
      // Only initiate if the touch starts within 25px of the left viewport edge.
      if (e.clientX <= 25) {
        swipeStart.current = { x: e.clientX, y: e.clientY, captured: false };
      }
    };
    const onPointerMoveSwipe = (e) => {
      if (!swipeStart.current) return;
      const dx = e.clientX - swipeStart.current.x;
      const dy = e.clientY - swipeStart.current.y;
      // If the user moves more vertically than horizontally early on, this is
      // a scroll, not a swipe — bail out and let the scroll happen.
      if (!swipeStart.current.captured && Math.abs(dy) > Math.abs(dx) + 6) {
        swipeStart.current = null;
        setDragX(0);
        return;
      }
      if (dx > 6) {
        swipeStart.current.captured = true;
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
        setDragX(Math.max(0, dx));
      }
    };
    const onPointerUpSwipe = () => {
      if (!swipeStart.current) return;
      const wasCaptured = swipeStart.current.captured;
      swipeStart.current = null;
      if (!wasCaptured) { setDragX(0); return; }
      const threshold = Math.min(140, window.innerWidth * 0.28);
      if (dragX > threshold) {
        // Animate the screen sliding off, then dismiss.
        setClosing(true);
        setDragX(window.innerWidth);
        setTimeout(onClose, 240);
      } else {
        setDragX(0);
      }
    };

    const toggleIng = (i) => {
      setCheckedIng(prev => {
        const n = new Set(prev);
        n.has(i) ? n.delete(i) : n.add(i);
        saveChecked(recipe.id, Array.from(n));
        return n;
      });
    };

    const toggleFav = async () => {
      const next = !favorite;
      setFavorite(next);
      // Merge the rest of the local DetailScreen state (notes, rating, cooked)
      // so we don't trample unsaved edits from the Notes tab.
      personalDirty.current = false;
      try { await onSave({ ...recipe, favorite: next, notes, rating, cooked }); } catch {}
    };

    const toggleCooking = async () => {
      if (cooking) {
        // End the cooking session.
        setCooking(false);
        releaseWakeLock();
        return;
      }
      // Start cooking: switch to steps tab, jump to first step, bump count, acquire wake lock.
      setTab('steps');
      setStepIdx(0);
      const next = cooked + 1;
      setCooked(next);
      setCooking(true);
      setCookedFlash(true);
      acquireWakeLock();
      if (navigator.vibrate) try { navigator.vibrate(15); } catch {}
      setTimeout(() => setCookedFlash(false), 600);
      try { await onSave({ ...recipe, cooked: next, favorite }); } catch {}
    };

    const openSource = () => {
      if (hasLink) window.open(recipe.sourceUrl, '_blank', 'noopener');
    };

    // Keep the latest persist-fn in a ref so the unmount cleanup below sees
    // the freshest closure WITHOUT firing the cleanup on every keystroke
    // (which would re-save on every character). The actual save trigger is
    // the textarea's onBlur and toggleFav / startCooking explicit calls.
    const persistPersonal = useCallback(async () => {
      if (!personalDirty.current) return;
      personalDirty.current = false;
      try { await onSave({ ...recipe, notes, rating, favorite, cooked }); } catch {}
    }, [recipe, notes, rating, favorite, cooked, onSave]);
    const persistRef = useRef(persistPersonal);
    persistRef.current = persistPersonal;
    useEffect(() => () => { persistRef.current(); }, []);  // unmount-only

    const tags = recipe.tags || [];
    const ingredients = recipe.ingredients || [];
    const instructions = (recipe.instructions || []).map((s, i) => ({
      i, text: s, isHeader: /^—.*—$/.test(s)
    }));

    const dragOpacity = Math.max(0.3, 1 - dragX / (window.innerWidth || 800));

    return (
      <div
        className="detail-screen"
        onPointerDown={onPointerDownSwipe}
        onPointerMove={onPointerMoveSwipe}
        onPointerUp={onPointerUpSwipe}
        onPointerCancel={onPointerUpSwipe}
        style={{
          transform: dragX ? `translateX(${dragX}px)` : undefined,
          opacity: dragX ? dragOpacity : undefined,
          transition: closing
            ? 'transform 240ms cubic-bezier(.2,.7,.3,1), opacity 240ms'
            : (swipeStart.current?.captured ? 'none' : 'transform 220ms cubic-bezier(.2,.7,.3,1.1), opacity 220ms'),
        }}
      >
        <button className="detail-close" onClick={onClose} aria-label="Back"><Icon.Back /></button>
        <button className={'detail-fav ' + (favorite ? 'on' : '')} onClick={toggleFav} aria-label="Favorite">
          <Icon.Heart filled={favorite} />
        </button>

        {hasLink && (
          <button className="detail-source-btn" onClick={openSource} aria-label={'View on ' + urlHost(recipe.sourceUrl)}>
            <Icon.Link />
          </button>
        )}

        {recipe.videoPath ? (
          <div
            className="detail-hero detail-hero-video"
            style={{ aspectRatio: 'auto', maxHeight: '78vh', background: '#000' }}
          >
            <ArchivedVideo recipeId={recipe.id} poster={recipe.image} />
            <div className="detail-hero-fade" />

  // ---------- Archived video player ----------
  // Lazy: shows ONLY the thumbnail with a play overlay until the user taps it.
  // Tap → fetch a fresh Dropbox temp link → swap to a real <video> that
  // auto-plays. Saves bandwidth (no video bytes loaded for users who just
  // want to read the recipe) and avoids the cost of minting temp links on
  // every detail-view open.
  function ArchivedVideo({ recipeId, poster }) {
    const [state, setState] = useState('idle');  // idle | loading | playing | error
    const [src, setSrc] = useState(null);
    const [err, setErr] = useState(null);
    const [posterFailed, setPosterFailed] = useState(false);

    const loadAndPlay = async () => {
      if (state === 'loading' || state === 'playing') return;
      setState('loading');
      try {
        const { url } = await api.videoLink(recipeId);
        setSrc(url);
        setState('playing');
      } catch (e) {
        setErr(e.message || 'Could not load video');
        setState('error');
      }
    };

    if (state === 'playing' && src) {
      return (
        <video
          src={src}
          poster={poster || undefined}
          controls
          autoPlay
          playsInline
          preload="metadata"
          style={{
            width: '100%',
            height: 'auto',
            maxHeight: '78vh',
            objectFit: 'contain',
            display: 'block',
            background: '#000',
          }}
        />
      );
    }

    // Idle / loading / error — show the thumbnail with a play overlay.
    // The textured "empty" backdrop is always rendered so we never show a
    // blank box; the poster image overlays on top when it's available, and
    // gets removed if it fails to load.
    return (
      <button
        type="button"
        className="video-poster-btn"
        onClick={loadAndPlay}
        aria-label="Play video"
      >
        <div className="video-poster-empty" />
        {poster && !posterFailed && (
          <img
            src={poster}
            alt=""
            className="video-poster-img"
            onError={() => setPosterFailed(true)}
          />
        )}
        <div className="video-play-overlay">
          {state === 'loading' ? (
            <span className="spinner on-accent" style={{width: 32, height: 32, borderWidth: 3}} />
          ) : (
            <span className="video-play-button" aria-hidden>
              <svg viewBox="0 0 24 24" width="34" height="34" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
            </span>
          )}
        </div>
        {state === 'error' && (
          <div className="video-error-banner">{err || 'Could not load video'}</div>
        )}
      </button>
    );
  }

  // ---------- Social embed (Instagram + TikTok + YouTube) ----------
  function SocialEmbed({ url, platform, fallbackImage }) {
    useEffect(() => {
      // YouTube uses a plain iframe — no script needed.
      if (platform === 'youtube') return;
      const scriptId = platform === 'instagram' ? 'ig-embed-js' : 'tt-embed-js';
      const scriptSrc = platform === 'instagram'
        ? 'https://www.instagram.com/embed.js'
        : 'https://www.tiktok.com/embed.js';
      const ensureScript = () => new Promise((resolve) => {
        if (document.getElementById(scriptId)) {
          if (platform === 'instagram' && window.instgrm?.Embeds) window.instgrm.Embeds.process();
          return resolve();
        }
        const s = document.createElement('script');
        s.id = scriptId; s.async = true; s.src = scriptSrc;
        s.onload = () => {
          if (platform === 'instagram' && window.instgrm?.Embeds) window.instgrm.Embeds.process();
          resolve();
        };
        document.body.appendChild(s);
      });
      ensureScript();
    }, [url, platform]);

    if (platform === 'youtube') {
      const ytId = youtubeId(url);
      if (!ytId) {
        return (
          <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)', textAlign: 'center'}}>
            <a href={url} target="_blank" rel="noopener" style={{color: 'var(--ink-3)'}}>Open on YouTube</a>
          </div>
        );
      }
      return (
        <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)'}}>
          <div style={{position:'relative', width:'100%', maxWidth:'480px', margin:'0 auto', aspectRatio:'16 / 9', borderRadius:'10px', overflow:'hidden', background:'#000'}}>
            <iframe
              src={`https://www.youtube.com/embed/${ytId}`}
              title="YouTube video"
              loading="lazy"
              style={{position:'absolute', inset:0, width:'100%', height:'100%', border:0}}
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowFullScreen
            />
          </div>
        </div>
      );
    }

    if (platform === 'instagram') {
      return (
        <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)'}}>
          <blockquote
            className="instagram-media"
            data-instgrm-permalink={url}
            data-instgrm-version="14"
            style={{ background:'#fff', border:0, borderRadius:'10px', margin:'0 auto', maxWidth:'400px', minWidth:'280px', padding:0 }}
          >
            <a href={url} target="_blank" rel="noopener" style={{display:'block', padding:'40px', textAlign:'center', color:'var(--ink-3)'}}>
              {fallbackImage
                ? <img src={fallbackImage} alt="" style={{width:'100%', borderRadius:'10px'}} />
                : <span>Loading Instagram reel…</span>}
            </a>
          </blockquote>
        </div>
      );
    }

    const videoIdMatch = (url || '').match(/\/video\/(\d+)/);
    const videoId = videoIdMatch ? videoIdMatch[1] : '';
    return (
      <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)'}}>
        <blockquote className="tiktok-embed" cite={url} data-video-id={videoId} style={{maxWidth:'400px', minWidth:'280px', margin:'0 auto'}}>
          <section>
            <a href={url} target="_blank" rel="noopener" style={{display:'block', padding:'40px', textAlign:'center', color:'var(--ink-3)'}}>
              {fallbackImage
                ? <img src={fallbackImage} alt="" style={{width:'100%', borderRadius:'10px'}} />
                : <span>Loading TikTok video…</span>}
            </a>
          </section>
        </blockquote>
      </div>
    );
  }

      return { ...d, [key]: arr };
    });

  // ---------- Shopping screen ----------
  const SHOP_CATEGORY_ORDER = ['produce', 'meat', 'seafood', 'dairy', 'bakery', 'pantry', 'frozen', 'beverages', 'other'];
  const SHOP_CATEGORY_LABEL = {
    produce:   '🥬 Produce',
    meat:      '🥩 Meat',
    seafood:   '🐟 Seafood',
    dairy:     '🥛 Dairy',
    bakery:    '🍞 Bakery',
    pantry:    '🥫 Pantry',
    frozen:    '🧊 Frozen',
    beverages: '🥤 Beverages',

  function ShoppingScreen({ items, onToggle, onRemove, onAlternatives, onClearChecked, onClearAll, onOpenAdd, recipes }) {
    // Group by category — checked items stay in place (strikethrough only),
    // they don't move to a separate section. Order within a category is the
    // order items were added.
    const grouped = useMemo(() => {
      const byCat = {};
      for (const it of items) {

        (byCat[cat] ||= []).push(it);
      }

        .filter(c => byCat[c] && byCat[c].length)
        .map(c => [c, byCat[c]]);
    }, [items]);

    const totalPending = items.filter(it => !it.checked).length;
    const totalChecked = items.filter(it => it.checked).length;

    return (
      <div className="screen">
        <div className="lib-header">
          <div className="brand-row">
            <div className="brand">Shopping<span className="dot">.</span></div>

                    Clear {totalChecked} checked

                )}

              {grouped.map(([cat, list]) => (

                      <ShoppingRow key={it.id} item={it} onToggle={onToggle} onRemove={onRemove} onAlternatives={onAlternatives} recipes={recipes} />

            </>

  }

  function ShoppingRow({ item, onToggle, onRemove, onAlternatives, recipes }) {
    const fromRecipe = item.fromRecipes && item.fromRecipes.length
      ? (recipes || []).find(r => r.id === item.fromRecipes[0])
      : null;

    const [swipeX, setSwipeX] = useState(0);
    const startRef = useRef(null);

    const onPointerDown = (e) => {
      startRef.current = { x: e.clientX, y: e.clientY, t: Date.now(), captured: false, abandoned: false };
    };
    const onPointerMove = (e) => {
      if (!startRef.current || startRef.current.abandoned) return;
      const dx = e.clientX - startRef.current.x;
      const dy = e.clientY - startRef.current.y;
      // Vertical scroll commitment — abandon swipe.
      if (!startRef.current.captured && Math.abs(dy) > Math.abs(dx) + 4) {
        startRef.current.abandoned = true;
        return;
      }
      if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
        if (!startRef.current.captured) {
          try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
          startRef.current.captured = true;
        }
        setSwipeX(Math.max(-160, Math.min(160, dx)));
      }
    };
    const onPointerUp = (e) => {
      if (!startRef.current) return;
      const { x, y, t, captured, abandoned } = startRef.current;
      const dx = e.clientX - x;
      const dy = e.clientY - y;
      const dt = Date.now() - t;
      startRef.current = null;
      if (abandoned) return;

      const threshold = 80;
      if (swipeX > threshold) {
        // Swipe right → remove
        setSwipeX(0);
        onRemove?.(item);
        return;
      }
      if (swipeX < -threshold) {
        // Swipe left → alternatives
        setSwipeX(0);
        onAlternatives?.(item);
        return;
      }
      setSwipeX(0);
      // Tap → toggle checked
      if (!captured && Math.abs(dx) < 8 && Math.abs(dy) < 8 && dt < 500) {
        onToggle?.(item.id);
      }
    };
    const onPointerCancel = () => {
      setSwipeX(0);
      startRef.current = null;
    };

    return (
      <div className="shop-row-wrap">
        <div className="shop-swipe-bg shop-swipe-remove" aria-hidden>
          <span style={{fontSize: 16}}>🗑</span><span>Remove</span>
        </div>
        <div className="shop-swipe-bg shop-swipe-alt" aria-hidden>
          <span>Alternatives</span><span style={{fontSize: 16}}>🔁</span>
        </div>
        <li
          className={'shop-row ' + (item.checked ? 'checked' : '')}
          style={{
            transform: swipeX ? `translateX(${swipeX}px)` : undefined,
            transition: swipeX === 0 ? 'transform 220ms cubic-bezier(.2,.9,.3,1.1)' : 'none',
            position: 'relative',
            zIndex: 1,
            background: 'var(--bg)',
          }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerCancel}
        >
          <span className="shop-check">
            {item.checked && (
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round">
                <path d="M5 13l4 4 10-10" />
              </svg>
            )}
          </span>
          <div className="shop-content">
            <div className="shop-name">{item.name}</div>
            <div className="shop-meta">
              {item.qty && <span className="shop-qty">{item.qty}</span>}
              {item.note && <span className="shop-note">· {item.note}</span>}
              {fromRecipe && <span className="shop-from-recipe">· from {fromRecipe.title}</span>}
            </div>
          </div>
        </li>
      </div>
    );
  }

  // ---------- Reusable sheet grab handle (drag-down to dismiss) ----------
  // Renders the visible 32×4 bar inside a larger invisible touch target. When
  // the user starts a touch on the bar we attach document-level touchmove/up
  // listeners and translate the parent .sheet by the drag delta. If released
  // past ~90px the sheet animates off the bottom and onClose() is called;
  // otherwise it springs back.
  //
  // Why touch* + addEventListener instead of React's onPointer*:
  //   • React's synthetic listeners are passive by default on iOS, so we
  //     can't preventDefault() to stop the parent .sheet (overflow-y: auto)
  //     from swallowing the gesture as a scroll.
  //   • Document-level move/up are more reliable than pointer capture when
  //     the touch leaves the small grab area mid-drag.
  function SheetGrab({ onClose }) {
    const wrapRef = useRef(null);

    useEffect(() => {
      const wrap = wrapRef.current;
      if (!wrap) return;

      let sheetEl = null;
      let dragging = false;
      let y0 = 0;
      let dy = 0;

      const setTransform = (y, animate) => {
        if (!sheetEl) return;
        sheetEl.style.transition = animate ? 'transform 220ms cubic-bezier(.2,.7,.3,1)' : 'none';
        sheetEl.style.transform = y > 0 ? `translateY(${y}px)` : '';
      };

      const onTouchStart = (e) => {
        if (!e.touches || e.touches.length !== 1) return;
        sheetEl = wrap.closest('.sheet');
        dragging = true;
        y0 = e.touches[0].clientY;
        dy = 0;
        // Stop the parent .sheet from intercepting this gesture as a scroll.
        e.preventDefault();
      };
      const onTouchMove = (e) => {
        if (!dragging || !e.touches || e.touches.length !== 1) return;
        dy = Math.max(0, e.touches[0].clientY - y0);
        setTransform(dy, false);
        if (e.cancelable) e.preventDefault();
      };
      const onTouchEnd = () => {
        if (!dragging) return;
        dragging = false;
        if (dy > 90) {
          if (sheetEl) {
            sheetEl.style.transition = 'transform 200ms ease-in';
            sheetEl.style.transform = 'translateY(100%)';
          }
          setTimeout(() => onClose?.(), 180);
        } else {
          setTransform(0, true);
        }
      };

      // Mouse fallback (desktop / dev tools)
      const onMouseDown = (e) => {
        sheetEl = wrap.closest('.sheet');
        dragging = true;
        y0 = e.clientY;
        dy = 0;
        e.preventDefault();
      };
      const onMouseMove = (e) => {
        if (!dragging) return;
        dy = Math.max(0, e.clientY - y0);
        setTransform(dy, false);
      };
      const onMouseUp = () => {
        if (!dragging) return;
        dragging = false;
        if (dy > 90) {
          if (sheetEl) {
            sheetEl.style.transition = 'transform 200ms ease-in';
            sheetEl.style.transform = 'translateY(100%)';
          }
          setTimeout(() => onClose?.(), 180);
        } else {
          setTransform(0, true);
        }
      };

      wrap.addEventListener('touchstart', onTouchStart, { passive: false });
      document.addEventListener('touchmove',   onTouchMove, { passive: false });
      document.addEventListener('touchend',    onTouchEnd);
      document.addEventListener('touchcancel', onTouchEnd);

      wrap.addEventListener('mousedown', onMouseDown);
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup',   onMouseUp);

      return () => {
        wrap.removeEventListener('touchstart', onTouchStart);
        document.removeEventListener('touchmove',   onTouchMove);
        document.removeEventListener('touchend',    onTouchEnd);
        document.removeEventListener('touchcancel', onTouchEnd);
        wrap.removeEventListener('mousedown', onMouseDown);
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup',   onMouseUp);
      };
    }, [onClose]);

    return (
      <div ref={wrapRef} className="sheet-grab-tap" role="button" aria-label="Drag down to close">
        <div className="sheet-grab" />
      </div>
    );
  }

  // ---------- Alternatives sheet ----------
  function AlternativesSheet({ item, recipe, location, onClose, onSwap, onRemove }) {
    const [alts, setAlts] = useState(null);
    const [err, setErr] = useState(null);

    useEffect(() => {
      let cancelled = false;
      (async () => {
        try {
          const body = {
            name: item.name,
            qty: item.qty,
            note: item.note,
          };
          if (recipe) {
            body.recipe = {
              title: recipe.title,
              ingredientLines: (recipe.ingredients || []).filter(s => !/^—.*—$/.test(s)),
            };
          }
          // Only forward a tight subset — never raw lat/lon — so the prompt
          // stays focused on what's stocked at neighborhood stores there.
          if (location && (location.label || location.country)) {
            body.location = {
              label: location.label || '',
              country: location.country || '',
            };
          }
          const r = await api.shoppingAlternatives(body);
          if (!cancelled) setAlts(r.alternatives || []);
        } catch (e) {
          if (!cancelled) setErr(e.message || 'Could not load alternatives');
        }
      })();
      return () => { cancelled = true; };
    }, [item, recipe, location]);

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <SheetGrab onClose={onClose} />
          <h2 className="sheet-title">Can't find {item.name}?</h2>
          <p className="sheet-sub">
            {recipe
              ? <>Alternatives that work in <b>{recipe.title}</b>:</>
              : <>Generic substitutes that usually work:</>}
          </p>

          {err && <div className="error-box">{err}</div>}
          {!alts && !err && (
            <div style={{textAlign: 'center', padding: 28, color: 'var(--ink-3)'}}>
              <span className="spinner" /> Asking Claude…
            </div>
          )}

          {alts && alts.length > 0 && (
            <ul style={{listStyle: 'none', padding: 0, margin: '0 0 16px'}}>
              {alts.map((a, i) => {
                const conf = String(a.confidence || '').toLowerCase();
                const isMedium = conf === 'medium';
                return (
                  <li key={i} style={{display: 'flex', gap: 10, alignItems: 'center', padding: '12px 4px', borderBottom: '1px solid var(--line)'}}>
                    <div style={{flex: 1, minWidth: 0}}>
                      <div style={{display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2}}>
                        <span style={{fontSize: 14, fontWeight: 600, color: 'var(--ink)'}}>{a.name}</span>
                        {isMedium && (
                          <span style={{
                            fontSize: 10,
                            fontWeight: 600,
                            letterSpacing: '0.04em',
                            textTransform: 'uppercase',
                            color: 'var(--ink-3)',
                            background: 'var(--bg-sunk)',
                            border: '1px solid var(--line)',
                            borderRadius: 999,
                            padding: '2px 7px',
                          }}>trade-off</span>
                        )}
                      </div>
                      <div style={{fontSize: 12, color: 'var(--ink-2)', lineHeight: 1.4}}>{a.why}</div>
                    </div>
                    <button
                      className="chip"
                      style={{flexShrink: 0}}
                      onClick={() => onSwap(item, a.name)}
                    >
                      Use this
                    </button>
                  </li>
                );
              })}
            </ul>
          )}
          {alts && alts.length === 0 && !err && (
            <p style={{color: 'var(--ink-3)', textAlign: 'center', padding: 14}}>
              No close substitute came to mind for this recipe — you may need to skip it or change the dish.
            </p>
          )}

          <div className="sheet-actions">
            <button className="ghost-btn" onClick={onClose}>Close</button>
            <button className="danger-btn" onClick={() => onRemove(item)} style={{flex: 1, height: 46}}>
              Remove from list
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---------- Add Shopping sheet ----------
  function AddShoppingSheet({ onClose, recipes, onAddTyped, onAddPhoto, onAddFromRecipes }) {
    const [tab, setTab] = useState('type');
    const [text, setText] = useState('');
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState(null);
    const [selectedIds, setSelectedIds] = useState(new Set());
    const fileRef = useRef(null);

    const submitTyped = async () => {
      const items = text.split('\n').map(s => s.trim()).filter(Boolean);
      if (items.length === 0) { setErr('Add at least one item.'); return; }
      setBusy(true); setErr(null);
      try {
        await onAddTyped(items);
        onClose();
      } catch (e) { setErr(e.message || 'Could not add items.'); }
      finally { setBusy(false); }
    };

    const submitPhoto = async (file) => {
      if (!file) return;
      setBusy(true); setErr(null);
      try {
        const reader = new FileReader();
        const dataUrl = await new Promise((resolve, reject) => {
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('Could not read image'));
          reader.readAsDataURL(file);
        });
        await onAddPhoto(dataUrl);
        onClose();
      } catch (e) { setErr(e.message || 'Could not process image.'); }
      finally { setBusy(false); }
    };

    const submitRecipes = async () => {
      const ids = Array.from(selectedIds);
      if (ids.length === 0) { setErr('Pick at least one recipe.'); return; }
      setBusy(true); setErr(null);
      try {
        await onAddFromRecipes(ids);
        onClose();
      } catch (e) { setErr(e.message || 'Could not add ingredients.'); }
      finally { setBusy(false); }
    };

    const toggleRecipe = (id) => {
      setSelectedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
    };

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <SheetGrab onClose={onClose} />
          <h2 className="sheet-title">Add to shopping list</h2>
          <p className="sheet-sub">Type, snap a photo, or pull from your recipes — we dedupe automatically.</p>

          <div className="add-shop-tabs">
            <button className={'add-shop-tab ' + (tab === 'type' ? 'active' : '')} onClick={() => setTab('type')}>Type</button>
            <button className={'add-shop-tab ' + (tab === 'photo' ? 'active' : '')} onClick={() => setTab('photo')}>Photo</button>
            <button className={'add-shop-tab ' + (tab === 'recipes' ? 'active' : '')} onClick={() => setTab('recipes')}>From recipes</button>
          </div>

          {tab === 'type' && (
            <>
              <textarea
                className="add-shop-textarea"
                value={text}
                onChange={e => setText(e.target.value)}
                placeholder="One item per line:&#10;2 cans diced tomatoes&#10;1 lb ground beef&#10;olive oil"
                autoFocus
              />
              {err && <div className="error-box">{err}</div>}
              <button className="primary-btn" onClick={submitTyped} disabled={busy || !text.trim()}>
                {busy ? <><span className="spinner on-accent" /> Adding…</> : 'Add to list'}
              </button>
            </>
          )}

          {tab === 'photo' && (
            <>
              <div className="photo-pick-card" onClick={() => fileRef.current?.click()}>
                <div className="icon">📷</div>
                <div className="title">Snap or upload a photo</div>
                <div className="sub">Handwritten or printed list. We'll read it.</div>
              </div>
              <input
                ref={fileRef}
                type="file"
                accept="image/*"
                capture="environment"
                style={{display: 'none'}}
                onChange={e => submitPhoto(e.target.files?.[0])}
              />
              {err && <div className="error-box">{err}</div>}
              {busy && <div style={{textAlign: 'center', padding: 12, color: 'var(--ink-3)'}}>
                <span className="spinner" /> Reading the photo…
              </div>}
            </>
          )}

          {tab === 'recipes' && (
            <>
              <div style={{maxHeight: '50vh', overflowY: 'auto', marginBottom: 14, marginLeft: -4, marginRight: -4}}>
                {recipes.length === 0 ? (
                  <p style={{color: 'var(--ink-3)', textAlign: 'center', padding: 24}}>No saved recipes yet.</p>
                ) : recipes.map(r => (
                  <div
                    key={r.id}
                    className={'recipe-pick-row ' + (selectedIds.has(r.id) ? 'selected' : '')}
                    onClick={() => toggleRecipe(r.id)}
                  >
                    <div className="recipe-pick-thumb"><RecipeMedia recipe={r} /></div>
                    <div className="recipe-pick-name">{r.title || 'Untitled'}</div>
                    <div className="recipe-pick-check">
                      {selectedIds.has(r.id) && (
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round">
                          <path d="M5 13l4 4 10-10" />
                        </svg>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              {err && <div className="error-box">{err}</div>}
              <button className="primary-btn" onClick={submitRecipes} disabled={busy || selectedIds.size === 0}>
                {busy ? <><span className="spinner on-accent" /> Adding…</> : `Add ingredients of ${selectedIds.size || 'selected'}`}
              </button>
            </>
          )}
        </div>
      </div>
    );
  }

  // ---------- Settings sheet ----------
  // Centralized place for connection status, dark mode, and stats. Replaces
  // the previous header-icon clutter with a single ⚙ button.
  // ---------- Sharing setup section ----------
  // Web Share Target API in the manifest works on Android (Chrome lists the
  // PWA in the share sheet automatically). It does NOT work on iOS — Safari
  // hasn't shipped that part of the spec, even for installed PWAs. So on
  // iOS we walk the user through building a 4-step iOS Shortcut that does
  // the same thing: receives a URL from the share sheet, opens our app at
  //   https://<origin>/?share=1&url=<encoded URL>
  // The app's existing share-target boot effect handles the rest.
  // localStorage key for a saved iCloud Shortcut link (one-tap reinstall).
  // Default points at the canonical Shortcut Bea published — overridable per
  // device by pasting a different iCloud Shortcut link in Settings → Sharing.
  const SHORTCUT_ICLOUD_KEY = 'recipes-shortcut-icloud-url-v1';
  const DEFAULT_ICLOUD_SHORTCUT = 'https://www.icloud.com/shortcuts/16969961688f4a2d8b0cd526b438e996';

  function SharingSection({ showToast }) {
    const isIOS = (() => {
      if (typeof navigator === 'undefined') return false;
      const ua = navigator.userAgent || '';
      // navigator.standalone is iOS-only (even when not installed it exists as `false`).
      if (typeof navigator.standalone !== 'undefined') return true;
      return /iPad|iPhone|iPod/.test(ua)
        || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    })();
    const isStandalone =
      (typeof window !== 'undefined' &&
        (window.matchMedia?.('(display-mode: standalone)')?.matches
          || window.navigator.standalone === true));
    const origin = typeof window !== 'undefined' ? window.location.origin : '';
    const endpointUrl = `${origin}/api/extract-video`;
    const shareKey = typeof window !== 'undefined' ? (localStorage.getItem(DBX_TOKEN_KEY) || '') : '';

    const [showKey, setShowKey] = useState(false);
    const [copied, setCopied] = useState('');
    // iCloud Shortcut link — once the user has built the Shortcut on iOS and
    // shared it via iCloud, they paste the link here for one-tap reinstall.
    const [iCloudUrl, setICloudUrlState] = useState(() => {
      try { return localStorage.getItem(SHORTCUT_ICLOUD_KEY) || DEFAULT_ICLOUD_SHORTCUT; }
      catch { return DEFAULT_ICLOUD_SHORTCUT; }
    });
    const [iCloudInput, setICloudInput] = useState('');
    const [editingICloud, setEditingICloud] = useState(false);
    const saveICloudUrl = (url) => {
      const trimmed = (url || '').trim();
      if (trimmed && !/^https:\/\/(www\.)?icloud\.com\/shortcuts\//i.test(trimmed)) {
        showToast?.('That doesn\'t look like an iCloud Shortcut link', 'error');
        return;
      }
      try {
        if (trimmed) localStorage.setItem(SHORTCUT_ICLOUD_KEY, trimmed);
        else localStorage.removeItem(SHORTCUT_ICLOUD_KEY);
      } catch {}
      setICloudUrlState(trimmed);
      setICloudInput('');
      setEditingICloud(false);
      showToast?.(trimmed ? 'Saved — one-tap install ready' : 'Cleared');
    };
    const copy = async (text, label) => {
      try {
        await navigator.clipboard.writeText(text);
        setCopied(label);
        showToast?.('Copied');
        setTimeout(() => setCopied(''), 1800);
      } catch {
        showToast?.('Could not copy — long-press the value to copy manually', 'error');
      }
    };
    const maskKey = (k) => k ? `${k.slice(0, 4)}…${k.slice(-4)}` : '';

    return (
      <div className="settings-section">
        <h3 className="filter-section-title">Sharing</h3>
        <div className="setting-row" style={{borderBottom: 'none', alignItems: 'flex-start'}}>
          <div style={{minWidth: 0, flex: 1}}>
            <div className="setting-row-label">Send to My Kitchen from other apps</div>
            {!isIOS ? (
              <div className="setting-row-sub" style={{lineHeight: 1.45}}>
                In Instagram, TikTok, or YouTube, tap <b>Share</b> → look for <b>My Kitchen</b>. The recipe imports automatically.
                {!isStandalone && (
                  <div style={{marginTop: 6, color: 'var(--ink-3)'}}>
                    Make sure the app is installed to your Home Screen for the share target to appear.
                  </div>
                )}
              </div>
            ) : (
              <div className="setting-row-sub" style={{lineHeight: 1.5}}>
                <div style={{marginBottom: 10}}>
                  iOS won't let HTTPS URLs launch installed PWAs, so a "share opens the app" Shortcut isn't possible. Instead, build a Shortcut that <b>posts the URL directly</b> to a queue endpoint — no browser opens, you just get a "Recipe queued" notification.
                </div>

                {/* One-tap install via iCloud link, once the user has built and shared one. */}
                {iCloudUrl && !editingICloud ? (
                  <div style={{
                    background: 'var(--bg-sunk)',
                    border: '1px solid var(--line)',
                    borderRadius: 10,
                    padding: 12,
                    marginBottom: 14,
                  }}>
                    <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink)', marginBottom: 4}}>
                      One-tap install
                    </div>
                    <div style={{fontSize: 12, color: 'var(--ink-3)', marginBottom: 10, lineHeight: 1.4}}>
                      Tap below to install your saved Shortcut on this device. Useful when reinstalling the app or setting up a new iPad/iPhone.
                    </div>
                    <a
                      href={iCloudUrl}
                      className="primary-btn"
                      style={{display: 'block', textAlign: 'center', textDecoration: 'none'}}
                    >
                      Install Shortcut from iCloud
                    </a>
                    <button
                      className="ghost-btn"
                      onClick={() => setEditingICloud(true)}
                      style={{width: '100%', marginTop: 8, fontSize: 12}}
                    >
                      Change or remove saved link
                    </button>
                  </div>
                ) : null}

                {(!iCloudUrl || editingICloud) && (
                  <div style={{
                    background: 'var(--bg-sunk)',
                    border: '1px solid var(--line)',
                    borderRadius: 10,
                    padding: 12,
                    marginBottom: 14,
                  }}>
                    <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink)', marginBottom: 4}}>
                      Already built the Shortcut?
                    </div>
                    <div style={{fontSize: 12, color: 'var(--ink-3)', marginBottom: 8, lineHeight: 1.4}}>
                      In the Shortcuts app, tap the Shortcut → <b>ⓘ</b> → <b>Share</b> → <b>Copy iCloud Link</b>, then paste it here. After that, this section becomes a one-tap install for new devices and reinstalls.
                    </div>
                    <input
                      type="url"
                      placeholder="https://www.icloud.com/shortcuts/…"
                      value={iCloudInput}
                      onChange={e => setICloudInput(e.target.value)}
                      style={{
                        width: '100%',
                        padding: '8px 10px',
                        fontSize: 12,
                        fontFamily: 'var(--font-mono)',
                        background: 'var(--bg)',
                        border: '1px solid var(--line)',
                        borderRadius: 8,
                        color: 'var(--ink)',
                      }}
                    />
                    <div style={{display: 'flex', gap: 6, marginTop: 8}}>
                      <button
                        className="primary-btn"
                        onClick={() => saveICloudUrl(iCloudInput)}
                        style={{flex: 1, fontSize: 12}}
                        disabled={!iCloudInput.trim()}
                      >
                        Save link
                      </button>
                      {iCloudUrl && (
                        <button
                          className="ghost-btn"
                          onClick={() => saveICloudUrl('')}
                          style={{fontSize: 12}}
                        >
                          Remove
                        </button>
                      )}
                      {editingICloud && (
                        <button
                          className="ghost-btn"
                          onClick={() => { setEditingICloud(false); setICloudInput(''); }}
                          style={{fontSize: 12}}
                        >
                          Cancel
                        </button>
                      )}
                    </div>
                  </div>
                )}

                <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink)', marginBottom: 4}}>
                  First time? Build the Shortcut once.
                </div>
                <p style={{margin: '8px 0 4px', fontWeight: 600, color: 'var(--ink-2)'}}>1. Endpoint URL</p>
                <CodeRow text={endpointUrl} onCopy={() => copy(endpointUrl, 'url')} copied={copied === 'url'} />

                <p style={{margin: '12px 0 4px', fontWeight: 600, color: 'var(--ink-2)'}}>
                  2. Your share key{' '}
                  <button
                    className="chip"
                    style={{padding: '2px 8px', fontSize: 11}}
                    onClick={() => setShowKey(s => !s)}
                  >{showKey ? 'Hide' : 'Show'}</button>
                </p>
                <CodeRow
                  text={shareKey ? (showKey ? shareKey : maskKey(shareKey)) : '(not connected)'}
                  onCopy={() => shareKey && copy(shareKey, 'key')}
                  copied={copied === 'key'}
                  disabled={!shareKey}
                />
                <div style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 4, lineHeight: 1.4}}>
                  This is your Dropbox app-folder token. Anyone with it can save recipes to your library, but nothing else. Disconnecting Dropbox invalidates it; reconnect and refresh this page to get a new one.
                </div>

                <p style={{margin: '14px 0 4px', fontWeight: 600, color: 'var(--ink-2)'}}>3. Build the Shortcut</p>
                <ol style={{margin: '4px 0 0', paddingLeft: 22, color: 'var(--ink-2)'}}>
                  <li style={{marginBottom: 4}}>Open <b>Shortcuts</b> → <b>+</b> new shortcut. Name it <b>Send to My Kitchen</b>.</li>
                  <li style={{marginBottom: 4}}>Tap <b>ⓘ</b> → turn on <b>Use with Share Sheet</b>; Share Sheet Types: <b>URLs</b>.</li>
                  <li style={{marginBottom: 4}}>
                    Add action <b>"Get Contents of URL"</b>. Configure it:

  function SettingsSheet({ onClose, darkMode, setDarkMode, onOpenStats, onSignOut, recipesCount, account, units, setUnits, language, setLanguage, location, setLocation, devMode, setDevMode, showToast, asTab = false }) {
    const [locBusy, setLocBusy] = useState(false);
    const [locErr, setLocErr] = useState(null);
    // Each enable attempt bumps the counter; later results that come back
    // after the user re-tapped (or after our wallclock timeout fired) are
    // ignored. This stops a stuck/cancelled prompt from leaving the toggle
    // wedged in a busy state forever.
    const attemptRef = useRef(0);

    const enableLocation = async () => {
      const myAttempt = ++attemptRef.current;
      setLocBusy(true); setLocErr(null);
      // Floor the busy state so a re-tap after a cached browser denial — which
      // returns synchronously in <10ms — still registers visibly as a spinner
      // flash. Without this, repeated taps look like nothing happened.
      const minBusyUntil = Date.now() + 300;
      try {
        const { lat, lon } = await requestGeolocationOnce();
        if (myAttempt !== attemptRef.current) return;
        const { label, country } = await reverseGeocode(lat, lon);
        if (myAttempt !== attemptRef.current) return;
        setLocation({ lat, lon, label, country, ts: Date.now() });
        showToast?.(`Location set: ${label}`, 'success');
      } catch (e) {
        if (myAttempt !== attemptRef.current) return;
        setLocErr(e.message || 'Could not get location');
      } finally {
        const wait = Math.max(0, minBusyUntil - Date.now());
        if (wait > 0) await new Promise(r => setTimeout(r, wait));
        if (myAttempt === attemptRef.current) setLocBusy(false);
      }
    };
    const disableLocation = () => {
      attemptRef.current++;
      setLocBusy(false);
      setLocation(null);
      setLocErr(null);
    };
    // What happens when the user taps the toggle. If we're already busy,
    // treat the tap as "give up and try again" — abandon the in-flight
    // attempt by bumping the counter, then start a new one.
    const onToggleTap = () => {
      if (locBusy) {
        attemptRef.current++;
        setLocBusy(false);
        // Fall through into enableLocation so the tap actually does
        // something visible instead of just dismissing the spinner.
      }
      if (location) disableLocation();
      else enableLocation();
    };

    // Body content is shared between the modal sheet and the bottom-tab
    // screen. Only the outer wrapper, grab handle, and overlay differ.
    const body = (
      <>
        {!asTab && <SheetGrab onClose={onClose} />}

                <div className="setting-row-sub">Used everywhere; can be flipped per recipe too</div>
              </div>
              <div className="units-toggle-row" style={{margin: 0}}>
                <button className={'units-toggle ' + (units === 'us' ? 'on' : '')} onClick={() => setUnits('us')}>US</button>
                <button className={'units-toggle ' + (units === 'metric' ? 'on' : '')} onClick={() => setUnits('metric')}>Metric</button>

          <div className="settings-section">
            <h3 className="filter-section-title">Language</h3>
            <div className="setting-row" style={{borderBottom: 'none'}}>
              <div style={{minWidth: 0, flex: 1}}>
                <div className="setting-row-label">Preferred language</div>
                <div className="setting-row-sub">
                  Imported recipes get translated into this language when their source isn't already in it.

              </div>
              <select

                  <option key={l.code} value={l.code}>{l.label}</option>
                ))}
              </select>
            </div>
          </div>

          <SharingSection showToast={showToast} />


          <div className="settings-section">
            <h3 className="filter-section-title">Smart suggestions</h3>
            <div className="setting-row" style={{borderBottom: 'none'}}>
              <div style={{minWidth: 0, flex: 1}}>
                <div className="setting-row-label">Use my location for alternatives</div>
                <div className="setting-row-sub">
                  {location
                    ? <>Suggesting subs likely stocked near <b>{location.label}</b></>

                {locBusy && (
                  <div style={{fontSize: 12, color: 'var(--ink-3)', marginTop: 6}}>

                    {locErr}
                    {/* Once denied, the browser caches the choice and won't re-prompt.
                        The user has to flip it server-side. iOS treats installed PWAs

                    {/permission denied/i.test(locErr) && (() => {

                            </>

              </div>
              <div

            </div>
          </div>

          <div className="settings-section">

            <button className="setting-row-btn" onClick={() => { onClose?.(); onOpenStats(); }}>
              <div className="setting-row-label">

          <div className="settings-section">
            <h3 className="filter-section-title">Connection</h3>
            <div className="setting-row">
              <div style={{minWidth: 0, flex: 1}}>
                <div className="setting-row-label">Dropbox</div>
                <div className="setting-row-sub" style={{whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'}}>
                  {account ? (account.name || account.email || 'Connected') : 'Connected'}
                  {account && account.email ? ` · ${account.email}` : ''}
                </div>
              </div>
              <span className="setting-status">
                <span className="dot" />
                Active
              </span>
            </div>
            <div className="setting-row" style={{borderBottom: 'none'}}>
              <div>
                <div className="setting-row-label">Library</div>
                <div className="setting-row-sub">{recipesCount} recipes saved</div>
              </div>
            </div>
            <button className="ghost-btn" onClick={onSignOut} style={{width: '100%', marginTop: 12}}>

          </div>

  // ---------- Stats sheet ----------
  // Aggregates from already-loaded recipes — no extra API call. Shows what
  // worked (which extraction paths the user is hitting), how often each
  // recipe gets cooked, and which tags dominate. Honest dashboard for "is
  // this app actually useful for me?"
  function StatsSheet({ recipes, devMode, onClose }) {
    // Re-read on every open so freshly-tracked calls appear without a remount.
    const usageEntries = useMemo(() => devMode ? loadUsage() : [], [devMode]);
    const usageSummary = useMemo(() => devMode ? summarizeUsage(usageEntries) : null, [devMode, usageEntries]);
    const stats = useMemo(() => {
      const byPath = {};
      let cookedTotal = 0;
      let rated = 0, ratingSum = 0;
      let withVideo = 0;
      const tagCounts = {};
      for (const r of recipes) {
        const path = r.extractedBy || 'manual';
        byPath[path] = (byPath[path] || 0) + 1;
        cookedTotal += (r.cooked || 0);
        if (r.rating > 0) { rated++; ratingSum += r.rating; }
        if (r.videoPath) withVideo++;
        for (const t of r.tags || []) tagCounts[t] = (tagCounts[t] || 0) + 1;
      }
      const sortedPaths = Object.entries(byPath).sort((a, b) => b[1] - a[1]);
      const topTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
      const avgRating = rated > 0 ? (ratingSum / rated).toFixed(1) : null;
      return { total: recipes.length, byPath: sortedPaths, cookedTotal, avgRating, topTags, withVideo };
    }, [recipes]);

    if (stats.total === 0) {
      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" onClick={e => e.stopPropagation()}>
            <SheetGrab onClose={onClose} />
            <h2 className="sheet-title">Your kitchen stats</h2>
            <p className="sheet-sub">Save a recipe first and stats will show up here.</p>
          </div>
        </div>
      );
    }

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <SheetGrab onClose={onClose} />
          <h2 className="sheet-title">Your kitchen stats</h2>
          <p className="sheet-sub">A quick look at what's working in your library.</p>

          <div className="stats-row">
            <div className="stat-card">
              <div className="stat-value">{stats.total}</div>
              <div className="stat-label">Recipes</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{stats.cookedTotal}</div>
              <div className="stat-label">Times cooked</div>
            </div>
            {stats.avgRating ? (
              <div className="stat-card">
                <div className="stat-value">{stats.avgRating}<span style={{fontSize: 16, marginLeft: 2}}> ★</span></div>
                <div className="stat-label">Avg rating</div>
              </div>
            ) : (
              <div className="stat-card">
                <div className="stat-value">{stats.withVideo}</div>
                <div className="stat-label">With video</div>
              </div>
            )}
          </div>

          <h3 className="filter-section-title">How recipes were extracted</h3>
          <div className="path-bars">
            {stats.byPath.map(([path, count]) => {
              const pct = Math.round(count * 100 / stats.total);
              return (
                <div key={path}>
                  <div className="path-bar-label">
                    <span className="name">{extractedByLabel(path) || path}</span>
                    <span className="count">{count}</span>
                    <span className="pct">{pct}%</span>
                  </div>
                  <div className="path-bar-fill">
                    <div style={{ width: pct + '%' }} />
                  </div>
                </div>
              );
            })}
          </div>

          {stats.topTags.length > 0 && (
            <>
              <h3 className="filter-section-title">Top tags</h3>
              <div className="chip-row">
                {stats.topTags.map(([tag, count]) => (
                  <span key={tag} className="chip">
                    {tag} <b style={{marginLeft: 4, color: 'var(--ink)'}}>{count}</b>
                  </span>
                ))}
              </div>
            </>
          )}

          {devMode && (
            <UsagePanel summary={usageSummary} entryCount={usageEntries.length} />
          )}
        </div>
      </div>
    );
  }

  // ---------- API usage panel (dev mode only) ----------
  // Reads token counts collected by apiRequest from each endpoint's __usage
  // array and renders an approximate cost breakdown by provider+model.
  function UsagePanel({ summary, entryCount }) {
    const fmtUSD = (n) => {
      if (!n) return '$0.00';
      if (n < 0.01) return '<$0.01';
      return '$' + n.toFixed(n < 1 ? 4 : 2);
    };
    const onClear = () => {
      if (!confirm('Clear local API usage history? This only resets the in-app counter, not your real provider bills.')) return;
      clearUsage();
      // Force the StatsSheet to re-read on next open. For now we just reload.
      window.location.reload();
    };
    return (
      <>
        <h3 className="filter-section-title" style={{display: 'flex', alignItems: 'center', gap: 8}}>
          API usage
          <span style={{fontSize: 9, padding: '2px 6px', background: 'var(--bg-sunk)', border: '1px solid var(--line)', borderRadius: 999, color: 'var(--ink-3)', letterSpacing: '0.04em'}}>DEV</span>
        </h3>
        {!summary || summary.totalCalls === 0 ? (
          <p style={{color: 'var(--ink-3)', fontSize: 13, margin: '4px 0 0'}}>
            No tracked calls yet. Try importing a recipe or asking for ingredient alternatives.
          </p>
        ) : (
          <>
            <div className="stats-row" style={{marginBottom: 10}}>
              <div className="stat-card">
                <div className="stat-value" style={{fontSize: 22}}>{fmtUSD(summary.totalCost)}</div>
                <div className="stat-label">Estimated total</div>
              </div>
              <div className="stat-card">
                <div className="stat-value" style={{fontSize: 22}}>{summary.totalCalls}</div>
                <div className="stat-label">Calls tracked</div>
              </div>
            </div>
            <div style={{display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12}}>
              {summary.groups.map(g => (
                <div key={g.provider + '::' + g.model} style={{display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: '1px solid var(--line)'}}>
                  <div style={{flex: 1, minWidth: 0}}>
                    <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis'}}>
                      {g.provider} · <span style={{fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--ink-2)'}}>{g.model}</span>
                    </div>
                    <div style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 2}}>
                      {g.calls} call{g.calls === 1 ? '' : 's'}
                      {g.inputTokens > 0 && <> · {g.inputTokens.toLocaleString()} in</>}
                      {g.outputTokens > 0 && <> · {g.outputTokens.toLocaleString()} out</>}
                      {g.audioSeconds > 0 && <> · {(g.audioSeconds / 60).toFixed(1)} min audio</>}
                    </div>
                  </div>
                  <div style={{fontFamily: 'var(--font-mono)', fontSize: 13, color: 'var(--ink)', whiteSpace: 'nowrap'}}>
                    {fmtUSD(g.cost)}
                  </div>
                </div>
              ))}
            </div>
            <p style={{fontSize: 11, color: 'var(--ink-3)', lineHeight: 1.4, marginTop: 4}}>
              Approximate. Prices baked into the app from public rate cards (mid-2025); update when they change. Tracking only includes responses that returned a <code>__usage</code> field — alternatives is wired today; other endpoints will start counting as they're instrumented.
            </p>
            <button className="ghost-btn" onClick={onClear} style={{width: '100%', marginTop: 8}}>
              Clear usage history ({entryCount} entries)
            </button>
          </>
        )}
      </>
    );
  }

  // ---------- Filter sheet ----------
  function FilterSheet({ recipes, filters, setFilters, onClose }) {
    const [draft, setDraft] = useState(filters);

    const allTags = useMemo(() => {
      const set = new Set();
      recipes.forEach(r => (r.tags || []).forEach(t => set.add(t)));
      return Array.from(set).sort();
    }, [recipes]);

    const toggleArr = (group, val) => {
      setDraft(prev => {
        const arr = prev[group];
        return { ...prev, [group]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
      });
    };

    const reset = () => setDraft(emptyFilters());
    const apply = () => { setFilters(draft); onClose(); };

    // Live count: how many recipes the current draft would match
    const match = useMemo(() => {
      return recipes.filter(r => {
        if (draft.tags.length && !draft.tags.some(t => (r.tags || []).includes(t))) return false;
        if (draft.source.length) {
          const p = r.sourceUrl ? detectPlatform(r.sourceUrl) : 'web';
          if (!draft.source.includes(p)) return false;
        }
        if (draft.time.length) {
          const mins = recipeMinutes(r);
          const buckets = TIME_BUCKETS.filter(b => draft.time.includes(b.id));
          if (!buckets.some(b => b.test(mins))) return false;
        }
        if (draft.favorite && !r.favorite) return false;
        return true;
      }).length;
    }, [recipes, draft]);

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <SheetGrab onClose={onClose} />
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 12}}>
            <h2 className="sheet-title" style={{margin: 0}}>Filters</h2>
            <button className="btn-text" onClick={reset} style={{padding: 0}}>Reset</button>
          </div>

          <div className="filter-section">
            <h3 className="filter-section-title">Time</h3>
            <div className="chip-row">
              {TIME_BUCKETS.map((o, i) => (
                <button
                  key={o.id}
                  className={'chip ' + (draft.time.includes(o.id) ? 'on' : '')}
                  style={{ animationDelay: `${i * 30}ms` }}
                  onClick={() => toggleArr('time', o.id)}
                >
                  {o.label}
                </button>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <h3 className="filter-section-title">Source</h3>
            <div className="chip-row">
              {SOURCE_OPTIONS.map((o, i) => (
                <button
                  key={o.id}
                  className={'chip ' + (draft.source.includes(o.id) ? 'on' : '')}
                  style={{ animationDelay: `${i * 30}ms` }}
                  onClick={() => toggleArr('source', o.id)}
                >
                  {o.label}
                </button>
