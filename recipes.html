  function RecipeCard({ recipe, onOpen, onLongPress, onSwipeAction }) {
    const [pressed, setPressed] = useState(false);
    const [swipeX, setSwipeX] = useState(0);
    const [actionFlash, setActionFlash] = useState(null);
    const startRef = useRef(null);
    const longPressTimer = useRef(null);
    const longPressFired = useRef(false);

    const platform = recipe.sourceUrl ? detectPlatform(recipe.sourceUrl) : 'web';
    const sourceLabel = platform === 'instagram' ? 'IG' : platform === 'tiktok' ? 'TikTok' : (urlHost(recipe.sourceUrl).replace(/\.com$/,'') || '');

    // CRITICAL: do NOT capture the pointer on down. Only capture once the
    // user has clearly committed to a horizontal swipe — otherwise the card
    // hijacks every touch and the user can't scroll the list vertically.
    const onPointerDown = (e) => {
      startRef.current = { x: e.clientX, y: e.clientY, t: Date.now(), captured: false, abandoned: false };
      longPressFired.current = false;
      setPressed(true);
      longPressTimer.current = setTimeout(() => {
        if (startRef.current && !startRef.current.abandoned) {
          longPressFired.current = true;
          if (navigator.vibrate) navigator.vibrate(10);
          onLongPress?.(recipe);
        }
      }, 480);
    };
    const onPointerMove = (e) => {
      if (!startRef.current || startRef.current.abandoned) return;
      const dx = e.clientX - startRef.current.x;
      const dy = e.clientY - startRef.current.y;

      // If movement is dominantly vertical, abandon — let the browser scroll.
      // We don't capture, so the parent container's overflow-y: auto wins.
      if (!startRef.current.captured && Math.abs(dy) > Math.abs(dx) + 4) {
        startRef.current.abandoned = true;
        clearTimeout(longPressTimer.current);
        setPressed(false);
        return;
      }

      // Cancel long-press once the user starts moving at all.
      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) clearTimeout(longPressTimer.current);

      // Horizontal swipe committed — NOW take pointer capture so the card
      // gesture doesn't drop frames if the touch leaves the card bounds.
      if (Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
        if (!startRef.current.captured) {
          try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
          startRef.current.captured = true;
        }
        setSwipeX(Math.max(-140, Math.min(140, dx)));
      }
    };
    const onPointerUp = (e) => {
      clearTimeout(longPressTimer.current);
      setPressed(false);
      if (!startRef.current) return;
      const { x, y, t, captured, abandoned } = startRef.current;
      const dx = e.clientX - x;
      const dy = e.clientY - y;
      const dt = Date.now() - t;
      startRef.current = null;

      // Vertical-scroll abandon: nothing else to do.
      if (abandoned) return;

      // Horizontal swipe committed past threshold.
      if (Math.abs(swipeX) > 70) {
        const action = swipeX > 0 ? 'favorite' : 'delete';
        setActionFlash(action);
        onSwipeAction?.(recipe, action);
        setTimeout(() => setActionFlash(null), 600);
        setSwipeX(0);
        return;
      }
      setSwipeX(0);

      // Tap (no significant movement, no captured swipe, fast).
      if (!longPressFired.current && !captured && Math.abs(dx) < 8 && Math.abs(dy) < 8 && dt < 500) {
        onOpen?.(recipe);
      }
    };
    const onPointerCancel = () => {
      clearTimeout(longPressTimer.current);
      setPressed(false);
      setSwipeX(0);
      startRef.current = null;
    };

    return (
      <div className={'card-wrap ' + (actionFlash ? 'flash-' + actionFlash : '')}>
        <div className="swipe-bg swipe-bg-fav" aria-hidden>
          <span style={{fontSize: 16}}>♥</span>
          <span>{recipe.favorite ? 'Unfavorite' : 'Favorite'}</span>
        </div>
        <div className="swipe-bg swipe-bg-del" aria-hidden>
          <span>Delete</span>
          <span style={{fontSize: 16}}>×</span>
        </div>
        <article
          className={'recipe-card ' + (pressed ? 'pressed' : '')}
          style={{
            transform: `translateX(${swipeX}px) rotate(${swipeX * 0.04}deg)`,
            transition: swipeX === 0 ? 'transform 280ms cubic-bezier(.2,.9,.3,1.2)' : 'none',
          }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerCancel}
        >
          <div className="recipe-card-media">
            <RecipeMedia recipe={recipe} />
            {sourceLabel && (
              <span className="source-corner">
                {platform === 'instagram' ? <Icon.InstagramIcon /> : platform === 'tiktok' ? <Icon.TikTokIcon /> : <Icon.Globe />}
                {sourceLabel}
              </span>
            )}
            {recipe.favorite && (
              <span className="fav-pill" aria-label="Favorite">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                  <path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0112 6a5.5 5.5 0 019.5 6c-2.5 4.5-9.5 9-9.5 9z"/>
                </svg>
              </span>
            )}
          </div>
          <div className="recipe-card-body">
            <h3 className="recipe-card-title">{recipe.title || 'Untitled'}</h3>
            <div className="recipe-card-meta">
              {timeLabel(recipe) && (
                <span className="time-badge">
                  <Icon.Clock />
                  {timeLabel(recipe)}
                </span>
              )}
              {timeLabel(recipe) && recipe.servings && <span className="meta-sep" />}
              {recipe.servings && (
                <span className="time-badge" style={{textTransform:'lowercase'}}>
                  <span aria-hidden style={{fontSize: 11, lineHeight: 1}}>🍽</span>
                  {recipe.servings}
                </span>
              )}
            </div>
          </div>
        </article>
      </div>
    );
  }

  // ---------- Detail ----------
  function DetailScreen({ recipe, onClose, onSave, onDelete, onEdit, onShare, onAddToShopping, units, setUnits }) {
    const [tab, setTab] = useState('ingredients');
    const [checkedIng, setCheckedIng] = useState(() => new Set(loadChecked(recipe.id)));
    const [stepIdx, setStepIdx] = useState(0);
    const [notes, setNotes] = useState(recipe.notes || '');
    const [rating, setRating] = useState(recipe.rating || 0);
    const [favorite, setFavorite] = useState(!!recipe.favorite);
    const [cooked, setCooked] = useState(recipe.cooked || 0);
    const [dragX, setDragX] = useState(0);
    const [closing, setClosing] = useState(false);
    const [cooking, setCooking] = useState(false);          // cooking mode active (wake lock + steps tab)
    const [cookedFlash, setCookedFlash] = useState(false);
    const wakeLockRef = useRef(null);
    const swipeStart = useRef(null);
    const personalDirty = useRef(false);

    // ---- Wake lock: keep screen awake while cooking ----
    const acquireWakeLock = useCallback(async () => {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLockRef.current = await navigator.wakeLock.request('screen');
        // Auto-rerequest if the system releases it (e.g. tab backgrounded then refocused)
        wakeLockRef.current.addEventListener('release', () => { wakeLockRef.current = null; });
      } catch {
        wakeLockRef.current = null;
      }
    }, []);
    const releaseWakeLock = useCallback(() => {
      if (wakeLockRef.current) {
        try { wakeLockRef.current.release(); } catch {}
        wakeLockRef.current = null;
      }
    }, []);

    // Re-acquire when tab returns to foreground while still cooking.
    useEffect(() => {
      if (!cooking) return;
      const onVisible = () => {
        if (document.visibilityState === 'visible' && !wakeLockRef.current) {
          acquireWakeLock();
        }
      };
      document.addEventListener('visibilitychange', onVisible);
      return () => document.removeEventListener('visibilitychange', onVisible);
    }, [cooking, acquireWakeLock]);

    // Release on unmount or when cooking ends.
    useEffect(() => () => releaseWakeLock(), [releaseWakeLock]);

    const platform = recipe.sourceUrl ? detectPlatform(recipe.sourceUrl) : 'web';
    const isSocial = platform === 'instagram' || platform === 'tiktok';
    const hasLink  = !!recipe.sourceUrl;

    // ---- iOS-style swipe-back from left edge ----
    const onPointerDownSwipe = (e) => {
      // Only initiate if the touch starts within 25px of the left viewport edge.
      if (e.clientX <= 25) {
        swipeStart.current = { x: e.clientX, y: e.clientY, captured: false };
      }
    };
    const onPointerMoveSwipe = (e) => {
      if (!swipeStart.current) return;
      const dx = e.clientX - swipeStart.current.x;
      const dy = e.clientY - swipeStart.current.y;
      // If the user moves more vertically than horizontally early on, this is
      // a scroll, not a swipe — bail out and let the scroll happen.
      if (!swipeStart.current.captured && Math.abs(dy) > Math.abs(dx) + 6) {
        swipeStart.current = null;
        setDragX(0);
        return;
      }
      if (dx > 6) {
        swipeStart.current.captured = true;
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
        setDragX(Math.max(0, dx));
      }
    };
    const onPointerUpSwipe = () => {
      if (!swipeStart.current) return;
      const wasCaptured = swipeStart.current.captured;
      swipeStart.current = null;
      if (!wasCaptured) { setDragX(0); return; }
      const threshold = Math.min(140, window.innerWidth * 0.28);
      if (dragX > threshold) {
        // Animate the screen sliding off, then dismiss.
        setClosing(true);
        setDragX(window.innerWidth);
        setTimeout(onClose, 240);
      } else {
        setDragX(0);
      }
    };

    const toggleIng = (i) => {
      setCheckedIng(prev => {
        const n = new Set(prev);
        n.has(i) ? n.delete(i) : n.add(i);
        saveChecked(recipe.id, Array.from(n));
        return n;
      });
    };

    const toggleFav = async () => {
      const next = !favorite;
      setFavorite(next);
      // Merge the rest of the local DetailScreen state (notes, rating, cooked)
      // so we don't trample unsaved edits from the Notes tab.
      personalDirty.current = false;
      try { await onSave({ ...recipe, favorite: next, notes, rating, cooked }); } catch {}
    };

    const toggleCooking = async () => {
      if (cooking) {
        // End the cooking session.
        setCooking(false);
        releaseWakeLock();
        return;
      }
      // Start cooking: switch to steps tab, jump to first step, bump count, acquire wake lock.
      setTab('steps');
      setStepIdx(0);
      const next = cooked + 1;
      setCooked(next);
      setCooking(true);
      setCookedFlash(true);
      acquireWakeLock();
      if (navigator.vibrate) try { navigator.vibrate(15); } catch {}
      setTimeout(() => setCookedFlash(false), 600);
      try { await onSave({ ...recipe, cooked: next, favorite }); } catch {}
    };

    const openSource = () => {
      if (hasLink) window.open(recipe.sourceUrl, '_blank', 'noopener');
    };

    // Keep the latest persist-fn in a ref so the unmount cleanup below sees
    // the freshest closure WITHOUT firing the cleanup on every keystroke
    // (which would re-save on every character). The actual save trigger is
    // the textarea's onBlur and toggleFav / startCooking explicit calls.
    const persistPersonal = useCallback(async () => {
      if (!personalDirty.current) return;
      personalDirty.current = false;
      try { await onSave({ ...recipe, notes, rating, favorite, cooked }); } catch {}
    }, [recipe, notes, rating, favorite, cooked, onSave]);
    const persistRef = useRef(persistPersonal);
    persistRef.current = persistPersonal;
    useEffect(() => () => { persistRef.current(); }, []);  // unmount-only

    const tags = recipe.tags || [];
    const ingredients = recipe.ingredients || [];
    const instructions = (recipe.instructions || []).map((s, i) => ({
      i, text: s, isHeader: /^—.*—$/.test(s)
    }));

    const dragOpacity = Math.max(0.3, 1 - dragX / (window.innerWidth || 800));

    return (
      <div
        className="detail-screen"
        onPointerDown={onPointerDownSwipe}
        onPointerMove={onPointerMoveSwipe}
        onPointerUp={onPointerUpSwipe}
        onPointerCancel={onPointerUpSwipe}
        style={{
          transform: dragX ? `translateX(${dragX}px)` : undefined,
          opacity: dragX ? dragOpacity : undefined,
          transition: closing
            ? 'transform 240ms cubic-bezier(.2,.7,.3,1), opacity 240ms'
            : (swipeStart.current?.captured ? 'none' : 'transform 220ms cubic-bezier(.2,.7,.3,1.1), opacity 220ms'),
        }}
      >
        <button className="detail-close" onClick={onClose} aria-label="Back"><Icon.Back /></button>
        <button className={'detail-fav ' + (favorite ? 'on' : '')} onClick={toggleFav} aria-label="Favorite">
          <Icon.Heart filled={favorite} />
        </button>

        {hasLink && (
          <button className="detail-source-btn" onClick={openSource} aria-label={'View on ' + urlHost(recipe.sourceUrl)}>
            <Icon.Link />
          </button>
        )}

        {recipe.videoPath ? (
          <div
            className="detail-hero detail-hero-video"
            style={{ aspectRatio: 'auto', maxHeight: '78vh', background: '#000' }}
          >
            <ArchivedVideo recipeId={recipe.id} poster={recipe.image} />
            <div className="detail-hero-fade" />
            {(recipe.author || recipe.sourceUrl) && (
              <div className="detail-source-row">
                <SourceBadge url={recipe.sourceUrl} size="lg" />
                {recipe.author && <span className="detail-author">{recipe.author}</span>}
              </div>
            )}
          </div>
        ) : isSocial ? (
          <div className="detail-hero" style={{aspectRatio: 'auto', maxHeight: 'none'}}>
            <SocialEmbed url={recipe.sourceUrl} platform={platform} fallbackImage={recipe.image} />
          </div>
        ) : (
          <div className="detail-hero">
            <RecipeMedia recipe={recipe} />
            <div className="detail-hero-fade" />
            {(recipe.author || recipe.sourceUrl) && (
              <div className="detail-source-row">
                <SourceBadge url={recipe.sourceUrl} size="lg" />
                {recipe.author && <span className="detail-author">{recipe.author}</span>}
              </div>
            )}
          </div>
        )}

        <div className="detail-body">
          <h1 className="detail-title">{recipe.title || 'Untitled'}</h1>
          {recipe.description && <p className="detail-description">{recipe.description}</p>}

          {(recipe.prepTime || recipe.cookTime || recipe.totalTime || recipe.servings || cooked > 0) && (
            <div className="detail-meta-row">
              {recipe.prepTime  && <div className="meta-pill"><span className="meta-pill-icon">⏱</span> Prep {recipe.prepTime}</div>}
              {recipe.cookTime  && <div className="meta-pill"><span className="meta-pill-icon">🔥</span> Cook {recipe.cookTime}</div>}
              {!recipe.prepTime && !recipe.cookTime && recipe.totalTime &&
                <div className="meta-pill"><span className="meta-pill-icon">⏱</span> {recipe.totalTime}</div>}
              {recipe.servings && <div className="meta-pill"><span className="meta-pill-icon">🍽</span> {recipe.servings}</div>}
              {cooked > 0 && (
                <div className={'meta-pill ' + (cookedFlash ? 'cooked-pill' : '')}>
                  <span className="meta-pill-icon">🍴</span> cooked {cooked}×
                </div>
              )}
            </div>
          )}

          {tags.length > 0 && (
            <div className="tag-row">
              {tags.map(t => <span key={t} className="tag tag-accent">{t}</span>)}
            </div>
          )}

          {cooking && (
            <div className="cooking-indicator">
              <span className="dot-pulse" /> Cooking · screen stays on
            </div>
          )}

          <div className="units-toggle-row">
            <button
              className={'units-toggle ' + (units === 'us' ? 'on' : '')}
              onClick={() => setUnits('us')}
            >US</button>
            <button
              className={'units-toggle ' + (units === 'metric' ? 'on' : '')}
              onClick={() => setUnits('metric')}
            >Metric</button>
          </div>

          <div className="tabs">
            <button className={'tab ' + (tab === 'ingredients' ? 'on' : '')} onClick={() => setTab('ingredients')}>
              Ingredients <span className="tab-count">{ingredients.length}</span>
            </button>
            <button className={'tab ' + (tab === 'steps' ? 'on' : '')} onClick={() => setTab('steps')}>
              Steps <span className="tab-count">{instructions.filter(s => !s.isHeader).length}</span>
            </button>
            <button className={'tab ' + (tab === 'notes' ? 'on' : '')} onClick={() => setTab('notes')}>
              Notes
            </button>
          </div>

          {tab === 'ingredients' && (
            <ul className="ingredient-list">
              {ingredients.map((ing, i) => {
                const isSection = /^—.*—$/.test(ing);
                if (isSection) {
                  return (
                    <li key={i} className="ing-section">
                      {ing.replace(/—/g, '').trim()}
                    </li>

                }
                return (
                  <li key={i} className={'ing-row ' + (checkedIng.has(i) ? 'checked' : '')} onClick={() => toggleIng(i)}>

                </li>
              ) : (
                <li
                  key={step.i}

                  onClick={() => setStepIdx(step.i)}
                >
                  <span className="step-num">{instructions.slice(0, step.i).filter(s => !s.isHeader).length + 1}</span>
                  <span className="step-text">{convertText(step.text, units)}</span>

              ))}

          {tab === 'notes' && (
            <div>
              <div className="stars-row">
                {[1,2,3,4,5].map(n => (
                  <span key={n} onClick={() => { setRating(n === rating ? 0 : n); personalDirty.current = true; }}>
                    <Icon.Star filled={n <= rating} />

                ))}
              </div>
              <textarea

              {extractedByLabel(recipe.extractedBy) && (
                <div className="extract-attribution">

          <div style={{height: 100}} />

          <div className="detail-actions-bar">
            <button
              className={'cook-btn ' + (cooking ? 'started' : '')}

            >

            <button className="ghost-btn" onClick={onAddToShopping} aria-label="Add to shopping list" style={{padding: '0 14px'}}>

                <circle cx="9" cy="21" r="1.5" />
                <circle cx="18" cy="21" r="1.5" />

              </svg>
            </button>
            <button className="ghost-btn" onClick={onShare} aria-label="Share" style={{padding: '0 14px'}}>
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" />
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" /><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
              </svg>
            </button>
            <button className="ghost-btn" onClick={onEdit} aria-label="Edit" style={{padding: '0 14px'}}>
              <Icon.Edit />
            </button>
            <button className="danger-btn" onClick={onDelete} aria-label="Delete">
              <Icon.Trash />

        </div>

    );

  // ---------- Archived video player ----------
  // Lazy: shows ONLY the thumbnail with a play overlay until the user taps it.
  // Tap → fetch a fresh Dropbox temp link → swap to a real <video> that
  // auto-plays. Saves bandwidth (no video bytes loaded for users who just
  // want to read the recipe) and avoids the cost of minting temp links on
  // every detail-view open.
  function ArchivedVideo({ recipeId, poster }) {
    const [state, setState] = useState('idle');  // idle | loading | playing | error
    const [src, setSrc] = useState(null);
    const [err, setErr] = useState(null);
    const [posterFailed, setPosterFailed] = useState(false);

    const loadAndPlay = async () => {
      if (state === 'loading' || state === 'playing') return;
      setState('loading');
      try {
        const { url } = await api.videoLink(recipeId);
        setSrc(url);
        setState('playing');
      } catch (e) {
        setErr(e.message || 'Could not load video');
        setState('error');
      }
    };

    if (state === 'playing' && src) {
      return (
        <video
          src={src}
          poster={poster || undefined}
          controls
          autoPlay
          playsInline
          preload="metadata"
          style={{
            width: '100%',
            height: 'auto',
            maxHeight: '78vh',
            objectFit: 'contain',
            display: 'block',
            background: '#000',
          }}
        />
      );
    }

    // Idle / loading / error — show the thumbnail with a play overlay.
    // The textured "empty" backdrop is always rendered so we never show a
    // blank box; the poster image overlays on top when it's available, and
    // gets removed if it fails to load.
    return (
      <button
        type="button"
        className="video-poster-btn"
        onClick={loadAndPlay}
        aria-label="Play video"
      >
        <div className="video-poster-empty" />
        {poster && !posterFailed && (
          <img
            src={poster}
            alt=""
            className="video-poster-img"
            onError={() => setPosterFailed(true)}
          />
        )}
        <div className="video-play-overlay">
          {state === 'loading' ? (
            <span className="spinner on-accent" style={{width: 32, height: 32, borderWidth: 3}} />
          ) : (
            <span className="video-play-button" aria-hidden>
              <svg viewBox="0 0 24 24" width="34" height="34" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
            </span>
          )}
        </div>
        {state === 'error' && (
          <div className="video-error-banner">{err || 'Could not load video'}</div>
        )}
      </button>
    );
  }

  // ---------- Social embed (Instagram + TikTok) ----------
  function SocialEmbed({ url, platform, fallbackImage }) {
    useEffect(() => {
      const scriptId = platform === 'instagram' ? 'ig-embed-js' : 'tt-embed-js';
      const scriptSrc = platform === 'instagram'
        ? 'https://www.instagram.com/embed.js'
        : 'https://www.tiktok.com/embed.js';
      const ensureScript = () => new Promise((resolve) => {
        if (document.getElementById(scriptId)) {
          if (platform === 'instagram' && window.instgrm?.Embeds) window.instgrm.Embeds.process();
          return resolve();
        }
        const s = document.createElement('script');
        s.id = scriptId; s.async = true; s.src = scriptSrc;
        s.onload = () => {
          if (platform === 'instagram' && window.instgrm?.Embeds) window.instgrm.Embeds.process();
          resolve();
        };
        document.body.appendChild(s);
      });
      ensureScript();
    }, [url, platform]);

    if (platform === 'instagram') {
      return (
        <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)'}}>
          <blockquote
            className="instagram-media"
            data-instgrm-permalink={url}
            data-instgrm-version="14"
            style={{ background:'#fff', border:0, borderRadius:'10px', margin:'0 auto', maxWidth:'400px', minWidth:'280px', padding:0 }}
          >
            <a href={url} target="_blank" rel="noopener" style={{display:'block', padding:'40px', textAlign:'center', color:'var(--ink-3)'}}>
              {fallbackImage
                ? <img src={fallbackImage} alt="" style={{width:'100%', borderRadius:'10px'}} />
                : <span>Loading Instagram reel…</span>}
            </a>
          </blockquote>
        </div>
      );
    }

    const videoIdMatch = (url || '').match(/\/video\/(\d+)/);
    const videoId = videoIdMatch ? videoIdMatch[1] : '';
    return (
      <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)'}}>
        <blockquote className="tiktok-embed" cite={url} data-video-id={videoId} style={{maxWidth:'400px', minWidth:'280px', margin:'0 auto'}}>
          <section>
            <a href={url} target="_blank" rel="noopener" style={{display:'block', padding:'40px', textAlign:'center', color:'var(--ink-3)'}}>
              {fallbackImage
                ? <img src={fallbackImage} alt="" style={{width:'100%', borderRadius:'10px'}} />
                : <span>Loading TikTok video…</span>}
            </a>
          </section>
        </blockquote>
      </div>
    );
  }

  // ---------- Edit form (overlay) ----------
  function EditForm({ recipe, onCancel, onSave }) {
    const [draft, setDraft] = useState(recipe);
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState(null);

    const updateDraft = (patch) => setDraft(d => ({...d, ...patch}));
    const updateArr = (key, idx, val) => setDraft(d => {
      const arr = [...(d[key] || [])];
      if (val == null) arr.splice(idx, 1); else arr[idx] = val;
      return { ...d, [key]: arr };
    });
    const addArrItem = (key) => setDraft(d => ({...d, [key]: [...(d[key] || []), '']}));

    const doSave = async () => {
      if (!(draft.title || '').trim()) { setErr('Title is required.'); return; }
      setBusy(true); setErr(null);
      try {
        const saved = await onSave(draft);
        // onSave should close the overlay
      } catch (e) {
        setErr(e.message || 'Save failed.');
      } finally {
        setBusy(false);
      }
    };

    const tagsString = (draft.tags || []).join(', ');

    return (
      <div className="detail-screen">
        <div className="detail-body" style={{padding: '20px 22px 100px', marginTop: 0, borderRadius: 0}}>
          <button className="ghost-btn" onClick={onCancel} style={{marginBottom: 14, height: 36, padding: '0 14px', fontSize: 13}}>
            <Icon.Back /> Cancel
          </button>
          <h1 className="detail-title">Edit recipe</h1>

          <div className="field"><label className="field-label">Title</label>
            <input className="field-input" value={draft.title || ''} onChange={e => updateDraft({title: e.target.value})} />
          </div>

          <div className="field"><label className="field-label">Description</label>
            <textarea className="field-textarea" style={{minHeight: 70}} value={draft.description || ''} onChange={e => updateDraft({description: e.target.value})} />
          </div>

          <div className="row-group">
            <div className="field"><label className="field-label">Prep</label>
              <input className="field-input" value={draft.prepTime || ''} onChange={e => updateDraft({prepTime: e.target.value})} />
            </div>
            <div className="field"><label className="field-label">Cook</label>
              <input className="field-input" value={draft.cookTime || ''} onChange={e => updateDraft({cookTime: e.target.value})} />
            </div>
            <div className="field"><label className="field-label">Total</label>
              <input className="field-input" value={draft.totalTime || ''} onChange={e => updateDraft({totalTime: e.target.value})} />
            </div>
            <div className="field"><label className="field-label">Servings</label>
              <input className="field-input" value={draft.servings || ''} onChange={e => updateDraft({servings: e.target.value})} />
            </div>
          </div>

          <div className="field"><label className="field-label">Tags (comma-separated)</label>
            <input className="field-input" value={tagsString}
              onChange={e => updateDraft({tags: e.target.value.split(',').map(s => s.trim()).filter(Boolean)})}
              placeholder="weeknight, vegetarian, soup" />
          </div>

          <div className="field">
            <label className="field-label">Ingredients</label>
            {(draft.ingredients || []).map((ing, i) => (
              <div key={i} style={{display:'flex', gap:'8px', marginBottom:'6px'}}>
                <input className="field-input" value={ing} onChange={e => updateArr('ingredients', i, e.target.value)} />
                <button type="button" className="ghost-btn" style={{height: 'auto', padding: '0 12px'}} onClick={() => updateArr('ingredients', i, null)} title="Remove">×</button>
              </div>
            ))}
            <button type="button" className="ghost-btn" style={{height: 36, padding: '0 14px', fontSize: 13, marginTop: 6}} onClick={() => addArrItem('ingredients')}>+ Add ingredient</button>
          </div>

          <div className="field">
            <label className="field-label">Instructions</label>
            {(draft.instructions || []).map((step, i) => (
              <div key={i} style={{display:'flex', gap:'8px', marginBottom:'6px'}}>
                <textarea className="field-textarea" style={{minHeight: 50}} value={step} onChange={e => updateArr('instructions', i, e.target.value)} />
                <button type="button" className="ghost-btn" style={{height: 'auto', padding: '0 12px'}} onClick={() => updateArr('instructions', i, null)} title="Remove">×</button>
              </div>
            ))}
            <button type="button" className="ghost-btn" style={{height: 36, padding: '0 14px', fontSize: 13, marginTop: 6}} onClick={() => addArrItem('instructions')}>+ Add step</button>
          </div>

          <div className="field"><label className="field-label">Image URL</label>
            <input className="field-input" value={draft.image || ''} onChange={e => updateDraft({image: e.target.value})} />
          </div>
          <div className="field"><label className="field-label">Source URL</label>
            <input className="field-input" value={draft.sourceUrl || ''} onChange={e => updateDraft({sourceUrl: e.target.value})} />
          </div>

          {err && <div className="error-box">{err}</div>}
        </div>

        <div className="detail-actions-bar">
          <button className="ghost-btn" onClick={onCancel}>Cancel</button>
          <button className="primary-btn" onClick={doSave} disabled={busy}>
            {busy ? <><span className="spinner on-accent" /> Saving…</> : 'Save changes'}
          </button>
        </div>
      </div>
    );
  }

  // ---------- Shopping screen ----------
  const SHOP_CATEGORY_ORDER = ['produce', 'meat', 'seafood', 'dairy', 'bakery', 'pantry', 'frozen', 'beverages', 'other'];
  const SHOP_CATEGORY_LABEL = {
    produce:   '🥬 Produce',
    meat:      '🥩 Meat',
    seafood:   '🐟 Seafood',
    dairy:     '🥛 Dairy',
    bakery:    '🍞 Bakery',
    pantry:    '🥫 Pantry',
    frozen:    '🧊 Frozen',
    beverages: '🥤 Beverages',
    other:     '🛒 Other',
  };

  function ShoppingScreen({ items, onToggle, onClearChecked, onClearAll, onOpenAdd, onOpenSettings, recipes }) {
    // Group by category — checked items stay in place (strikethrough only),
    // they don't move to a separate section. Order within a category is the
    // order items were added.
    const grouped = useMemo(() => {
      const byCat = {};
      for (const it of items) {
        const cat = it.category || 'other';
        (byCat[cat] ||= []).push(it);
      }
      return SHOP_CATEGORY_ORDER
        .filter(c => byCat[c] && byCat[c].length)
        .map(c => [c, byCat[c]]);
    }, [items]);

    const totalPending = items.filter(it => !it.checked).length;
    const totalChecked = items.filter(it => it.checked).length;

    return (
      <div className="screen">
        <div className="lib-header">
          <div className="brand-row">
            <div className="brand">Shopping<span className="dot">.</span></div>
            <div className="header-count">
              {totalPending} {totalPending === 1 ? 'item' : 'items'}
              {totalChecked > 0 && <> · {totalChecked} got</>}
            </div>
          </div>
          <div className="search-row">

  // ---------- Add Shopping sheet ----------
  function AddShoppingSheet({ onClose, recipes, onAddTyped, onAddPhoto, onAddFromRecipes }) {
    const [tab, setTab] = useState('type');
    const [text, setText] = useState('');
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState(null);
    const [selectedIds, setSelectedIds] = useState(new Set());
    const fileRef = useRef(null);

    const submitTyped = async () => {
      const items = text.split('\n').map(s => s.trim()).filter(Boolean);
      if (items.length === 0) { setErr('Add at least one item.'); return; }
      setBusy(true); setErr(null);
      try {
        await onAddTyped(items);
        onClose();
      } catch (e) { setErr(e.message || 'Could not add items.'); }
      finally { setBusy(false); }
    };

    const submitPhoto = async (file) => {
      if (!file) return;
      setBusy(true); setErr(null);
      try {
        const reader = new FileReader();
        const dataUrl = await new Promise((resolve, reject) => {
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error('Could not read image'));
          reader.readAsDataURL(file);
        });
        await onAddPhoto(dataUrl);
        onClose();
      } catch (e) { setErr(e.message || 'Could not process image.'); }
      finally { setBusy(false); }
    };

    const submitRecipes = async () => {
      const ids = Array.from(selectedIds);
      if (ids.length === 0) { setErr('Pick at least one recipe.'); return; }
      setBusy(true); setErr(null);
      try {
        await onAddFromRecipes(ids);
        onClose();
      } catch (e) { setErr(e.message || 'Could not add ingredients.'); }
      finally { setBusy(false); }
    };

    const toggleRecipe = (id) => {
      setSelectedIds(prev => {
        const next = new Set(prev);
        next.has(id) ? next.delete(id) : next.add(id);
        return next;
      });
    };

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <div className="sheet-grab" />
          <h2 className="sheet-title">Add to shopping list</h2>
          <p className="sheet-sub">Type, snap a photo, or pull from your recipes — we dedupe automatically.</p>

          <div className="add-shop-tabs">
            <button className={'add-shop-tab ' + (tab === 'type' ? 'active' : '')} onClick={() => setTab('type')}>Type</button>
            <button className={'add-shop-tab ' + (tab === 'photo' ? 'active' : '')} onClick={() => setTab('photo')}>Photo</button>
            <button className={'add-shop-tab ' + (tab === 'recipes' ? 'active' : '')} onClick={() => setTab('recipes')}>From recipes</button>
          </div>

          {tab === 'type' && (
            <>
              <textarea
                className="add-shop-textarea"
                value={text}
                onChange={e => setText(e.target.value)}
                placeholder="One item per line:&#10;2 cans diced tomatoes&#10;1 lb ground beef&#10;olive oil"
                autoFocus
              />
              {err && <div className="error-box">{err}</div>}
              <button className="primary-btn" onClick={submitTyped} disabled={busy || !text.trim()}>
                {busy ? <><span className="spinner on-accent" /> Adding…</> : 'Add to list'}
              </button>
            </>
          )}

          {tab === 'photo' && (
            <>
              <div className="photo-pick-card" onClick={() => fileRef.current?.click()}>
                <div className="icon">📷</div>
                <div className="title">Snap or upload a photo</div>
                <div className="sub">Handwritten or printed list. We'll read it.</div>
              </div>
              <input
                ref={fileRef}
                type="file"
                accept="image/*"
                capture="environment"
                style={{display: 'none'}}
                onChange={e => submitPhoto(e.target.files?.[0])}
              />
              {err && <div className="error-box">{err}</div>}
              {busy && <div style={{textAlign: 'center', padding: 12, color: 'var(--ink-3)'}}>
                <span className="spinner" /> Reading the photo…
              </div>}
            </>
          )}

          {tab === 'recipes' && (
            <>
              <div style={{maxHeight: '50vh', overflowY: 'auto', marginBottom: 14, marginLeft: -4, marginRight: -4}}>
                {recipes.length === 0 ? (
                  <p style={{color: 'var(--ink-3)', textAlign: 'center', padding: 24}}>No saved recipes yet.</p>
                ) : recipes.map(r => (
                  <div
                    key={r.id}
                    className={'recipe-pick-row ' + (selectedIds.has(r.id) ? 'selected' : '')}
                    onClick={() => toggleRecipe(r.id)}
                  >
                    <div className="recipe-pick-thumb"><RecipeMedia recipe={r} /></div>
                    <div className="recipe-pick-name">{r.title || 'Untitled'}</div>
                    <div className="recipe-pick-check">
                      {selectedIds.has(r.id) && (
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round">
                          <path d="M5 13l4 4 10-10" />
                        </svg>
                      )}
                    </div>
                  </div>
                ))}
              </div>
              {err && <div className="error-box">{err}</div>}
              <button className="primary-btn" onClick={submitRecipes} disabled={busy || selectedIds.size === 0}>
                {busy ? <><span className="spinner on-accent" /> Adding…</> : `Add ingredients of ${selectedIds.size || 'selected'}`}
              </button>
            </>
          )}
        </div>
      </div>
    );

  // ---------- Stats sheet ----------
  // Aggregates from already-loaded recipes — no extra API call. Shows what
  // worked (which extraction paths the user is hitting), how often each
  // recipe gets cooked, and which tags dominate. Honest dashboard for "is
  // this app actually useful for me?"
  function StatsSheet({ recipes, onClose }) {
    const stats = useMemo(() => {
      const byPath = {};
      let cookedTotal = 0;
      let rated = 0, ratingSum = 0;
      let withVideo = 0;
      const tagCounts = {};
      for (const r of recipes) {
        const path = r.extractedBy || 'manual';
        byPath[path] = (byPath[path] || 0) + 1;
        cookedTotal += (r.cooked || 0);
        if (r.rating > 0) { rated++; ratingSum += r.rating; }
        if (r.videoPath) withVideo++;
        for (const t of r.tags || []) tagCounts[t] = (tagCounts[t] || 0) + 1;
      }
      const sortedPaths = Object.entries(byPath).sort((a, b) => b[1] - a[1]);
      const topTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);
      const avgRating = rated > 0 ? (ratingSum / rated).toFixed(1) : null;
      return { total: recipes.length, byPath: sortedPaths, cookedTotal, avgRating, topTags, withVideo };
    }, [recipes]);

    if (stats.total === 0) {
      return (
        <div className="sheet-overlay" onClick={onClose}>
          <div className="sheet" onClick={e => e.stopPropagation()}>
            <div className="sheet-grab" />
            <h2 className="sheet-title">Your kitchen stats</h2>
            <p className="sheet-sub">Save a recipe first and stats will show up here.</p>
          </div>
        </div>
      );
    }

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <div className="sheet-grab" />
          <h2 className="sheet-title">Your kitchen stats</h2>
          <p className="sheet-sub">A quick look at what's working in your library.</p>

          <div className="stats-row">
            <div className="stat-card">
              <div className="stat-value">{stats.total}</div>
              <div className="stat-label">Recipes</div>
            </div>
            <div className="stat-card">
              <div className="stat-value">{stats.cookedTotal}</div>
              <div className="stat-label">Times cooked</div>
            </div>
            {stats.avgRating ? (
              <div className="stat-card">
                <div className="stat-value">{stats.avgRating}<span style={{fontSize: 16, marginLeft: 2}}> ★</span></div>
                <div className="stat-label">Avg rating</div>
              </div>
            ) : (
              <div className="stat-card">
                <div className="stat-value">{stats.withVideo}</div>
                <div className="stat-label">With video</div>
              </div>
            )}
          </div>

          <h3 className="filter-section-title">How recipes were extracted</h3>
          <div className="path-bars">
            {stats.byPath.map(([path, count]) => {
              const pct = Math.round(count * 100 / stats.total);
              return (
                <div key={path}>
                  <div className="path-bar-label">
                    <span className="name">{extractedByLabel(path) || path}</span>
                    <span className="count">{count}</span>
                    <span className="pct">{pct}%</span>
                  </div>
                  <div className="path-bar-fill">
                    <div style={{ width: pct + '%' }} />
                  </div>
                </div>
              );
            })}
          </div>

          {stats.topTags.length > 0 && (
            <>
              <h3 className="filter-section-title">Top tags</h3>
              <div className="chip-row">
                {stats.topTags.map(([tag, count]) => (
                  <span key={tag} className="chip">
                    {tag} <b style={{marginLeft: 4, color: 'var(--ink)'}}>{count}</b>
                  </span>
                ))}
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // ---------- Filter sheet ----------
  function FilterSheet({ recipes, filters, setFilters, onClose }) {
    const [draft, setDraft] = useState(filters);

    const allTags = useMemo(() => {
      const set = new Set();
      recipes.forEach(r => (r.tags || []).forEach(t => set.add(t)));
      return Array.from(set).sort();
    }, [recipes]);

    const toggleArr = (group, val) => {
      setDraft(prev => {
        const arr = prev[group];
        return { ...prev, [group]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val] };
      });
    };

    const reset = () => setDraft(emptyFilters());
    const apply = () => { setFilters(draft); onClose(); };

    // Live count: how many recipes the current draft would match
    const match = useMemo(() => {
      return recipes.filter(r => {
        if (draft.tags.length && !draft.tags.some(t => (r.tags || []).includes(t))) return false;
        if (draft.source.length) {
          const p = r.sourceUrl ? detectPlatform(r.sourceUrl) : 'web';
          if (!draft.source.includes(p)) return false;
        }
        if (draft.time.length) {
          const mins = recipeMinutes(r);
          const buckets = TIME_BUCKETS.filter(b => draft.time.includes(b.id));
          if (!buckets.some(b => b.test(mins))) return false;
        }
        if (draft.favorite && !r.favorite) return false;
        return true;
      }).length;
    }, [recipes, draft]);

    return (
      <div className="sheet-overlay" onClick={onClose}>
        <div className="sheet" onClick={e => e.stopPropagation()}>
          <div className="sheet-grab" />
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: 12}}>
            <h2 className="sheet-title" style={{margin: 0}}>Filters</h2>
            <button className="btn-text" onClick={reset} style={{padding: 0}}>Reset</button>
          </div>

          <div className="filter-section">
            <h3 className="filter-section-title">Time</h3>
            <div className="chip-row">
              {TIME_BUCKETS.map((o, i) => (
                <button
                  key={o.id}
                  className={'chip ' + (draft.time.includes(o.id) ? 'on' : '')}
                  style={{ animationDelay: `${i * 30}ms` }}
                  onClick={() => toggleArr('time', o.id)}
                >
                  {o.label}
                </button>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <h3 className="filter-section-title">Source</h3>
            <div className="chip-row">
              {SOURCE_OPTIONS.map((o, i) => (
                <button
                  key={o.id}
                  className={'chip ' + (draft.source.includes(o.id) ? 'on' : '')}
                  style={{ animationDelay: `${i * 30}ms` }}
                  onClick={() => toggleArr('source', o.id)}
                >
                  {o.label}
                </button>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <h3 className="filter-section-title">Favorites</h3>
            <div className="chip-row">
              <button
                className={'chip ' + (draft.favorite ? 'on' : '')}
                onClick={() => setDraft(p => ({ ...p, favorite: !p.favorite }))}
              >
                ♥ Favorites only
              </button>
            </div>
          </div>

          {allTags.length > 0 && (
            <div className="filter-section">
              <h3 className="filter-section-title">Tags</h3>
              <div className="chip-row">
                {allTags.map((t, i) => (
                  <button
                    key={t}
                    className={'chip ' + (draft.tags.includes(t) ? 'on' : '')}
                    style={{ animationDelay: `${i * 25}ms` }}
                    onClick={() => toggleArr('tags', t)}
                  >
                    {t}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div className="sheet-bottom-actions">
            <button className="primary-btn" onClick={apply}>
              Show {match} {match === 1 ? 'recipe' : 'recipes'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---------- Import sheet ----------
  function ImportSheet({ onClose, onImported, onPreviewSave, showToast, recipes, onOpenExisting }) {
    const [stage, setStage] = useState('paste');  // paste | detecting | preview | duplicate | error
    const [url, setUrl] = useState('');
    const [analysis, setAnalysis] = useState('auto');
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState(null);
    const [preview, setPreview] = useState(null);
    const [duplicate, setDuplicate] = useState(null);
    const [progress, setProgress] = useState('');
    const [jobId, setJobId] = useState(null);
    const inputRef = useRef(null);
    const pollRef = useRef(null);

    useEffect(() => { setTimeout(() => inputRef.current?.focus(), 280); }, []);

    const trimmedUrl = url.trim();
    const platform = trimmedUrl ? detectPlatform(trimmedUrl) : null;
    const showAnalysis = isVideoUrl(trimmedUrl);

    // Polling for video extraction
    useEffect(() => {
      if (!jobId) return;
      let cancelled = false;
      const tick = async () => {
        try {
          const job = await api.jobStatus(jobId);
          if (cancelled) return;
          setProgress(job.progress || job.status);
          if (job.status === 'done' && job.recipeId) {
            cancelled = true;
            try {
              const saved = await api.get(job.recipeId);
              onImported(saved);
            } catch (e) {
              setErr(e.message || 'Could not load extracted recipe.');
              setStage('error');
            }
          } else if (job.status === 'error') {
            cancelled = true;
            setErr(job.error || 'Extraction failed.');
            setStage('error');
          } else {
            pollRef.current = setTimeout(tick, 2000);
          }
        } catch {
          if (cancelled) return;
          pollRef.current = setTimeout(tick, 2500);
        }
      };
      pollRef.current = setTimeout(tick, 1500);
      return () => { cancelled = true; if (pollRef.current) clearTimeout(pollRef.current); };
    }, [jobId, onImported]);

    const startDetect = async () => {
      if (!trimmedUrl) return;
      setBusy(true); setErr(null);

      // If they pasted a share URL (one of OUR /#share=... links), redirect

      const shareMatch = trimmedUrl.match(/[#&]share=([^&]+)/);
      if (shareMatch) {
        // Hand off to the receive flow by setting the URL hash. The
        // top-level boot effect will pick it up and surface the receive screen.
        window.location.hash = 'share=' + shareMatch[1];
        window.location.reload();
        return;
      }

      // Duplicate detection: if a recipe with this same source URL already
      // exists in the user's library, surface it instead of re-importing.
      const normalized = normalizeUrl(trimmedUrl);
      const existing = (recipes || []).find(r => r.sourceUrl && normalizeUrl(r.sourceUrl) === normalized);
      if (existing) {
        setDuplicate(existing);
        setStage('duplicate');
        setBusy(false);
        return;
      }

      try {
        if (isVideoUrl(trimmedUrl)) {
          const { jobId: id } = await api.extractVideo(trimmedUrl, analysis);
          setJobId(id);
          setProgress('Queued');
          setStage('detecting');
        } else {
          setStage('detecting');
          const parsed = await api.extract(trimmedUrl);
          setPreview({
            id: newId(),
            ...parsed,
            tags: [],
            notes: '',
            rating: 0,
            favorite: false,
          });
          setStage('preview');
        }
      } catch (e) {
        setErr(e.message || 'Extraction failed.');
        setStage('error');

                  <Icon.Globe /> Recipe sites

                <span className={'detect-pill ' + (platform === 'instagram' ? 'on' : '')}>
                  <Icon.InstagramIcon /> Instagram

              {showAnalysis && (

              {err && <div className="error-box">{err}</div>}

          {stage === 'detecting' && (

                {isVideoUrl(trimmedUrl) ? (

                    <li className={'d-step ' + (progress && /resolving|downloading|fetching/i.test(progress) ? 'done' : '')}>Fetching video</li>
                    <li className={'d-step ' + (progress && /transcrib|whisper|gemini/i.test(progress) ? 'done' : '')}>Transcribing audio</li>

          {stage === 'preview' && preview && (
            <>
              <h2 className="sheet-title">Looks good?</h2>

                  <div className="preview-stats">

              </div>
              {err && <div className="error-box">{err}</div>}
              <div className="sheet-actions">
                <button className="ghost-btn" onClick={() => setStage('paste')}>Back</button>
                <button className="primary-btn" onClick={doSave} disabled={busy} style={{flex: 1}}>
                  {busy ? <><span className="spinner on-accent" /> Saving…</> : 'Save to library'}
                </button>
              </div>
            </>
          )}

          {stage === 'duplicate' && duplicate && (
            <>
              <h2 className="sheet-title">Already in your library</h2>
              <p className="sheet-sub">You've already imported this recipe. Open it instead?</p>
              <div className="preview-card">
                <div className="preview-media">
                  <RecipeMedia recipe={duplicate} />
                </div>
                <div className="preview-body">
                  <h3>{duplicate.title || 'Untitled'}</h3>
                  <div style={{marginBottom: 8}}>
                    <SourceBadge url={duplicate.sourceUrl} />
                  </div>
                  <div className="preview-stats">
                    <span><b>{(duplicate.ingredients || []).length}</b> ingredients</span>
                    <span><b>{(duplicate.instructions || []).length}</b> steps</span>
                    {timeLabel(duplicate) && <span><b>{timeLabel(duplicate)}</b></span>}
                  </div>
                </div>
              </div>
              <div className="sheet-actions">
                <button className="ghost-btn" onClick={onClose}>Cancel</button>
                <button className="primary-btn" onClick={() => onOpenExisting(duplicate)} style={{flex: 1}}>Open recipe</button>
              </div>
            </>
          )}

          {stage === 'error' && (
            <>
              <h2 className="sheet-title">Couldn't import</h2>
              <p className="sheet-sub">{err}</p>
              <div className="sheet-actions">
                <button className="ghost-btn" onClick={onClose}>Close</button>
                <button className="primary-btn" onClick={() => { setErr(null); setStage('paste'); }} style={{flex: 1}}>Try again</button>
              </div>
            </>
          )}
        </div>
      </div>
    );
  }

  // ---------- Helpers for the share flow ----------
  // Compress JSON → base64 in URL hash. Modern browsers all have CompressionStream.
  async function packShareHash(payload) {
    const json = JSON.stringify(payload);
    if (typeof CompressionStream === 'undefined') {
      // Fallback: just base64 (works, just longer URLs)
      return btoa(unescape(encodeURIComponent(json)));
    }
    const stream = new Blob([json]).stream().pipeThrough(new CompressionStream('gzip'));
    const buf = await new Response(stream).arrayBuffer();
    let bin = '';
    const bytes = new Uint8Array(buf);
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return 'g:' + btoa(bin);
  }
  async function unpackShareHash(hash) {
    if (!hash) return null;
    const isGzip = hash.startsWith('g:');
    const b64 = isGzip ? hash.slice(2) : hash;
    if (!isGzip) {
      try { return JSON.parse(decodeURIComponent(escape(atob(b64)))); }
      catch { return null; }
    }
    if (typeof DecompressionStream === 'undefined') return null;
    try {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
      const text = await new Response(stream).text();
      return JSON.parse(text);
    } catch { return null; }
  }

  // ---------- Share-receive screen ----------
  function ShareReceiveScreen({ payload, onSaved, onCancel }) {
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState(null);
    const [withVideo, setWithVideo] = useState(!!payload.videoUrl);

    const recipe = payload.recipe || {};
    const onSave = async () => {
      setBusy(true); setErr(null);
      try {
        const { recipe: saved } = await api.saveShared(recipe, withVideo ? payload.videoUrl : '');
        onSaved(saved);
      } catch (e) {
        setErr(e.message || 'Could not save the shared recipe.');
      } finally {
        setBusy(false);
      }
    };

    return (
      <div className="detail-screen" style={{overflowY: 'auto', padding: 0}}>
        <div className="detail-body" style={{paddingTop: 'calc(28px + env(safe-area-inset-top))', borderRadius: 0, marginTop: 0, paddingBottom: 100}}>
          <div className="preview-banner" style={{marginBottom: 18}}>✨ A friend shared this recipe with you</div>
          <h1 className="detail-title">{recipe.title || 'Untitled'}</h1>
          {recipe.description && <p className="detail-description">{recipe.description}</p>}
          <div style={{marginBottom: 16}}>
            <RecipeMedia recipe={recipe} />
          </div>
          {(recipe.prepTime || recipe.cookTime || recipe.totalTime || recipe.servings) && (
            <div className="detail-meta-row">
              {recipe.prepTime  && <div className="meta-pill"><span className="meta-pill-icon">⏱</span> Prep {recipe.prepTime}</div>}
              {recipe.cookTime  && <div className="meta-pill"><span className="meta-pill-icon">🔥</span> Cook {recipe.cookTime}</div>}
              {recipe.servings  && <div className="meta-pill"><span className="meta-pill-icon">🍽</span> {recipe.servings}</div>}
            </div>
          )}
          <p style={{color: 'var(--ink-2)', fontSize: 13, margin: '4px 0 16px'}}>
            <b>{(recipe.ingredients || []).length}</b> ingredients · <b>{(recipe.instructions || []).length}</b> steps
            {recipe.author ? <> · by {recipe.author}</> : null}
          </p>

          {payload.videoUrl && (
            <div className="setting-row" style={{margin: '0 0 16px', padding: '12px 14px', background: 'var(--bg-sunk)', borderRadius: 10, border: '1px solid var(--line)'}}>
              <div>
                <div className="setting-row-label">Include the video</div>
                <div className="setting-row-sub">A copy will be saved to your Dropbox</div>
              </div>
              <div className={'toggle ' + (withVideo ? 'on' : '')} onClick={() => setWithVideo(!withVideo)} role="button" tabIndex={0} />
            </div>
          )}

          {err && <div className="error-box">{err}</div>}
          <div className="sheet-actions" style={{marginBottom: 24}}>
            <button className="ghost-btn" onClick={onCancel}>Not now</button>
            <button className="primary-btn" onClick={onSave} disabled={busy} style={{flex: 1}}>
              {busy ? <><span className="spinner on-accent" /> Saving…</> : 'Save to my library'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---------- App shell ----------
  function App() {
    const [token, setToken] = useState(() => getDbxToken());
    const unlocked = !!token;
    const [account, setAccount] = useState(() => {
      try { return JSON.parse(localStorage.getItem(DBX_ACCOUNT_KEY) || 'null'); } catch { return null; }
    });
    const [sharePayload, setSharePayload] = useState(null);
    const [shareLoading, setShareLoading] = useState(true);
    const [recipes, setRecipes] = useState(() => loadCache() || []);
    const [search, setSearch] = useState('');
    const [filters, setFilters] = useState(emptyFilters());
    const [openId, setOpenId] = useState(null);
    const [showImport, setShowImport] = useState(false);
    const [showFilter, setShowFilter] = useState(false);
    const [showStats, setShowStats] = useState(false);
    const [showSettings, setShowSettings] = useState(false);
    const [tab, setTab] = useState('recipes'); // 'recipes' | 'shopping'
    const [shopping, setShopping] = useState({ items: [] });
    const [showAddShop, setShowAddShop] = useState(false);
    const [darkMode, setDarkModeState] = useState(() => localStorage.getItem('recipes-dark') === 'true');
    const setDarkMode = useCallback((v) => {
      setDarkModeState(v);
      try { localStorage.setItem('recipes-dark', v ? 'true' : 'false'); } catch {}
    }, []);
    useEffect(() => {
      const root = document.querySelector('.app-root');
      if (root) root.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    }, [darkMode]);
    const [editingId, setEditingId] = useState(null);
    const [longPressed, setLongPressed] = useState(null);
    const [units, setUnitsState] = useState(() => defaultUnits());
    const setUnits = useCallback((u) => { setUnitsState(u); saveUnits(u); }, []);
    const [showToast, toastNode] = useToast();

    const refresh = useCallback(async () => {
      try {
        const { recipes: fresh } = await api.list();
        setRecipes(fresh);
        saveCache(fresh);
      } catch (e) {
        if (e.message !== 'unauthorized') showToast('Could not load recipes: ' + e.message, 'error');
      }
    }, [showToast]);

    const toggleFavorite = async (id) => {
      const r = recipes.find(x => x.id === id);
      if (!r) return;
      const updated = { ...r, favorite: !r.favorite };
      setRecipes(rs => rs.map(x => x.id === id ? updated : x));
      try {
        const saved = await api.save(id, updated);
        setRecipes(rs => {
          const next = rs.map(x => x.id === id ? saved : x);
          saveCache(next);
          return next;
        });
      } catch (e) {
        showToast('Could not update favorite', 'error');
        setRecipes(rs => rs.map(x => x.id === id ? r : x));
      }
    };

    useEffect(() => { if (unlocked) refresh(); }, [unlocked, refresh]);

    // Load shopping list once connected.
    useEffect(() => {
      if (!unlocked) return;
      api.shoppingList()
        .then(list => setShopping({ items: list.items || [] }))
        .catch(e => { if (e.message !== 'unauthorized') console.warn('shopping load:', e.message); });
    }, [unlocked]);

    const toggleShopItem = async (id) => {
      const next = shopping.items.map(it => it.id === id ? { ...it, checked: !it.checked } : it);
      setShopping({ items: next });
      try { await api.shoppingSave(next); }
      catch (e) { showToast('Could not save: ' + e.message, 'error'); }
    };
    const clearCheckedShop = async () => {
      const next = shopping.items.filter(it => !it.checked);
      setShopping({ items: next });
      try { await api.shoppingSave(next); showToast('Cleared'); }
      catch (e) { showToast('Could not save: ' + e.message, 'error'); }
    };
    const clearAllShop = async () => {
      if (!confirm('Clear the entire shopping list?')) return;
      setShopping({ items: [] });
      try { await api.shoppingClear(); showToast('Shopping list cleared'); }
      catch (e) { showToast('Could not clear: ' + e.message, 'error'); }
    };
    const addShopTyped = async (items) => {
      const result = await api.shoppingAdd({ items });
      setShopping({ items: result.items });
      showToast('Added to shopping list');
    };
    const addShopPhoto = async (dataUrl) => {
      const result = await api.shoppingAdd({ image: dataUrl });
      setShopping({ items: result.items });
      showToast('Added from photo');
    };
    const addShopFromRecipes = async (recipeIds) => {
      // Combine the ingredients from all selected recipes into one batch,
      // tagging the source on the resulting items.
      let lastResult = null;
      for (const id of recipeIds) {
        const r = recipes.find(x => x.id === id);
        if (!r) continue;
        const items = (r.ingredients || []).filter(s => !/^—.*—$/.test(s));
        if (items.length === 0) continue;
        lastResult = await api.shoppingAdd({ items, fromRecipe: id });
      }
      if (lastResult) setShopping({ items: lastResult.items });
      showToast(`Added from ${recipeIds.length} ${recipeIds.length === 1 ? 'recipe' : 'recipes'}`);
    };
    const addShopFromOneRecipe = async (recipe) => {
      const items = (recipe.ingredients || []).filter(s => !/^—.*—$/.test(s));
      if (items.length === 0) return showToast('No ingredients to add', 'error');
      const result = await api.shoppingAdd({ items, fromRecipe: recipe.id });
      setShopping({ items: result.items });
      showToast(`Added ${recipe.title} ingredients`);
    };

    // Fetch the connected account info on first load (after OAuth callback
    // we got a snapshot from the callback page, but refresh it on every boot).
    useEffect(() => {
      if (!unlocked) return;
      (async () => {
        try {
          const me = await api.whoami();
          setAccount(me);
          try { localStorage.setItem(DBX_ACCOUNT_KEY, JSON.stringify(me)); } catch {}
        } catch {}
      })();
    }, [unlocked]);

    // On boot, check if the URL has a #share=... payload. If so, decode it
    // and surface the share-receive screen (works whether or not the user
    // is connected — they'll need to connect to actually save).
    useEffect(() => {
      const hash = window.location.hash || '';
      const m = hash.match(/^#share=([\s\S]+)/);
      if (!m) { setShareLoading(false); return; }
      (async () => {
        const payload = await unpackShareHash(m[1]);
        if (payload) setSharePayload(payload);
        setShareLoading(false);
      })();
    }, []);

    const openRecipe = (r) => setOpenId(r.id);
    const closeRecipe = () => setOpenId(null);

    const saveRecipe = async (recipe) => {
      const saved = await api.save(recipe.id, recipe);
      setRecipes(rs => {
        const exists = rs.some(r => r.id === saved.id);
        const next = exists ? rs.map(r => r.id === saved.id ? saved : r) : [saved, ...rs];
        saveCache(next);
        return next;
      });
      return saved;
    };

    const deleteRecipe = async (id) => {
      if (!confirm('Delete this recipe? It will also be removed from Dropbox.')) return;
      try {
        await api.remove(id);
        setRecipes(rs => {
          const next = rs.filter(r => r.id !== id);
          saveCache(next);
          return next;
        });
        showToast('Recipe deleted');
        closeRecipe();
      } catch (e) {
        showToast('Delete failed: ' + e.message, 'error');
      }
    };

    if (shareLoading) return null;

    // If a share payload came in via the URL hash, show the share-receive
    // screen ON TOP of whatever else. If user isn't connected yet, they
    // can still see the recipe preview but need to connect to save.
    if (sharePayload && !unlocked) {
      return (
        <div className="app-root">
          <ShareReceiveScreen
            payload={sharePayload}
            onCancel={() => { window.location.hash = ''; setSharePayload(null); }}
            onSaved={() => {}}
          />
          <div style={{position: 'fixed', bottom: 24, left: 24, right: 24, maxWidth: 600, margin: '0 auto'}}>
            <button className="primary-btn" onClick={() => { window.location.href = '/api/oauth/start'; }} style={{width: '100%'}}>
              Connect Dropbox to save it
            </button>
          </div>
        </div>
      );
    }

    if (!unlocked) return <WelcomeScreen />;

    if (sharePayload) {
      return (
        <div className="app-root">
          <ShareReceiveScreen
            payload={sharePayload}
            onCancel={() => { window.location.hash = ''; setSharePayload(null); }}
            onSaved={(saved) => {
              setRecipes(rs => { const next = [saved, ...rs.filter(x => x.id !== saved.id)]; saveCache(next); return next; });
              window.location.hash = '';
              setSharePayload(null);
              setOpenId(saved.id);
              showToast('Saved to your library');
            }}
          />
        </div>
      );
    }

    const openRecipeObj = recipes.find(r => r.id === openId);
    const editingRecipe = recipes.find(r => r.id === editingId);

    return (
      <div className="app-root" style={{paddingBottom: '60px'}}>
        {tab === 'recipes' && (
          <LibraryScreen
            recipes={recipes}
            search={search} setSearch={setSearch}
            filters={filters} setFilters={setFilters}
            onOpen={openRecipe}
            onOpenImport={() => setShowImport(true)}
            onOpenFilter={() => setShowFilter(true)}
            onOpenSettings={() => setShowSettings(true)}
            onLongPress={(r) => setLongPressed(r)}
            onSwipeAction={(r, action) => {
              if (action === 'favorite') toggleFavorite(r.id);
              else if (action === 'delete') deleteRecipe(r.id);
            }}
          />
        )}
        {tab === 'shopping' && (
          <ShoppingScreen
            items={shopping.items}
            recipes={recipes}
            onToggle={toggleShopItem}
            onClearChecked={clearCheckedShop}
            onClearAll={clearAllShop}
            onOpenAdd={() => setShowAddShop(true)}
            onOpenSettings={() => setShowSettings(true)}
          />
        )}

        {/* Bottom tab bar — switches between Recipes and Shopping. */}
        <div className="tabs-bottom" role="tablist">
          <button
            className={'tab-bottom ' + (tab === 'recipes' ? 'active' : '')}
            onClick={() => setTab('recipes')}
            aria-label="Recipes"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            </svg>
            Recipes
          </button>
          <button
            className={'tab-bottom ' + (tab === 'shopping' ? 'active' : '')}
            onClick={() => setTab('shopping')}
            aria-label="Shopping"
          >
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="9" cy="21" r="1.5" />
              <circle cx="18" cy="21" r="1.5" />
              <path d="M2.5 3h2.6l2.4 12.5a2 2 0 0 0 2 1.5h8.6a2 2 0 0 0 2-1.6l1.4-7.4H6" />
            </svg>
            Shopping
            {shopping.items.filter(it => !it.checked).length > 0 && (
              <span style={{position: 'absolute', top: 4, right: '30%', background: 'var(--accent)', color: 'oklch(0.99 0 0)', fontSize: 9, fontWeight: 700, minWidth: 16, height: 16, padding: '0 4px', borderRadius: 999, display: 'grid', placeItems: 'center'}}>
                {shopping.items.filter(it => !it.checked).length}
              </span>
            )}
          </button>
        </div>


        {showFilter && (
          <FilterSheet
            recipes={recipes}
            filters={filters}
            setFilters={setFilters}
            onClose={() => setShowFilter(false)}
          />
        )}

        {showStats && (
          <StatsSheet
            recipes={recipes}
            onClose={() => setShowStats(false)}
          />
        )}

        {showAddShop && (
          <AddShoppingSheet
            recipes={recipes}
            onClose={() => setShowAddShop(false)}
            onAddTyped={addShopTyped}
            onAddPhoto={addShopPhoto}
            onAddFromRecipes={addShopFromRecipes}
          />
        )}

        {/* When on shopping tab, the FAB opens the add-shopping sheet instead. */}
        {tab === 'shopping' && (
          <button className="fab" onClick={() => setShowAddShop(true)} aria-label="Add to shopping list">
            <Icon.Plus />
          </button>
        )}

        {showSettings && (
          <SettingsSheet
            onClose={() => setShowSettings(false)}
            darkMode={darkMode}
            setDarkMode={setDarkMode}
            onOpenStats={() => setShowStats(true)}
            recipesCount={recipes.length}
            account={account}
            units={units}
            setUnits={setUnits}
            onSignOut={async () => {
              if (!confirm('Disconnect Dropbox? Your recipes stay safe — you can reconnect anytime.')) return;
              try { await api.disconnect(); } catch {}
              localStorage.removeItem(DBX_TOKEN_KEY);
              localStorage.removeItem(DBX_ACCOUNT_KEY);
              localStorage.removeItem(RECIPES_CACHE_KEY);
              window.location.reload();
            }}
          />
        )}

        {longPressed && (
          <QuickActions
            recipe={longPressed}
            onClose={() => setLongPressed(null)}
            onOpen={() => openRecipe(longPressed)}
            onToggleFav={() => toggleFavorite(longPressed.id)}
            onDelete={() => deleteRecipe(longPressed.id)}
          />
        )}

        {openRecipeObj && !editingRecipe && (
          <DetailScreen
            recipe={openRecipeObj}
            onClose={closeRecipe}
            onSave={saveRecipe}
            onDelete={() => deleteRecipe(openRecipeObj.id)}
            onEdit={() => setEditingId(openRecipeObj.id)}
            onAddToShopping={async () => {
              try { await addShopFromOneRecipe(openRecipeObj); }
              catch (e) { showToast('Could not add: ' + e.message, 'error'); }
            }}
            onShare={async () => {
              try {
                let videoUrl = null;
                if (openRecipeObj.videoPath) {
                  try {
                    const r = await api.shareLink(openRecipeObj.id);
                    videoUrl = r.videoUrl || null;
                  } catch (e) {
                    console.warn('shared video link failed', e);
                  }
                }
                // Strip large/personal fields before sharing.
                const sharable = {
                  title:        openRecipeObj.title,
                  description:  openRecipeObj.description,
                  ingredients:  openRecipeObj.ingredients || [],
                  instructions: openRecipeObj.instructions || [],
                  prepTime:     openRecipeObj.prepTime,
                  cookTime:     openRecipeObj.cookTime,
                  totalTime:    openRecipeObj.totalTime,
                  servings:     openRecipeObj.servings,
                  image:        openRecipeObj.image,
                  author:       openRecipeObj.author,
                  sourceUrl:    openRecipeObj.sourceUrl,
                  extractedBy:  openRecipeObj.extractedBy,
                };
                const hash = await packShareHash({ recipe: sharable, videoUrl });
                const shareUrl = window.location.origin + '/#share=' + hash;
                if (navigator.share) {
                  try {
                    await navigator.share({ title: openRecipeObj.title || 'Recipe', url: shareUrl });
                  } catch {}
                } else if (navigator.clipboard) {
                  await navigator.clipboard.writeText(shareUrl);
                  showToast('Share link copied');
                } else {
                  prompt('Copy this share link:', shareUrl);
                }
              } catch (e) {
                showToast('Share failed: ' + e.message, 'error');
              }
            }}
            units={units}
            setUnits={setUnits}
          />
        )}

        {editingRecipe && (
          <EditForm
            recipe={editingRecipe}
            onCancel={() => setEditingId(null)}
            onSave={async (next) => {
              const saved = await saveRecipe(next);
              setEditingId(null);
              showToast('Updated');
              return saved;
            }}
          />
        )}

        {showImport && (
          <ImportSheet
            onClose={() => setShowImport(false)}
            showToast={showToast}
            recipes={recipes}
            onOpenExisting={(existing) => {
              setShowImport(false);
              setOpenId(existing.id);
              showToast('Already in your library');
            }}
            onPreviewSave={async (recipe) => {
              const saved = await saveRecipe(recipe);
              setShowImport(false);
              setOpenId(saved.id);
              showToast('Saved to your library');
              return saved;
            }}
            onImported={(saved) => {
              setRecipes(rs => {
                const next = [saved, ...rs.filter(x => x.id !== saved.id)];
                saveCache(next);
                return next;
              });
              setShowImport(false);
              setOpenId(saved.id);
              showToast('Recipe imported');
            }}
          />
        )}

        {toastNode}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
