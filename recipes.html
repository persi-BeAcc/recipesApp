<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#e8eedc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="My Kitchen" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>My Kitchen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ---------- THEME (Thyme — soft herb green · linen) ---------- */
    :root {
      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-ui:      'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

      --header-bg:    oklch(0.74 0.040 125);
      --header-ink:   oklch(0.22 0.025 125);
      --header-ink-2: oklch(0.36 0.022 125);
      --header-line:  oklch(0.62 0.045 125);

      --accent:       oklch(0.42 0.058 125);
      --accent-soft:  oklch(0.93 0.022 125);
      --accent-ink:   oklch(0.34 0.058 125);

      --bg:        oklch(0.975 0.010 90);
      --bg-elev:   oklch(0.995 0.005 90);
      --bg-sunk:   oklch(0.95  0.012 90);
      --ink:       oklch(0.22 0.014 85);
      --ink-2:     oklch(0.44 0.012 85);
      --ink-3:     oklch(0.62 0.010 85);
      --line:      oklch(0.90 0.010 85);
      --line-strong: oklch(0.83 0.012 85);

      --shadow-card:  0 1px 2px oklch(0.20 0.02 70 / 0.04), 0 1px 3px oklch(0.20 0.02 70 / 0.06);
      --shadow-fab:   0 6px 18px oklch(0 0 0 / 0.18), 0 2px 4px oklch(0 0 0 / 0.10);
      --shadow-sheet: 0 -8px 40px oklch(0.20 0.02 70 / 0.16);

      --radius-card:       14px;
      --radius-card-tight: 12px;
      --radius-pill:       999px;

      --gap: 12px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior: none;
      touch-action: pan-y;
      overflow: hidden;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
    input, textarea { font-family: inherit; }

    /* ---------- APP SHELL ---------- */
    /* App is locked to viewport height; only the inner scroll zone scrolls.
       This keeps the header pinned without relying on `position: sticky` that
       fights with iOS Safari's URL-bar hide-on-scroll. */
    .app-root {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    }
    @media (min-width: 720px) {
      .app-root { box-shadow: 0 0 60px oklch(0 0 0 / 0.04); }
    }

    .screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }

    /* ---------- HEADER ---------- */
    .lib-header {
      padding: 14px 16px;
      background: var(--header-bg);
      z-index: 5;
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--header-line);
    }
    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .brand {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--header-ink);
    }
    .brand .dot { color: var(--accent); }
    .header-count {
      font-size: 12px;
      color: var(--header-ink-2);
      font-weight: 500;
    }
    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      height: 38px;
      transition: border-color 160ms, background 160ms;
      min-width: 0;
    }
    .search-input:focus-within {
      border-color: var(--accent);
      background: var(--bg-elev);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 14%, transparent);
    }
    .search-input svg { color: var(--ink-3); flex-shrink: 0; }
    .search-input input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: var(--ink);
      min-width: 0;
    }
    .search-input input::placeholder { color: var(--ink-3); }
    .search-clear {
      font-size: 16px;
      color: var(--ink-3);
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--line);
      flex-shrink: 0;
    }

    .filter-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      display: grid;
      place-items: center;
      position: relative;
      color: var(--ink);
      flex-shrink: 0;
      transition: transform 160ms, background 160ms, border-color 160ms;
    }
    .filter-btn:active { transform: scale(0.94); }
    .filter-btn:hover  { border-color: var(--ink-3); }
    .filter-btn.has-active {
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-color: var(--accent);
    }
    .filter-count {
      position: absolute;
      top: -4px;
      right: -4px;
      background: var(--header-bg);
      color: var(--header-ink);
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      padding: 0 4px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 2px solid var(--bg-elev);
      line-height: 1;
    }
    .filter-btn.has-active .filter-count {
      background: oklch(0.99 0 0);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Filter sheet sections */
    .filter-section { margin-bottom: 18px; }
    .filter-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      font-weight: 600;
      margin: 0 0 10px;
    }
    .chip-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .sheet-bottom-actions {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      padding: 16px 0 0;
      margin-top: 8px;
    }

    /* Active filter / tag chips below search */
    .active-chips {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .active-chips::-webkit-scrollbar { display: none; }

    /* ---------- CHIPS ---------- */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 11px;
      border-radius: var(--radius-pill);
      background: var(--bg-elev);
      border: 1px solid var(--line-strong);
      font-size: 12.5px;
      font-weight: 500;
      color: var(--ink-2);
      white-space: nowrap;
      transition: background 140ms, color 140ms, transform 100ms, border-color 140ms;
      flex-shrink: 0;
      animation: chip-in 220ms cubic-bezier(.2,.7,.3,1) both;
      letter-spacing: -0.005em;
      cursor: pointer;
    }
    .chip:active { transform: scale(0.96); }
    .chip.on,
    .chip-active {
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-color: var(--accent);
    }
    .chip-x {
      font-size: 13px;
      line-height: 1;
      margin-left: 2px;
      opacity: 0.6;
    }
    .chip-clear {
      background: transparent;
      border: 1px dashed var(--line-strong);
      color: var(--ink-3);
    }
    @keyframes chip-in {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- GRID ---------- */
    .lib-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 14px 100px;
      position: relative;
      -webkit-overflow-scrolling: touch;
    }
    .grid {
      display: grid;
      gap: var(--gap);
      grid-template-columns: 1fr 1fr;
    }
    @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    .grid-item {
      animation: card-in 320ms cubic-bezier(.2,.7,.3,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- RECIPE CARD ---------- */
    .card-wrap {
      position: relative;
      border-radius: var(--radius-card);
      overflow: hidden;
    }
    .swipe-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 12.5px;
      font-weight: 600;
      color: oklch(0.99 0 0);
      border-radius: var(--radius-card);
      z-index: 0;
      gap: 8px;
    }
    .swipe-bg-fav {
      background: oklch(0.62 0.13 18);
      justify-content: flex-start;
    }
    .swipe-bg-del {
      background: oklch(0.50 0.16 25);
      justify-content: flex-end;
    }
    .flash-favorite { animation: flash-fav 600ms ease; }
    .flash-delete { animation: flash-del 600ms ease forwards; }
    @keyframes flash-fav {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(1.04); }
    }
    @keyframes flash-del {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.85); opacity: 0; }
    }

    .recipe-card {
      position: relative;
      background: var(--bg-elev);
      border-radius: var(--radius-card);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
      transition: transform 160ms, box-shadow 160ms;
      display: flex;
      flex-direction: column;
    }
    .recipe-card:active { transform: scale(0.985); }
    .recipe-card-media {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg-sunk);
      overflow: hidden;
    }
    .recipe-card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .recipe-card-body {
      padding: 10px 12px 12px;
    }
    .recipe-card-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.25;
      margin: 0 0 4px;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-wrap: pretty;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.5em;
    }
    .recipe-card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    .meta-sep {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--ink-3);
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* Photographic placeholder (no image) */
    .recipe-img-placeholder {
      position: relative;
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(45deg, oklch(0.90 0 0) 0 3px, oklch(0.82 0 0 / 0.55) 3px 6px),
        linear-gradient(to bottom, transparent, oklch(0.65 0 0 / 0.32));
    }
    .recipe-img-letter {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 600;
      color: oklch(0.45 0 0);
      letter-spacing: -0.02em;
    }
    .recipe-img-caption {
      position: absolute;
      bottom: 6px;
      left: 8px;
      font-family: var(--font-mono);
      font-size: 9px;
      color: oklch(0.20 0.02 70 / 0.45);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .fav-pill {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: oklch(0.99 0 0 / 0.95);
      color: var(--accent);
      display: grid;
      place-items: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .source-corner {
      position: absolute;
      top: 8px;
      left: 8px;
      background: oklch(0.99 0 0 / 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--ink-2);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* ---------- BADGES ---------- */
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-2);
    }
    .source-badge.source-lg {
      font-size: 12.5px;
      color: oklch(0.99 0 0);
    }
    .source-ig { color: oklch(0.55 0.18 5); }
    .source-tt { color: oklch(0.20 0.020 200); }
    .source-web { color: oklch(0.50 0.10 240); }
    .source-host { color: var(--ink-2); font-weight: 500; }
    .source-lg .source-host { color: oklch(0.99 0 0); }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11.5px;
      color: var(--ink-2);
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- FAB ---------- */
    .fab {
      position: fixed;
      right: max(18px, calc((100vw - 720px) / 2 + 18px));
      bottom: calc(24px + env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: oklch(0.99 0 0);
      display: grid;
      place-items: center;
      box-shadow: 0 4px 14px color-mix(in oklch, var(--accent) 32%, transparent), 0 2px 4px oklch(0 0 0 / 0.10);
      z-index: 20;
      transition: transform 200ms cubic-bezier(.2,.9,.3,1.4);
    }
    .fab:active { transform: scale(0.92); }

    /* ---------- EMPTY ---------- */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--ink-3);
    }
    .empty-emoji { font-size: 36px; margin-bottom: 12px; opacity: 0.6; }

    /* Quick actions sheet */
    .quick-overlay { align-items: center; }
    .quick-sheet {
      width: calc(100% - 36px);
      max-width: 380px;
      background: var(--bg-elev);
      border-radius: 14px;
      overflow: hidden;
      animation: quick-in 240ms cubic-bezier(.2,.7,.3,1) both;
      box-shadow: 0 16px 40px oklch(0 0 0 / 0.20);
      border: 1px solid var(--line);
    }
    @keyframes quick-in {
      from { transform: scale(0.95); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .quick-recipe {
      display: flex;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }
    .quick-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-sunk);
    }
    .quick-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .quick-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 2px;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .quick-meta {
      font-size: 11.5px;
      color: var(--ink-3);
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .quick-actions {
      display: flex;
      flex-direction: column;
    }
    .quick-action {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--ink);
      text-align: left;
      border-bottom: 1px solid var(--line);
      transition: background 160ms;
    }
    .quick-action:last-child { border-bottom: none; }
    .quick-action:active { background: var(--bg-sunk); }
    .quick-action.danger { color: oklch(0.50 0.16 25); }
    .qa-emoji { font-size: 15px; width: 22px; text-align: center; opacity: 0.85; }

    /* Pull-to-refresh */
    .pull-indicator {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      margin-top: -40px;
      color: var(--ink-2);
    }
    .pull-spinner.spin { animation: spin 800ms linear infinite; }
    .empty h3 {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      color: var(--ink);
      margin: 0 0 4px;
      letter-spacing: -0.01em;
    }
    .empty p { margin: 0 0 12px; font-size: 13px; }
    .btn-text { color: var(--accent); font-weight: 600; font-size: 13px; padding: 8px 12px; }

    /* ---------- DETAIL ---------- */
    /* Single scroll container — hero is in document flow so it scrolls
       with the content, revealing more text as the user scrolls down.
       Close/heart buttons + action bar are sticky to viewport. */
    .detail-screen {
      position: fixed;
      inset: 0;
      max-width: 720px;
      margin: 0 auto;
      background: var(--bg);
      z-index: 30;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      animation: detail-in 280ms cubic-bezier(.2,.7,.3,1);
    }
    .detail-screen::-webkit-scrollbar { display: none; }
    @keyframes detail-in {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .detail-hero {
      position: relative;
      width: 100%;
      overflow: hidden;
      aspect-ratio: 1.1;
      max-height: 60vh;
      background: var(--bg-sunk);
    }
    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .detail-hero-fade {
      position: absolute;
      inset: auto 0 0 0;
      height: 60%;
      background: linear-gradient(to bottom, transparent, oklch(0.16 0.02 70 / 0.62));
      pointer-events: none;
    }
    .detail-close, .detail-fav, .detail-source-btn {
      position: fixed;
      top: calc(16px + env(safe-area-inset-top));
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: oklch(0.99 0 0 / 0.92);
      border: 1px solid color-mix(in oklch, var(--accent) 22%, transparent);
      color: var(--accent);
      display: grid;
      place-items: center;
      backdrop-filter: blur(8px) saturate(160%);
      -webkit-backdrop-filter: blur(8px) saturate(160%);
      transition: transform 160ms, background 160ms, color 160ms, border-color 160ms;
      z-index: 35;
    }
    /* Use CSS calc to position relative to viewport center within max-width frame */
    .detail-close      { left:  max(16px, calc((100vw - 720px) / 2 + 16px)); }
    .detail-source-btn { left:  max(64px, calc((100vw - 720px) / 2 + 64px)); }
    .detail-fav        { right: max(16px, calc((100vw - 720px) / 2 + 16px)); }
    .detail-close:active, .detail-fav:active, .detail-source-btn:active { transform: scale(0.9); }
    .detail-fav.on {
      background: var(--accent);
      border-color: var(--accent);
      color: oklch(0.99 0 0);
    }

    .detail-source-row {
      position: absolute;
      bottom: 18px;
      left: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 2;
      pointer-events: none;
    }
    .detail-author {
      color: oklch(0.99 0 0);
      font-size: 12.5px;
      font-weight: 500;
      text-shadow: 0 1px 6px oklch(0 0 0 / 0.5);
    }

    .detail-body {
      padding: 22px 22px 0;
      background: var(--bg);
      border-radius: 18px 18px 0 0;
      margin-top: -18px;
      position: relative;
      z-index: 2;
    }
    .detail-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: -0.02em;
      margin: 4px 0 12px;
      text-wrap: pretty;
    }
    .detail-description {
      color: var(--ink-2);
      font-size: 14px;
      line-height: 1.5;
      margin: 0 0 16px;
    }
    .detail-meta-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
    }
    .meta-pill-icon { font-size: 12px; }

    .tag-row {

    .tabs {

    .tab {

      font-weight: 600;

      align-items: center;
      gap: 6px;
      transition: color 160ms;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      letter-spacing: -0.005em;
    }
    .tab.on { color: var(--ink); border-bottom-color: var(--ink); }
    .tab-count {
      font-size: 10.5px;
      background: var(--bg-sunk);
      padding: 1px 6px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      color: var(--ink-3);
    }
    .tab.on .tab-count { background: var(--accent-soft); color: var(--accent-ink); }

    .ingredient-list {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
    }
    .ing-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);

    }
    .ing-row.checked { opacity: 0.4; }
    .ing-row.checked .ing-text { text-decoration: line-through; }
    .ing-check {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 1.5px solid var(--line-strong);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      margin-top: 1px;
      color: oklch(0.99 0 0);

    }
    .ing-row.checked .ing-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .ing-text { font-size: 14px; line-height: 1.5; color: var(--ink); }

    .steps-list {
      list-style: none;
      padding: 0;
      margin: 0 0 24px;
    }
    .step-row {
      display: flex;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 10px;
      cursor: pointer;
      margin-bottom: 6px;

      transition: background 200ms;
      border: 1px solid var(--line);
    }
    .step-row.active {
      background: var(--accent-soft);
      border-color: transparent;
    }
    .step-row.section-heading {
      background: transparent;
      border: none;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 10px 0 4px;
      cursor: default;
    }
    .step-row.section-heading .step-num { display: none; }
    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--bg-elev);
      color: var(--ink-2);
      font-weight: 600;
      font-size: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      border: 1px solid var(--line);
    }
    .step-row.active .step-num {
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-color: var(--accent);
    }
    .step-text { font-size: 14px; line-height: 1.55; color: var(--ink); }

    .notes-block {
      background: var(--accent-soft);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13.5px;
      line-height: 1.45;
      color: var(--accent-ink);
      margin-bottom: 18px;
      white-space: pre-wrap;
    }
    .notes-edit {
      width: 100%;
      min-height: 90px;
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      color: var(--ink);
      resize: vertical;
      outline: none;
      font-family: inherit;
    }
    .notes-edit:focus { border-color: var(--accent); }

    .stars-row {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }
    .star {
      cursor: pointer;
      width: 28px; height: 28px;
      color: var(--line-strong);
      transition: color 120ms, transform 80ms;
    }
    .star:hover { transform: scale(1.1); }
    .star.filled { color: oklch(0.78 0.14 80); }

    .detail-actions-bar {
      position: sticky;
      bottom: 0;
      padding: 12px 18px calc(18px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      display: flex;
      gap: 10px;
      z-index: 3;
    }
    .cook-btn {
      flex: 1;
      height: 46px;
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-radius: 10px;
      font-size: 14.5px;
      font-weight: 600;
      letter-spacing: -0.01em;
      transition: transform 160ms;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .cook-btn:active { transform: scale(0.98); }
    .detail-actions-bar .ghost-btn {
      flex: 0 0 auto;
      padding: 0 16px;
    }
    .detail-actions-bar .danger-btn {
      flex: 0 0 auto;
      padding: 0 16px;
      color: oklch(0.50 0.16 25);
      background: var(--bg-elev);
      border: 1px solid var(--line);
      border-radius: 10px;
      height: 46px;
      font-weight: 600;
      font-size: 14px;
    }

    /* Source embed (Instagram / TikTok) */
    .social-embed {
      margin: 0 0 18px;
    }

    /* ---------- SHEETS ---------- */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      max-width: 720px;
      margin: 0 auto;
      background: oklch(0.16 0.02 70 / 0.42);
      z-index: 40;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: overlay-in 220ms ease both;
      backdrop-filter: blur(2px);
    }
    @keyframes overlay-in {
      from { background: oklch(0.16 0.02 70 / 0); }

    }

    .sheet {
      width: 100%;
      background: var(--bg);
      border-radius: 18px 18px 0 0;
      padding: 8px 22px calc(24px + env(safe-area-inset-bottom));

      max-height: 88vh;
      overflow-y: auto;
      animation: sheet-in 280ms cubic-bezier(.2,.7,.3,1) both;

    .sheet::-webkit-scrollbar { display: none; }
    @keyframes sheet-in {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .sheet-grab {
      width: 32px;
      height: 4px;
      background: var(--line-strong);
      border-radius: 4px;
      margin: 0 auto 16px;
    }
    .sheet-title {
      font-family: var(--font-display);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 4px;
    }
    .sheet-sub {
      margin: 0 0 18px;
      color: var(--ink-3);
      font-size: 13.5px;
      line-height: 1.4;
    }

    /* ---------- IMPORT SHEET ---------- */
    .url-input {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 14px;
      height: 46px;
      margin-bottom: 12px;
      transition: border-color 200ms;
    }
    .url-input:focus-within { border-color: var(--accent); }
    .url-input svg { color: var(--ink-3); flex-shrink: 0; }
    .url-input input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 13.5px;
      font-family: var(--font-mono);
      color: var(--ink);
      min-width: 0;
    }

    .source-detect-row {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .sample-block { margin-bottom: 18px; }
    .sample-label {
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      font-weight: 600;
      margin: 0 0 8px;
    }
    .sample-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .sample-chip {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      background: var(--bg-sunk);
      border: 1px solid var(--line);
      color: var(--ink-2);
    }
    .sample-chip:hover { border-color: var(--ink-3); }
    .detect-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: var(--radius-pill);
      background: var(--bg-sunk);
      border: 1px dashed var(--line-strong);
      font-size: 11.5px;
      color: var(--ink-3);
      font-weight: 500;
      transition: all 200ms;
    }
    .detect-pill.on {
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-color: var(--accent);
      border-style: solid;
    }

    .analysis-row {
      margin-bottom: 18px;
    }
    .analysis-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-3);
      font-weight: 600;
      margin: 0 0 10px;
    }
    .analysis-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .primary-btn {
      width: 100%;
      height: 46px;
      background: var(--accent);
      color: oklch(0.99 0 0);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.005em;
      transition: transform 160ms, opacity 160ms;
    }
    .primary-btn:active { transform: scale(0.98); }
    .primary-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .ghost-btn {
      height: 46px;
      background: var(--bg-elev);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      padding: 0 22px;
    }

    .detecting {
      text-align: center;
      padding: 24px 0;
    }
    .detect-orbit {
      position: relative;
      width: 84px;
      height: 84px;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }
    .orbit-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      border-right-color: transparent;
      border-top-color: transparent;
      animation: spin 1.4s linear infinite;
    }
    .orbit-ring.r2 {
      inset: 12px;
      border-color: var(--line-strong);
      border-bottom-color: transparent;
      animation-duration: 2s;
      animation-direction: reverse;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .orbit-emoji { font-size: 26px; opacity: 0.7; }
    .detect-steps {
      list-style: none;
      padding: 0;
      margin: 0;
      text-align: left;
      display: inline-block;
    }
    .d-step {
      font-size: 12.5px;
      padding: 4px 0;
      color: var(--ink-3);
    }
    .d-step.done { color: var(--ink); }
    .d-step.done::before { content: '✓ '; color: var(--accent); }

    .preview-card {
      display: flex;
      gap: 14px;
      background: var(--bg-sunk);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
    }
    .preview-media {
      width: 84px;
      height: 84px;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-elev);
    }
    .preview-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-body { flex: 1; min-width: 0; }
    .preview-body h3 {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }
    .preview-stats {
      display: flex;
      gap: 12px;
      font-size: 11.5px;
      color: var(--ink-3);
    }
    .preview-stats b { color: var(--ink); font-weight: 600; }

    .sheet-actions {
      display: flex;
      gap: 10px;
    }

    /* ---------- PASSCODE GATE ---------- */
    .gate {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg);
      z-index: 100;
    }
    .gate-card {
      background: var(--bg-elev);
      border-radius: 18px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--line);
      text-align: center;
      box-shadow: var(--shadow-card);
    }
    .gate-card .brand {
      font-size: 28px;
      margin-bottom: 6px;
      color: var(--ink);
    }
    .gate-card p { color: var(--ink-3); margin: 0 0 20px; font-size: 14px; }
    .gate-card input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 16px;
      text-align: center;
      letter-spacing: 0.1em;
      outline: none;
      background: var(--bg-sunk);
      color: var(--ink);
      margin-bottom: 12px;
    }
    .gate-card input:focus { border-color: var(--accent); }

    /* ---------- TOAST ---------- */
    .toast {
      position: fixed;
      bottom: calc(100px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: var(--ink);
      color: var(--bg);
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 24px oklch(0 0 0 / 0.2);
      z-index: 100;
      max-width: 90vw;
      animation: toast-in 220ms ease both;
    }
    @keyframes toast-in {
      from { opacity: 0; transform: translate(-50%, 8px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }
    .toast.error { background: oklch(0.50 0.16 25); color: oklch(0.99 0 0); }

    /* ---------- ERROR BOX ---------- */
    .error-box {
      background: oklch(0.96 0.04 25);
      border: 1px solid oklch(0.84 0.10 25);
      color: oklch(0.40 0.16 25);
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    /* ---------- VERSION CHIP ---------- */
    .version {
      position: fixed;
      bottom: max(8px, calc(env(safe-area-inset-bottom) + 2px));
      left: 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-3);
      letter-spacing: 0.04em;
      opacity: 0.55;
      pointer-events: none;
      z-index: 41;
    }

    /* ---------- SPINNER ---------- */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid color-mix(in oklch, var(--accent) 30%, transparent);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    .spinner.on-accent {
      border-color: oklch(1 0 0 / 0.4);
      border-top-color: oklch(0.99 0 0);
    }

    /* ---------- FIELD STYLES (edit form inside detail) ---------- */
    .field { margin-bottom: 14px; }
    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .field-input, .field-textarea {
      width: 100%;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--bg-elev);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
    }
    .field-textarea { min-height: 88px; resize: vertical; }
    .field-input:focus, .field-textarea:focus { border-color: var(--accent); }

    .row-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div class="version" id="version">v2026.05.02.5</div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(e => console.warn('sw register failed', e));
      });
    }
  </script>

  <script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useMemo, useCallback, useRef } = React;

  const APP_VERSION       = 'v2026.05.02.5';
  const PASSCODE_KEY      = 'recipes-passcode';
  const RECIPES_CACHE_KEY = 'recipes-cache-v1';
  const CHECKED_KEY       = 'recipes-checked-v1';

  // ---------- API client ----------
  function apiRequest(path, opts = {}) {
    const passcode = localStorage.getItem(PASSCODE_KEY) || '';
    const headers = Object.assign({}, opts.headers || {}, {
      'x-app-passcode': passcode,
    });
    if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
      opts = { ...opts, body: JSON.stringify(opts.body) };
    }
    return fetch(path, { ...opts, headers }).then(async r => {
      if (r.status === 401) {
        localStorage.removeItem(PASSCODE_KEY);
        window.location.reload();
        throw new Error('unauthorized');
      }
      const text = await r.text();
      let data;
      try { data = text ? JSON.parse(text) : null; } catch { data = { error: text }; }
      if (!r.ok) throw new Error((data && data.error) || `HTTP ${r.status}`);
      return data;
    });
  }
  const api = {
    list:           ()              => apiRequest('/api/recipes'),
    get:            (id)            => apiRequest(`/api/recipes?id=${encodeURIComponent(id)}`),
    save:           (id, r)         => apiRequest(`/api/recipes?id=${encodeURIComponent(id)}`, { method: 'PUT', body: r }),
    remove:         (id)            => apiRequest(`/api/recipes?id=${encodeURIComponent(id)}`, { method: 'DELETE' }),
    extract:        (url)           => apiRequest('/api/recipes?extract=1', { method: 'POST', body: { url } }),
    extractVideo:   (url, analysis) => apiRequest('/api/extract-video', { method: 'POST', body: { url, analysis } }),
    jobStatus:      (jobId)         => apiRequest(`/api/job-status?id=${encodeURIComponent(jobId)}`),
  };

  // ---------- URL classification ----------
  function detectPlatform(url) {
    try {
      const host = new URL(url).hostname.replace(/^www\./, '').toLowerCase();
      if (host === 'instagram.com' || host === 'instagr.am' || host.endsWith('.instagram.com')) return 'instagram';
      if (host === 'tiktok.com' || host === 'vm.tiktok.com' || host.endsWith('.tiktok.com')) return 'tiktok';
    } catch {}
    return 'web';
  }
  function isVideoUrl(url) {
    const p = detectPlatform(url);
    return p === 'instagram' || p === 'tiktok';
  }
  function urlHost(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return ''; }
  }

  // ---------- Helpers ----------
  function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
  function loadCache()                    { try { return JSON.parse(localStorage.getItem(RECIPES_CACHE_KEY) || 'null'); } catch { return null; } }
  function saveCache(recipes)             { try { localStorage.setItem(RECIPES_CACHE_KEY, JSON.stringify(recipes)); } catch {} }
  function loadChecked(id)                { try { return JSON.parse(localStorage.getItem(CHECKED_KEY + ':' + id) || '[]'); } catch { return []; } }
  function saveChecked(id, arr)           { try { localStorage.setItem(CHECKED_KEY + ':' + id, JSON.stringify(arr)); } catch {} }
  function firstLetter(s) {
    if (!s) return '🥘';
    const c = s.trim().charAt(0).toUpperCase();
    return /[A-Z]/.test(c) ? c : '🥘';
  }
  function timeLabel(r) {
    return r.totalTime || r.cookTime || r.prepTime || '';
  }

  // ---------- Toast ----------
  let toastTimeout;
  function useToast() {
    const [toast, setToast] = useState(null);
    const show = useCallback((msg, type = 'info') => {
      setToast({ msg, type });
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => setToast(null), 3500);
    }, []);
    const node = toast ? <div className={'toast ' + (toast.type === 'error' ? 'error' : '')}>{toast.msg}</div> : null;
    return [show, node];
  }

  // ---------- Icons ----------
  const Icon = {
    Search:  () => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>,
    Plus:    (props) => <svg viewBox="0 0 24 24" width={props.size || 22} height={props.size || 22} fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>,
    Back:    () => <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><path d="M15 6l-6 6 6 6"/></svg>,
    Heart:   ({filled}) => <svg viewBox="0 0 24 24" width="20" height="20" fill={filled?'currentColor':'none'} stroke="currentColor" strokeWidth="2.2"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0112 6a5.5 5.5 0 019.5 6c-2.5 4.5-9.5 9-9.5 9z"/></svg>,
    Star:    ({filled}) => <svg className={'star ' + (filled?'filled':'')} viewBox="0 0 24 24" fill={filled?'currentColor':'none'} stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"><path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>,
    Clock:   () => <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2"/><path d="M9 3h6"/></svg>,
    Link:    () => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M10 14a4 4 0 005.66 0l3-3a4 4 0 00-5.66-5.66L11 7"/><path d="M14 10a4 4 0 00-5.66 0l-3 3a4 4 0 005.66 5.66L13 17"/></svg>,
    Edit:    () => <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4Z"/></svg>,
    Trash:   () => <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
    InstagramIcon: () => <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>,
    Globe:   () => <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>,
    TikTokIcon: () => <svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M19.6 6.3a4.4 4.4 0 0 1-3-1.4V14.8a5.6 5.6 0 1 1-5.6-5.6h.4v3a2.6 2.6 0 1 0 2.2 2.6V2h2.9a4.4 4.4 0 0 0 3.1 4.3z"/></svg>,
  };

  // ---------- Recipe placeholder image ----------
  function RecipeMedia({ recipe }) {
    const [failed, setFailed] = useState(false);
    if (recipe.image && !failed) {
      return <img src={recipe.image} alt="" loading="lazy" onError={() => setFailed(true)} />;
    }
    return (
      <div className="recipe-img-placeholder">
        <span className="recipe-img-letter">{firstLetter(recipe.title)}</span>
        <span className="recipe-img-caption">{recipe.title ? recipe.title.split(' ').slice(0,3).join(' ') : 'recipe'}</span>
      </div>
    );
  }

  function SourceBadge({ url, size = 'sm' }) {
    const platform = detectPlatform(url);
    const host = urlHost(url) || (platform === 'instagram' ? 'instagram' : platform === 'tiktok' ? 'tiktok' : '');
    const Icon_ = platform === 'instagram' ? Icon.InstagramIcon : platform === 'tiktok' ? Icon.TikTokIcon : Icon.Globe;
    const klass = platform === 'instagram' ? 'source-ig' : platform === 'tiktok' ? 'source-tt' : 'source-web';
    return (
      <span className={`source-badge source-${size} ${klass}`}>
        <Icon_ />
        <span className="source-host">{host.replace(/\.com$/, '')}</span>
      </span>
    );
  }

  // ---------- Passcode gate ----------
  function PasscodeGate({ onUnlock }) {
    const [val, setVal] = useState('');
    const [busy, setBusy] = useState(false);
    const [err, setErr] = useState(null);
    const submit = async (e) => {
      e.preventDefault();
      if (!val.trim()) return;
      setBusy(true); setErr(null);
      localStorage.setItem(PASSCODE_KEY, val.trim());
      try { await api.list(); onUnlock(); }
      catch { localStorage.removeItem(PASSCODE_KEY); setErr('Wrong passcode.'); }
      finally { setBusy(false); }
    };
    return (
      <div className="gate">
        <form className="gate-card" onSubmit={submit}>
          <div className="brand">My Kitchen<span className="dot">.</span></div>
          <p>Enter the household passcode</p>
          <input type="password" value={val} onChange={e => setVal(e.target.value)} autoFocus autoComplete="off" />
          {err && <div className="error-box" style={{textAlign:'left'}}>{err}</div>}
          <button className="primary-btn" disabled={busy}>
            {busy ? <><span className="spinner on-accent"/> Checking…</> : 'Unlock'}
          </button>
        </form>
      </div>
    );
  }

  // ---------- Time bucket helpers (filter sheet uses these) ----------
  const TIME_BUCKETS = [
    { id: 'fast',    label: 'Under 30 min', test: m => m > 0 && m <= 30 },
    { id: 'medium',  label: '30–60 min',    test: m => m > 30 && m <= 60 },
    { id: 'long',    label: 'Over 1 hr',    test: m => m > 60 },
  ];
  function recipeMinutes(r) {
    // Heuristic: parse "1h 30m" / "45m" / "2h" / numeric strings
    const candidate = r.totalTime || r.cookTime || r.prepTime || '';
    if (!candidate) return 0;
    const s = String(candidate).toLowerCase();
    const hMatch = s.match(/(\d+)\s*h/);
    const mMatch = s.match(/(\d+)\s*m(?!o)/); // m but not "month/min" word
    const numMatch = !hMatch && !mMatch ? s.match(/^(\d+)/) : null;
    return (hMatch ? parseInt(hMatch[1]) * 60 : 0)
         + (mMatch ? parseInt(mMatch[1]) : 0)
         + (numMatch ? parseInt(numMatch[1]) : 0);
  }
  const SOURCE_OPTIONS = [
    { id: 'web',       label: 'Recipe sites' },
    { id: 'instagram', label: 'Instagram' },
    { id: 'tiktok',    label: 'TikTok' },
  ];

  function emptyFilters() {
    return { tags: [], time: [], source: [], favorite: false };
  }
  function filterCount(f) {
    return f.tags.length + f.time.length + f.source.length + (f.favorite ? 1 : 0);
  }

  // ---------- Library ----------
  function LibraryScreen({ recipes, search, setSearch, filters, setFilters, onOpen, onOpenImport, onOpenFilter, onLongPress, onSwipeAction, onRefresh, refreshing }) {
    const [pullY, setPullY] = useState(0);
    const startY = useRef(null);
    const scrollerRef = useRef(null);

    const onPointerDownPull = (e) => {
      if (scrollerRef.current && scrollerRef.current.scrollTop <= 0) {
        startY.current = e.clientY;
      }
    };
    const onPointerMovePull = (e) => {
      if (startY.current == null) return;
      const dy = e.clientY - startY.current;
      if (dy > 0) setPullY(Math.min(dy * 0.5, 90));
    };
    const onPointerUpPull = () => {
      if (pullY > 60) onRefresh?.();
      setPullY(0);
      startY.current = null;
    };

    const allTags = useMemo(() => {
      const set = new Set();
      recipes.forEach(r => (r.tags || []).forEach(t => set.add(t)));
      return Array.from(set).sort();
    }, [recipes]);

    const visible = useMemo(() => {
      const q = (search || '').trim().toLowerCase();
      return recipes.filter(r => {
        if (filters.tags.length && !filters.tags.some(t => (r.tags || []).includes(t))) return false;
        if (filters.source.length) {
          const p = r.sourceUrl ? detectPlatform(r.sourceUrl) : 'web';
          if (!filters.source.includes(p)) return false;
        }
        if (filters.time.length) {
          const mins = recipeMinutes(r);
          const buckets = TIME_BUCKETS.filter(b => filters.time.includes(b.id));
          if (!buckets.some(b => b.test(mins))) return false;
        }
        if (filters.favorite && !r.favorite) return false;
        if (!q) return true;
        const hay = [
          r.title, r.description, r.author,
          (r.ingredients || []).join(' '),
          (r.tags || []).join(' '),
          r.notes || '',
        ].join(' ').toLowerCase();
        return hay.includes(q);
      }).sort((a, b) => (b.updatedAt || '').localeCompare(a.updatedAt || ''));
    }, [recipes, search, filters]);

    const fCount = filterCount(filters);

    const removeFilter = (group, val) => {
      setFilters(prev => {
        if (group === 'favorite') return { ...prev, favorite: false };
        return { ...prev, [group]: prev[group].filter(v => v !== val) };
      });
    };

    // Active chips below the search bar (only what's APPLIED, not all tags)
    const activeChips = [];
    filters.tags.forEach(t   => activeChips.push({ key: 'tag-' + t,    group: 'tags',   val: t, label: t }));
    filters.source.forEach(s => {
      const opt = SOURCE_OPTIONS.find(o => o.id === s);
      activeChips.push({ key: 'src-' + s, group: 'source', val: s, label: opt ? opt.label : s });
    });
    filters.time.forEach(t => {
      const opt = TIME_BUCKETS.find(o => o.id === t);
      activeChips.push({ key: 'time-' + t, group: 'time', val: t, label: opt ? opt.label : t });
    });
    if (filters.favorite) activeChips.push({ key: 'fav', group: 'favorite', val: true, label: '♥ Favorites' });

    return (
      <div className="screen library-screen">
        <div className="lib-header">
          <div className="brand-row">
            <div className="brand">My Kitchen<span className="dot">.</span></div>
            <div className="header-count">
              {recipes.length} {recipes.length === 1 ? 'recipe' : 'recipes'}
            </div>
          </div>
          <div className="search-row">
            <label className="search-input">
              <Icon.Search />
              <input
                type="text"
                placeholder="Search title, ingredient, tag…"
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
              {search && <button type="button" className="search-clear" onClick={() => setSearch('')} aria-label="Clear">×</button>}
            </label>
            <button
              className={'filter-btn ' + (fCount > 0 ? 'has-active' : '')}
              onClick={onOpenFilter}
              aria-label="Filters"
            >
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                <path d="M4 6h16M7 12h10M10 18h4" />
              </svg>
              {fCount > 0 && <span className="filter-count">{fCount}</span>}
            </button>
          </div>
          {activeChips.length > 0 && (
            <div className="active-chips">
              {activeChips.map(c => (
                <button key={c.key} className="chip chip-active" onClick={() => removeFilter(c.group, c.val)}>
                  {c.label}
                  <span className="chip-x">×</span>
                </button>
              ))}
              <button className="chip chip-clear" onClick={() => setFilters(emptyFilters())}>Clear all</button>
            </div>
          )}
        </div>

        <div
          className="lib-scroll"
          ref={scrollerRef}
          onPointerDown={onPointerDownPull}
          onPointerMove={onPointerMovePull}
          onPointerUp={onPointerUpPull}
          onPointerCancel={onPointerUpPull}
          style={{ paddingTop: `${pullY}px`, transition: pullY === 0 ? 'padding-top 200ms' : 'none' }}
        >
          {(pullY > 0 || refreshing) && (
            <div className="pull-indicator" style={{ opacity: refreshing ? 1 : (pullY / 60 || 0.4) }}>
              <div className={'pull-spinner ' + (refreshing ? 'spin' : '')} style={{ transform: `rotate(${pullY * 4}deg)` }}>
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
                  <path d="M21 12a9 9 0 11-3-6.7" />
                  <path d="M21 4v5h-5" />
                </svg>
              </div>
            </div>
          )}

          {recipes.length === 0 ? (
            <div className="empty">
              <div className="empty-emoji">🍳</div>
              <h3>Start your library</h3>
              <p>Tap + to import from a recipe site, Instagram reel, or TikTok.</p>
            </div>
          ) : visible.length === 0 ? (
            <div className="empty">
              <div className="empty-emoji">🔍</div>
              <h3>No matches</h3>
              <p>Try a different search or clear filters.</p>
              <button className="btn-text" onClick={() => { setSearch(''); setFilters(emptyFilters()); }}>Clear filters</button>
            </div>
          ) : (
            <div className="grid">
              {visible.map((r, i) => (
                <div className="grid-item" key={r.id} style={{ animationDelay: `${Math.min(i, 12) * 28}ms` }}>
                  <RecipeCard
                    recipe={r}
                    onOpen={onOpen}
                    onLongPress={onLongPress}
                    onSwipeAction={onSwipeAction}
                  />
                </div>
              ))}
            </div>
          )}
        </div>

        <button className="fab" onClick={onOpenImport} aria-label="Add recipe">
          <Icon.Plus />
        </button>
      </div>
    );
  }

  function RecipeCard({ recipe, onOpen, onLongPress, onSwipeAction }) {
    const [pressed, setPressed] = useState(false);
    const [swipeX, setSwipeX] = useState(0);
    const [actionFlash, setActionFlash] = useState(null);
    const startRef = useRef(null);
    const longPressTimer = useRef(null);
    const longPressFired = useRef(false);

    const platform = recipe.sourceUrl ? detectPlatform(recipe.sourceUrl) : 'web';
    const sourceLabel = platform === 'instagram' ? 'IG' : platform === 'tiktok' ? 'TikTok' : (urlHost(recipe.sourceUrl).replace(/\.com$/,'') || '');

    const onPointerDown = (e) => {
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
      startRef.current = { x: e.clientX, y: e.clientY, t: Date.now() };
      longPressFired.current = false;
      setPressed(true);
      longPressTimer.current = setTimeout(() => {
        longPressFired.current = true;
        if (navigator.vibrate) navigator.vibrate(10);
        onLongPress?.(recipe);
      }, 480);
    };
    const onPointerMove = (e) => {
      if (!startRef.current) return;
      const dx = e.clientX - startRef.current.x;
      const dy = e.clientY - startRef.current.y;
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) clearTimeout(longPressTimer.current);
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
        setSwipeX(Math.max(-140, Math.min(140, dx)));
      }
    };
    const onPointerUp = (e) => {
      clearTimeout(longPressTimer.current);
      setPressed(false);
      if (!startRef.current) return;
      const dx = e.clientX - startRef.current.x;
      const dy = e.clientY - startRef.current.y;
      const dt = Date.now() - startRef.current.t;
      startRef.current = null;
      if (Math.abs(swipeX) > 70) {
        const action = swipeX > 0 ? 'favorite' : 'delete';
        setActionFlash(action);
        onSwipeAction?.(recipe, action);
        setTimeout(() => setActionFlash(null), 600);
        setSwipeX(0);
        return;
      }
      setSwipeX(0);
      if (!longPressFired.current && Math.abs(dx) < 8 && Math.abs(dy) < 8 && dt < 400) {
        onOpen?.(recipe);
      }
    };
    const onPointerCancel = () => {
      clearTimeout(longPressTimer.current);
      setPressed(false);
      setSwipeX(0);
      startRef.current = null;
    };

    return (
      <div className={'card-wrap ' + (actionFlash ? 'flash-' + actionFlash : '')}>
        <div className="swipe-bg swipe-bg-fav" aria-hidden>
          <span style={{fontSize: 16}}>♥</span>
          <span>{recipe.favorite ? 'Unfavorite' : 'Favorite'}</span>
        </div>
        <div className="swipe-bg swipe-bg-del" aria-hidden>
          <span>Delete</span>
          <span style={{fontSize: 16}}>×</span>
        </div>
        <article
          className={'recipe-card ' + (pressed ? 'pressed' : '')}
          style={{
            transform: `translateX(${swipeX}px) rotate(${swipeX * 0.04}deg)`,
            transition: swipeX === 0 ? 'transform 280ms cubic-bezier(.2,.9,.3,1.2)' : 'none',
          }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerCancel}
        >
          <div className="recipe-card-media">
            <RecipeMedia recipe={recipe} />
            {sourceLabel && (
              <span className="source-corner">
                {platform === 'instagram' ? <Icon.InstagramIcon /> : platform === 'tiktok' ? <Icon.TikTokIcon /> : <Icon.Globe />}
                {sourceLabel}
              </span>
            )}
            {recipe.favorite && (
              <span className="fav-pill" aria-label="Favorite">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor">
                  <path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0112 6a5.5 5.5 0 019.5 6c-2.5 4.5-9.5 9-9.5 9z"/>
                </svg>
              </span>
            )}
          </div>
          <div className="recipe-card-body">
            <h3 className="recipe-card-title">{recipe.title || 'Untitled'}</h3>
            <div className="recipe-card-meta">
              {timeLabel(recipe) && (
                <span className="time-badge">
                  <Icon.Clock />
                  {timeLabel(recipe)}
                </span>
              )}
              {timeLabel(recipe) && recipe.servings && <span className="meta-sep" />}
              {recipe.servings && <span className="time-badge" style={{textTransform:'lowercase'}}>{recipe.servings}</span>}
            </div>
          </div>
        </article>
      </div>
    );
  }

  // ---------- Detail ----------
  function DetailScreen({ recipe, onClose, onSave, onDelete, onEdit }) {
    const [tab, setTab] = useState('ingredients');
    const [checkedIng, setCheckedIng] = useState(() => new Set(loadChecked(recipe.id)));
    const [stepIdx, setStepIdx] = useState(0);
    const [notes, setNotes] = useState(recipe.notes || '');
    const [rating, setRating] = useState(recipe.rating || 0);
    const [favorite, setFavorite] = useState(!!recipe.favorite);
    const [cooked, setCooked] = useState(recipe.cooked || 0);
    const [dragX, setDragX] = useState(0);
    const [closing, setClosing] = useState(false);
    const swipeStart = useRef(null);
    const personalDirty = useRef(false);

    const platform = recipe.sourceUrl ? detectPlatform(recipe.sourceUrl) : 'web';
    const isSocial = platform === 'instagram' || platform === 'tiktok';
    const hasLink  = !!recipe.sourceUrl;

    // ---- iOS-style swipe-back from left edge ----
    const onPointerDownSwipe = (e) => {
      // Only initiate if the touch starts within 25px of the left viewport edge.
      if (e.clientX <= 25) {
        swipeStart.current = { x: e.clientX, y: e.clientY, captured: false };
      }
    };
    const onPointerMoveSwipe = (e) => {
      if (!swipeStart.current) return;
      const dx = e.clientX - swipeStart.current.x;
      const dy = e.clientY - swipeStart.current.y;
      // If the user moves more vertically than horizontally early on, this is
      // a scroll, not a swipe — bail out and let the scroll happen.
      if (!swipeStart.current.captured && Math.abs(dy) > Math.abs(dx) + 6) {
        swipeStart.current = null;
        setDragX(0);
        return;
      }
      if (dx > 6) {
        swipeStart.current.captured = true;
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch {}
        setDragX(Math.max(0, dx));
      }
    };
    const onPointerUpSwipe = () => {
      if (!swipeStart.current) return;
      const wasCaptured = swipeStart.current.captured;
      swipeStart.current = null;
      if (!wasCaptured) { setDragX(0); return; }
      const threshold = Math.min(140, window.innerWidth * 0.28);
      if (dragX > threshold) {
        // Animate the screen sliding off, then dismiss.
        setClosing(true);
        setDragX(window.innerWidth);
        setTimeout(onClose, 240);
      } else {
        setDragX(0);
      }
    };

    const toggleIng = (i) => {
      setCheckedIng(prev => {
        const n = new Set(prev);
        n.has(i) ? n.delete(i) : n.add(i);
        saveChecked(recipe.id, Array.from(n));
        return n;
      });
    };

    const toggleFav = async () => {
      const next = !favorite;
      setFavorite(next);
      try { await onSave({ ...recipe, favorite: next }); } catch {}
    };

    const startCooking = async () => {
      setTab('steps');
      setStepIdx(0);
      const next = cooked + 1;
      setCooked(next);
      try { await onSave({ ...recipe, cooked: next, favorite }); } catch {}
    };

    const openSource = () => {
      if (hasLink) window.open(recipe.sourceUrl, '_blank', 'noopener');
    };

    const persistPersonal = useCallback(async () => {
      if (!personalDirty.current) return;
      personalDirty.current = false;
      try { await onSave({ ...recipe, notes, rating, favorite, cooked }); } catch {}
    }, [recipe, notes, rating, favorite, cooked, onSave]);

    useEffect(() => () => { persistPersonal(); }, [persistPersonal]);

    const tags = recipe.tags || [];
    const ingredients = recipe.ingredients || [];
    const instructions = (recipe.instructions || []).map((s, i) => ({
      i, text: s, isHeader: /^—.*—$/.test(s)
    }));

    const dragOpacity = Math.max(0.3, 1 - dragX / (window.innerWidth || 800));

    return (
      <div
        className="detail-screen"
        onPointerDown={onPointerDownSwipe}
        onPointerMove={onPointerMoveSwipe}
        onPointerUp={onPointerUpSwipe}
        onPointerCancel={onPointerUpSwipe}
        style={{
          transform: dragX ? `translateX(${dragX}px)` : undefined,
          opacity: dragX ? dragOpacity : undefined,
          transition: closing
            ? 'transform 240ms cubic-bezier(.2,.7,.3,1), opacity 240ms'
            : (swipeStart.current?.captured ? 'none' : 'transform 220ms cubic-bezier(.2,.7,.3,1.1), opacity 220ms'),
        }}
      >
        <button className="detail-close" onClick={onClose} aria-label="Back"><Icon.Back /></button>
        <button className={'detail-fav ' + (favorite ? 'on' : '')} onClick={toggleFav} aria-label="Favorite">
          <Icon.Heart filled={favorite} />
        </button>

        {hasLink && !isSocial && (
          <button className="detail-source-btn" onClick={openSource} aria-label={'View on ' + urlHost(recipe.sourceUrl)}>
            <Icon.Link />
          </button>
        )}

        {isSocial ? (
          <div className="detail-hero" style={{aspectRatio: 'auto', maxHeight: 'none'}}>
            <SocialEmbed url={recipe.sourceUrl} platform={platform} fallbackImage={recipe.image} />
          </div>
        ) : (
          <div className="detail-hero">
            <RecipeMedia recipe={recipe} />
            <div className="detail-hero-fade" />
            {(recipe.author || recipe.sourceUrl) && (
              <div className="detail-source-row">
                <SourceBadge url={recipe.sourceUrl} size="lg" />
                {recipe.author && <span className="detail-author">{recipe.author}</span>}
              </div>
            )}
          </div>
        )}

        <div className="detail-body">
          <h1 className="detail-title">{recipe.title || 'Untitled'}</h1>
          {recipe.description && <p className="detail-description">{recipe.description}</p>}

          {(recipe.prepTime || recipe.cookTime || recipe.totalTime || recipe.servings || cooked > 0) && (
            <div className="detail-meta-row">

              {ingredients.map((ing, i) => (

                  <span className="step-num">{instructions.slice(0, step.i).filter(s => !s.isHeader).length + 1}</span>

  // ---------- Social embed (Instagram + TikTok) ----------
  function SocialEmbed({ url, platform, fallbackImage }) {
    useEffect(() => {
      const scriptId = platform === 'instagram' ? 'ig-embed-js' : 'tt-embed-js';
      const scriptSrc = platform === 'instagram'
        ? 'https://www.instagram.com/embed.js'
        : 'https://www.tiktok.com/embed.js';
      const ensureScript = () => new Promise((resolve) => {
        if (document.getElementById(scriptId)) {
          if (platform === 'instagram' && window.instgrm?.Embeds) window.instgrm.Embeds.process();
          return resolve();
        }
        const s = document.createElement('script');
        s.id = scriptId; s.async = true; s.src = scriptSrc;
        s.onload = () => {
          if (platform === 'instagram' && window.instgrm?.Embeds) window.instgrm.Embeds.process();
          resolve();
        };
        document.body.appendChild(s);
      });
      ensureScript();
    }, [url, platform]);

    if (platform === 'instagram') {
      return (
        <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)'}}>
          <blockquote
            className="instagram-media"
            data-instgrm-permalink={url}
            data-instgrm-version="14"
            style={{ background:'#fff', border:0, borderRadius:'10px', margin:'0 auto', maxWidth:'400px', minWidth:'280px', padding:0 }}
          >
            <a href={url} target="_blank" rel="noopener" style={{display:'block', padding:'40px', textAlign:'center', color:'var(--ink-3)'}}>
              {fallbackImage
                ? <img src={fallbackImage} alt="" style={{width:'100%', borderRadius:'10px'}} />
                : <span>Loading Instagram reel…</span>}
            </a>
          </blockquote>
        </div>
      );
    }

    const videoIdMatch = (url || '').match(/\/video\/(\d+)/);
    const videoId = videoIdMatch ? videoIdMatch[1] : '';
    return (
      <div className="social-embed" style={{padding: '12px', background: 'var(--bg-sunk)'}}>
        <blockquote className="tiktok-embed" cite={url} data-video-id={videoId} style={{maxWidth:'400px', minWidth:'280px', margin:'0 auto'}}>
          <section>
            <a href={url} target="_blank" rel="noopener" style={{display:'block', padding:'40px', textAlign:'center', color:'var(--ink-3)'}}>
              {fallbackImage
                ? <img src={fallbackImage} alt="" style={{width:'100%', borderRadius:'10px'}} />
                : <span>Loading TikTok video…</span>}
            </a>
          </section>
        </blockquote>
      </div>
    );
  }

    const [err, setErr] = useState(null);

    const updateDraft = (patch) => setDraft(d => ({...d, ...patch}));
    const updateArr = (key, idx, val) => setDraft(d => {
      const arr = [...(d[key] || [])];
      if (val == null) arr.splice(idx, 1); else arr[idx] = val;
      return { ...d, [key]: arr };
    });
    const addArrItem = (key) => setDraft(d => ({...d, [key]: [...(d[key] || []), '']}));

    const doSave = async () => {
      if (!draft.title.trim()) { setErr('Title is required.'); return; }
      setBusy(true); setErr(null);
      try {
        const saved = await onSave(draft);
        // onSave should close the overlay
      } catch (e) {
        setErr(e.message || 'Save failed.');

        setBusy(false);
      }

    const tagsString = (draft.tags || []).join(', ');

    return (
      <div className="detail-screen">
        <div className="detail-body" style={{padding: '20px 22px 100px', marginTop: 0, borderRadius: 0}}>

          <div className="field"><label className="field-label">Title</label>
            <input className="field-input" value={draft.title || ''} onChange={e => updateDraft({title: e.target.value})} />
          </div>

          <div className="field"><label className="field-label">Description</label>
            <textarea className="field-textarea" style={{minHeight: 70}} value={draft.description || ''} onChange={e => updateDraft({description: e.target.value})} />
          </div>

          <div className="row-group">
            <div className="field"><label className="field-label">Prep</label>
              <input className="field-input" value={draft.prepTime || ''} onChange={e => updateDraft({prepTime: e.target.value})} />
            </div>
            <div className="field"><label className="field-label">Cook</label>
              <input className="field-input" value={draft.cookTime || ''} onChange={e => updateDraft({cookTime: e.target.value})} />
            </div>
            <div className="field"><label className="field-label">Total</label>
              <input className="field-input" value={draft.totalTime || ''} onChange={e => updateDraft({totalTime: e.target.value})} />
            </div>
            <div className="field"><label className="field-label">Servings</label>

          </div>

          <div className="field">
            <label className="field-label">Ingredients</label>

              <div key={i} style={{display:'flex', gap:'8px', marginBottom:'6px'}}>
                <input className="field-input" value={ing} onChange={e => updateArr('ingredients', i, e.target.value)} />

          </div>
